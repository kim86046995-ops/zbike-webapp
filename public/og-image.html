<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .logo {
            font-size: 120px;
            font-weight: 900;
            color: white;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
            letter-spacing: -5px;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 48px;
            color: rgba(255,255,255,0.95);
            font-weight: 600;
            letter-spacing: 2px;
        }
        .description {
            font-size: 32px;
            color: rgba(255,255,255,0.8);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="logo">Z-BIKE</div>
    <div class="subtitle">전자계약서</div>
    <div class="description">오토바이 리스/렌트 간편 계약</div>
</body>
</html>
