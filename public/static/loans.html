<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, user-scalable=yes">
    <title>차용증 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 모바일 최적화 */
        @media (max-width: 768px) {
            .mobile-card {
                display: block !important;
            }
            .desktop-table {
                display: none !important;
            }
        }
        @media (min-width: 769px) {
            .mobile-card {
                display: none !important;
            }
            .desktop-table {
                display: block !important;
            }
        }
        /* 터치 영역 확대 */
        .touch-target {
            min-height: 44px;
            min-width: 44px;
        }
        /* 스크롤 개선 */
        .smooth-scroll {
            -webkit-overflow-scrolling: touch;
        }
        /* 인쇄 및 PDF 스타일 - A4 사이즈 최적화 */
        @media print {
            @page {
                size: A4;
                margin: 10mm 15mm;
            }
            
            body {
                margin: 0;
                padding: 0;
            }
            
            /* 목록 숨기기 */
            body > * {
                display: none !important;
            }
            
            /* 모달만 표시 */
            #modal {
                display: block !important;
                position: static !important;
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            
            #modal > div {
                display: block !important;
                position: static !important;
                max-width: 100% !important;
                max-height: none !important;
                margin: 0 !important;
                box-shadow: none !important;
                overflow: visible !important;
            }
            
            /* no-print 클래스 숨기기 */
            .no-print {
                display: none !important;
            }
            
            /* 약관 폰트 크기 조정 */
            .contract-terms {
                font-size: 8pt !important;
                line-height: 1.2 !important;
            }
            
            .contract-terms p {
                margin-top: 0.2rem !important;
                margin-bottom: 0.2rem !important;
            }
            
            /* 여백 최적화 */
            .space-y-6 > * + * {
                margin-top: 0.3rem !important;
            }
            
            .border-2 {
                padding: 8px !important;
                margin-bottom: 6px !important;
            }
            
            h3 {
                font-size: 12pt !important;
                margin-bottom: 6px !important;
            }
            
            /* 페이지 브레이크 방지 - 중요! */
            .bg-indigo-50, .border-2, .contract-terms, img {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }
            
            /* 이미지 크기 제한 */
            img {
                max-width: 100% !important;
                max-height: 150px !important;
                object-fit: contain !important;
                page-break-before: avoid !important;
                page-break-after: avoid !important;
            }
            
            /* PDF/인쇄시 주민번호 전체 표시 */
            .resident-number-display {
                display: none !important;
            }
            
            .resident-number-full {
                display: inline !important;
            }
        }
        
        /* PDF 생성을 위한 추가 스타일 */
        .pdf-break-avoid {
            page-break-inside: avoid !important;
            break-inside: avoid !important;
        }
    </style>
</head>
<body class="bg-gray-50">
    <header class="bg-orange-600 text-white shadow-md sticky top-0 z-10">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <a href="/dashboard" class="flex items-center touch-target">
                    <i class="fas fa-arrow-left mr-2"></i>
                    <span class="text-xl font-bold">차용증 목록</span>
                </a>
                <div class="flex gap-2">
                    <a href="/static/loan-new" class="bg-white text-orange-600 px-4 py-2 rounded-lg hover:bg-orange-50 touch-target">
                        <i class="fas fa-plus mr-2"></i><span class="hidden md:inline">새 차용증</span>
                    </a>
                    <button onclick="printList()" class="bg-white text-orange-600 px-4 py-2 rounded-lg hover:bg-orange-50 touch-target">
                        <i class="fas fa-print mr-2"></i><span class="hidden md:inline">인쇄</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-2 md:px-4 py-4 md:py-6">
        <!-- 검색 및 필터 -->
        <div class="bg-white rounded-lg shadow-md p-4 md:p-6 mb-4 md:mb-6">
            <div class="flex flex-col gap-3 md:gap-4">
                <input type="text" id="search" placeholder="차용증번호/차용인 이름/전화번호 검색..." 
                    class="w-full px-4 py-3 md:py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 text-base md:text-sm">
                <select id="filter" class="w-full px-4 py-3 md:py-2 border rounded-lg focus:ring-2 focus:ring-orange-500 text-base md:text-sm">
                    <option value="">전체 상태</option>
                    <option value="active">진행중</option>
                    <option value="completed">상환완료</option>
                    <option value="overdue">연체</option>
                </select>
            </div>
        </div>

        <!-- 로딩 -->
        <div id="loading" class="text-center py-8">
            <i class="fas fa-spinner fa-spin text-4xl text-orange-600"></i>
            <p class="mt-4 text-gray-600">로딩 중...</p>
        </div>

        <!-- 데스크톱 테이블 -->
        <div id="desktopContent" class="desktop-table hidden"></div>

        <!-- 모바일 카드 -->
        <div id="mobileContent" class="mobile-card hidden"></div>
    </div>

    <!-- 상세보기 모달 -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onclick="closeModal(event)">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-4xl max-h-[90vh] overflow-y-auto smooth-scroll" onclick="event.stopPropagation()">
            <div class="p-4 md:p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl md:text-2xl font-bold text-gray-800">차용증 상세정보</h2>
                    <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 touch-target">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
                <div id="modalContent"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        let allLoans = [];
        let filteredLoans = [];
        let currentUser = null;

        // 슈퍼관리자 체크 함수
        function isSuperAdmin() {
            if (!currentUser) {
                try {
                    const userStr = localStorage.getItem('user');
                    if (userStr) {
                        currentUser = JSON.parse(userStr);
                    }
                } catch (e) {
                    console.error('Failed to parse user:', e);
                    return false;
                }
            }
            return currentUser && (currentUser.role === 'superadmin' || currentUser.role === 'super_admin' || currentUser.id === 1);
        }

        // 주민번호 마스킹 함수 (화면 표시용)
        function maskResidentNumber(residentNumber) {
            if (!residentNumber) return '-';
            
            // 슈퍼관리자는 전체 보기
            if (isSuperAdmin()) {
                return residentNumber;
            }
            
            // 일반 관리자는 뒷자리 마스킹
            if (residentNumber.length === 13) {
                return residentNumber.substring(0, 6) + '-*******';
            } else if (residentNumber.includes('-')) {
                const parts = residentNumber.split('-');
                return parts[0] + '-*******';
            }
            return residentNumber.substring(0, 6) + '*******';
        }

        // PDF/인쇄용 주민번호 (전체 표시)
        function getFullResidentNumber(residentNumber) {
            return residentNumber || '-';
        }

        function checkAuth() {
            const sid = localStorage.getItem('sessionId');
            if (!sid) {
                alert('로그인이 필요합니다.');
                window.location.href = '/static/login.html';
                return false;
            }
            return true;
        }

        async function loadData() {
            if (!checkAuth()) return;
            try {
                const sid = localStorage.getItem('sessionId');
                const res = await axios.get('/api/loan-contracts', {
                    headers: { 'X-Session-ID': sid }
                });
                allLoans = res.data;
                applyFilters();
            } catch (err) {
                alert('데이터 로드 실패: ' + err.message);
            }
        }

        function applyFilters() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const filterStatus = document.getElementById('filter').value;

            filteredLoans = allLoans.filter(loan => {
                // 연체 상태 계산
                const today = new Date();
                const repaymentDate = new Date(loan.repayment_date);
                const actualStatus = (loan.status === 'active' && today > repaymentDate) ? 'overdue' : loan.status;

                const matchSearch = !searchTerm || 
                    (loan.loan_number && loan.loan_number.toLowerCase().includes(searchTerm)) ||
                    (loan.borrower_name && loan.borrower_name.toLowerCase().includes(searchTerm)) ||
                    (loan.borrower_phone && loan.borrower_phone.includes(searchTerm));

                const matchStatus = !filterStatus || actualStatus === filterStatus;

                return matchSearch && matchStatus;
            });

            showData();
        }

        function showData() {
            document.getElementById('loading').classList.add('hidden');
            
            // 데스크톱 테이블
            showDesktopTable();
            
            // 모바일 카드
            showMobileCards();
        }

        function showDesktopTable() {
            const desktop = document.getElementById('desktopContent');
            desktop.classList.remove('hidden');

            if (filteredLoans.length === 0) {
                desktop.innerHTML = `
                    <div class="bg-white rounded-lg shadow-md p-8 text-center">
                        <i class="fas fa-inbox text-5xl text-gray-300 mb-4"></i>
                        <p class="text-gray-500 text-lg">차용증이 없습니다</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="bg-white rounded-lg shadow-md overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-orange-600 text-white">
                            <tr>
                                <th class="px-4 py-3 text-left">번호</th>
                                <th class="px-4 py-3 text-left">차용증번호</th>
                                <th class="px-4 py-3 text-left">차용인</th>
                                <th class="px-4 py-3 text-left">전화번호</th>
                                <th class="px-4 py-3 text-right">차용금액</th>
                                <th class="px-4 py-3 text-center">차용일</th>
                                <th class="px-4 py-3 text-center">상환예정일</th>
                                <th class="px-4 py-3 text-center">상태</th>
                                <th class="px-4 py-3 text-center">관리</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">
            `;

            filteredLoans.forEach((loan, index) => {
                const today = new Date();
                const repaymentDate = new Date(loan.repayment_date);
                const actualStatus = (loan.status === 'active' && today > repaymentDate) ? 'overdue' : loan.status;
                
                const statusColors = {
                    'active': 'bg-green-100 text-green-800',
                    'completed': 'bg-blue-100 text-blue-800',
                    'overdue': 'bg-red-100 text-red-800'
                };
                const statusTexts = {
                    'active': '진행중',
                    'completed': '상환완료',
                    'overdue': '연체'
                };

                html += `
                    <tr class="hover:bg-gray-50 cursor-pointer" onclick="showDetail(${loan.id})">
                        <td class="px-4 py-3">${index + 1}</td>
                        <td class="px-4 py-3 font-semibold text-orange-600">${loan.loan_number || '-'}</td>
                        <td class="px-4 py-3">${loan.borrower_name || '-'}</td>
                        <td class="px-4 py-3">${loan.borrower_phone || '-'}</td>
                        <td class="px-4 py-3 text-right font-semibold">${Number(loan.loan_amount || 0).toLocaleString()}원</td>
                        <td class="px-4 py-3 text-center">${loan.loan_date || '-'}</td>
                        <td class="px-4 py-3 text-center">${loan.repayment_date || '-'}</td>
                        <td class="px-4 py-3 text-center">
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${statusColors[actualStatus]}">
                                ${statusTexts[actualStatus]}
                            </span>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <button onclick="event.stopPropagation(); showDetail(${loan.id})" 
                                class="text-orange-600 hover:text-orange-800 mx-1">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button onclick="event.stopPropagation(); deleteConfirm(${loan.id})" 
                                class="text-red-600 hover:text-red-800 mx-1">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            desktop.innerHTML = html;
        }

        function showMobileCards() {
            const mobile = document.getElementById('mobileContent');
            mobile.classList.remove('hidden');

            if (filteredLoans.length === 0) {
                mobile.innerHTML = `
                    <div class="bg-white rounded-lg shadow-md p-8 text-center">
                        <i class="fas fa-inbox text-5xl text-gray-300 mb-4"></i>
                        <p class="text-gray-500 text-lg">차용증이 없습니다</p>
                    </div>
                `;
                return;
            }

            let html = '';
            filteredLoans.forEach(loan => {
                const today = new Date();
                const repaymentDate = new Date(loan.repayment_date);
                const actualStatus = (loan.status === 'active' && today > repaymentDate) ? 'overdue' : loan.status;
                
                const statusColors = {
                    'active': 'bg-green-100 text-green-800',
                    'completed': 'bg-blue-100 text-blue-800',
                    'overdue': 'bg-red-100 text-red-800'
                };
                const statusTexts = {
                    'active': '진행중',
                    'completed': '상환완료',
                    'overdue': '연체'
                };

                html += `
                    <div class="bg-white rounded-lg shadow-md p-4 mb-4" onclick="showDetail(${loan.id})">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <div class="font-bold text-orange-600 mb-1">${loan.loan_number || '-'}</div>
                                <span class="px-3 py-1 rounded-full text-xs font-bold ${statusColors[actualStatus]}">
                                    ${statusTexts[actualStatus]}
                                </span>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="event.stopPropagation(); showDetail(${loan.id})" 
                                    class="text-orange-600 hover:text-orange-800 touch-target">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button onclick="event.stopPropagation(); deleteConfirm(${loan.id})" 
                                    class="text-red-600 hover:text-red-800 touch-target">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between">
                                <span class="text-gray-600">차용인:</span>
                                <span class="font-semibold">${loan.borrower_name || '-'}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-600">전화번호:</span>
                                <span>${loan.borrower_phone || '-'}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-600">차용금액:</span>
                                <span class="font-semibold text-orange-600">${Number(loan.loan_amount || 0).toLocaleString()}원</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-600">차용일:</span>
                                <span>${loan.loan_date || '-'}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-600">상환예정일:</span>
                                <span>${loan.repayment_date || '-'}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            mobile.innerHTML = html;
        }

        let currentLoan = null;

        async function showDetail(id) {
            try {
                // 즉시 모달 표시 (로딩 상태)
                document.getElementById('modalContent').innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-spinner fa-spin text-4xl text-orange-600"></i>
                        <p class="text-gray-600 mt-4 text-lg">차용증을 불러오는 중...</p>
                    </div>
                `;
                document.getElementById('modal').classList.remove('hidden');
                
                const sid = localStorage.getItem('sessionId');
                const res = await axios.get(`/api/loan-contracts/${id}`, {
                    headers: { 'X-Session-ID': sid }
                });
                currentLoan = res.data;
                renderLoanDetail();
            } catch (err) {
                alert('상세 정보 로드 실패: ' + err.message);
                closeModal();
            }
        }

        function renderLoanDetail() {
            const loan = currentLoan;
            if (!loan) return;

            const today = new Date();
            const repaymentDate = new Date(loan.repayment_date);
            const actualStatus = (loan.status === 'active' && today > repaymentDate) ? 'overdue' : loan.status;
            
            const statusColors = {
                'active': 'text-green-600',
                'completed': 'text-blue-600',
                'overdue': 'text-red-600'
            };
            const statusTexts = {
                'active': '진행중',
                'completed': '상환완료',
                'overdue': '연체'
            };

            const content = `
                <div class="space-y-6" style="font-size: 1.1rem; color: #1a1a1a; font-weight: 500;">
                    <!-- 차용증 제목 -->
                    <div class="text-center border-b-2 border-gray-800 pb-4 mb-6">
                        <h1 class="text-3xl font-bold mb-2">배달대행 차용증</h1>
                        <p class="text-lg">차용증번호: ${loan.loan_number || '-'}</p>
                        <p class="text-base mt-2">상태: <span class="font-bold ${statusColors[actualStatus]}">${statusTexts[actualStatus]}</span></p>
                    </div>

                    <!-- 사업자 정보 -->
                    <div class="bg-indigo-50 p-6 rounded-lg border-2 border-indigo-300 mb-6">
                        <h3 class="font-bold text-indigo-900 mb-3" style="font-size: 1.4rem;">채권자 (사업자) 정보</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3" style="font-size: 1.1rem;">
                            <p><strong>상호:</strong> <span id="modal-company-name">로딩중...</span></p>
                            <p><strong>사업자번호:</strong> <span id="modal-business-number">로딩중...</span></p>
                            <p><strong>대표자:</strong> <span id="modal-representative-name">로딩중...</span></p>
                            <p><strong>총괄매니저:</strong> <span id="modal-manager-phone">로딩중...</span></p>
                            <p class="col-span-1 md:col-span-2"><strong>매니저:</strong> <span id="modal-manager-phone2">로딩중...</span></p>
                        </div>
                    </div>

                    <!-- 차용인 정보 -->
                    <div class="border-2 border-gray-300 p-6 rounded-lg mb-6">
                        <h3 class="font-bold text-lg mb-4">차용인 정보</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <p><strong>성명:</strong> ${loan.borrower_name || '-'}</p>
                            <p><strong>주민등록번호:</strong> <span class="resident-number-display">${maskResidentNumber(loan.borrower_resident_number)}</span><span class="resident-number-full" style="display:none;">${getFullResidentNumber(loan.borrower_resident_number)}</span></p>
                            <p><strong>연락처:</strong> ${loan.borrower_phone || '-'}</p>
                            <p class="col-span-1 md:col-span-2"><strong>주소:</strong> ${loan.borrower_address || '-'}</p>
                        </div>
                    </div>

                    <!-- 차용 상세 정보 -->
                    <div class="border-2 border-gray-300 p-6 rounded-lg mb-6">
                        <h3 class="font-bold text-lg mb-4">차용 상세 정보</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <p><strong>차용금액:</strong> <span class="text-orange-600 font-bold">${Number(loan.loan_amount || 0).toLocaleString()}원</span></p>
                            <p><strong>일차감금액:</strong> ${Number(loan.daily_deduction || 0).toLocaleString()}원</p>
                            <p><strong>차용일:</strong> ${loan.loan_date || '-'}</p>
                            <p><strong>대여기간:</strong> ${loan.loan_period || 0}일</p>
                            <p><strong>상환예정일:</strong> ${loan.repayment_date || '-'}</p>
                            <p><strong>이자율:</strong> <strong class="text-orange-700">연 ${loan.interest_rate || 20}%</strong></p>
                            <p class="col-span-1 md:col-span-2"><strong>차용금 입금계좌:</strong> ${loan.account_number || '-'}</p>
                        </div>
                    </div>

                    <!-- 차용증 약관 -->
                    <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 space-y-2 contract-terms" style="font-size: 1.0rem; color: #1a1a1a; font-weight: 500;">
                        <p class="mb-3 text-center leading-relaxed">
                            본인(차용인)은 귀사(채권자)로부터 아래와 같이 금전을 차용하였음을 확인하고,<br>
                            배달대행 일당에서 매일 차감하는 방식으로 성실히 상환할 것을 확약합니다.
                        </p>

                        <div class="border-t border-b border-gray-400 py-2 my-3">

        async function loadCompanySettings() {
            try {
                const sid = localStorage.getItem('sessionId');
                const res = await axios.get('/api/company-settings', {
                    headers: { 'X-Session-ID': sid }
                });
                const company = res.data;
                
                document.getElementById('modal-company-name').textContent = company.company_name || '정보 없음';
                document.getElementById('modal-business-number').textContent = company.company_code || '정보 없음';
                document.getElementById('modal-representative-name').textContent = company.representative_name || '정보 없음';
                document.getElementById('modal-manager-phone').textContent = company.phone || '정보 없음';
                document.getElementById('modal-manager-phone2').textContent = company.manager_phone2 || '정보 없음';
            } catch (err) {
                document.getElementById('modal-company-name').textContent = '정보 없음';
                document.getElementById('modal-business-number').textContent = '정보 없음';
                document.getElementById('modal-representative-name').textContent = '정보 없음';
                document.getElementById('modal-manager-phone').textContent = '정보 없음';
                document.getElementById('modal-manager-phone2').textContent = '정보 없음';
            }
        }

        function closeModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('modal').classList.add('hidden');
        }

        async function deleteConfirm(id) {
            if (!confirm('정말 이 차용증을 삭제하시겠습니까?')) return;
            
            try {
                const sid = localStorage.getItem('sessionId');
                await axios.delete(`/api/loan-contracts/${id}`, {
                    headers: { 'X-Session-ID': sid }
                });
                alert('삭제되었습니다.');
                loadData();
            } catch (err) {
                alert('삭제 실패: ' + err.message);
            }
        }

        function printList() {
            window.print();
        }

        function printLoan(id) {
            // 차용증 인쇄 기능 (추후 구현)
            alert('차용증 인쇄 기능은 준비 중입니다.');
        }

        async function downloadPDF() {
            if (!currentLoan) {
                alert('차용증 정보를 불러오는 중입니다. 잠시 후 다시 시도해주세요.');
                return;
            }

            try {
                // html2pdf 라이브러리를 동적으로 로드
                if (typeof html2pdf === 'undefined') {
                    const script = document.createElement('script');
                    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
                    script.onload = () => generatePDF();
                    document.head.appendChild(script);
                } else {
                    generatePDF();
                }
            } catch (error) {
                console.error('PDF 생성 오류:', error);
                alert('PDF 생성에 실패했습니다: ' + error.message);
            }
        }

        function generatePDF() {
            const element = document.getElementById('modalContent');
            const opt = {
                margin: [10, 15, 10, 15], // 상단, 우측, 하단, 좌측 (mm)
                filename: `차용증_${currentLoan.loan_number || 'unknown'}.pdf`,
                image: { type: 'jpeg', quality: 0.95 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true,
                    logging: false,
                    letterRendering: true
                },
                jsPDF: { 
                    unit: 'mm', 
                    format: 'a4', 
                    orientation: 'portrait',
                    compress: true
                },
                pagebreak: { 
                    mode: ['avoid-all', 'css', 'legacy'],
                    before: '.page-break-before',
                    after: '.page-break-after',
                    avoid: ['.pdf-break-avoid', '.border-2', 'img', '.contract-terms']
                }
            };

            // 버튼 임시 숨기기
            const buttons = element.querySelectorAll('.no-print');
            buttons.forEach(btn => btn.style.display = 'none');
            
            // PDF 생성 전에 페이지 브레이크 방지 클래스 추가
            const avoidBreakElements = element.querySelectorAll('.border-2, img, .contract-terms, .bg-indigo-50');
            avoidBreakElements.forEach(el => el.classList.add('pdf-break-avoid'));

            html2pdf().set(opt).from(element).save().then(() => {
                // 버튼 다시 보이기
                buttons.forEach(btn => btn.style.display = '');
                // 클래스 제거
                avoidBreakElements.forEach(el => el.classList.remove('pdf-break-avoid'));
            }).catch(error => {
                console.error('PDF 생성 실패:', error);
                buttons.forEach(btn => btn.style.display = '');
                avoidBreakElements.forEach(el => el.classList.remove('pdf-break-avoid'));
                alert('PDF 생성에 실패했습니다. 다시 시도해주세요.');
            });
        }

        // 이벤트 리스너
        document.getElementById('search').addEventListener('input', applyFilters);
        document.getElementById('filter').addEventListener('change', applyFilters);

        // 페이지 로드 시 실행
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
