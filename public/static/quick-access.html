<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>빠른 액세스 - Z-BIKE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- 헤더 -->
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800 flex items-center">
                        <i class="fas fa-tachometer-alt text-blue-600 mr-3"></i>
                        빠른 액세스
                    </h1>
                    <p class="text-gray-600 mt-2">Z-BIKE 관리 시스템에 빠르게 접근하세요</p>
                </div>
                <div class="text-right">
                    <p class="text-sm text-gray-600" id="currentTime"></p>
                    <p class="text-sm font-semibold text-blue-600" id="userName"></p>
                </div>
            </div>
        </div>

        <!-- 통계 카드 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <!-- 업체 수 -->
            <div class="bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition-shadow cursor-pointer" onclick="location.href='/static/companies-list.html'">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-600 mb-1">등록된 업체</p>
                        <h3 class="text-3xl font-bold text-blue-600" id="companiesCount">-</h3>
                    </div>
                    <div class="bg-blue-100 p-4 rounded-full">
                        <i class="fas fa-building text-blue-600 text-2xl"></i>
                    </div>
                </div>
            </div>

            <!-- 오토바이 수 -->
            <div class="bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition-shadow cursor-pointer" onclick="location.href='/static/motorcycles-list.html'">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-600 mb-1">등록된 오토바이</p>
                        <h3 class="text-3xl font-bold text-green-600" id="motorcyclesCount">-</h3>
                    </div>
                    <div class="bg-green-100 p-4 rounded-full">
                        <i class="fas fa-motorcycle text-green-600 text-2xl"></i>
                    </div>
                </div>
            </div>

            <!-- 계약 수 -->
            <div class="bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition-shadow cursor-pointer" onclick="location.href='/static/business-contracts.html'">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-600 mb-1">진행 중인 계약</p>
                        <h3 class="text-3xl font-bold text-purple-600" id="contractsCount">-</h3>
                    </div>
                    <div class="bg-purple-100 p-4 rounded-full">
                        <i class="fas fa-file-contract text-purple-600 text-2xl"></i>
                    </div>
                </div>
            </div>

            <!-- 사용자 수 -->
            <div class="bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-600 mb-1">활성 사용자</p>
                        <h3 class="text-3xl font-bold text-orange-600" id="usersCount">-</h3>
                    </div>
                    <div class="bg-orange-100 p-4 rounded-full">
                        <i class="fas fa-users text-orange-600 text-2xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- 빠른 액세스 메뉴 -->
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-8">
            <h2 class="text-xl font-bold text-gray-800 mb-6">
                <i class="fas fa-bolt text-yellow-500 mr-2"></i>
                빠른 작업
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- 업체 관리 -->
                <div class="border-2 border-blue-200 rounded-xl p-6 hover:border-blue-500 hover:shadow-lg transition-all cursor-pointer group" onclick="location.href='/static/companies-list.html'">
                    <div class="flex items-center mb-3">
                        <div class="bg-blue-100 p-3 rounded-lg group-hover:bg-blue-500 transition-colors">
                            <i class="fas fa-building text-blue-600 text-2xl group-hover:text-white"></i>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 ml-3">업체 관리</h3>
                    </div>
                    <p class="text-sm text-gray-600">업체 목록 조회 및 관리</p>
                </div>

                <!-- 업체 등록 -->
                <div class="border-2 border-green-200 rounded-xl p-6 hover:border-green-500 hover:shadow-lg transition-all cursor-pointer group" onclick="location.href='/static/company-register.html'">
                    <div class="flex items-center mb-3">
                        <div class="bg-green-100 p-3 rounded-lg group-hover:bg-green-500 transition-colors">
                            <i class="fas fa-plus-circle text-green-600 text-2xl group-hover:text-white"></i>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 ml-3">업체 등록</h3>
                    </div>
                    <p class="text-sm text-gray-600">새로운 업체 정보 등록</p>
                </div>

                <!-- 오토바이 관리 -->
                <div class="border-2 border-purple-200 rounded-xl p-6 hover:border-purple-500 hover:shadow-lg transition-all cursor-pointer group" onclick="location.href='/static/motorcycles-list.html'">
                    <div class="flex items-center mb-3">
                        <div class="bg-purple-100 p-3 rounded-lg group-hover:bg-purple-500 transition-colors">
                            <i class="fas fa-motorcycle text-purple-600 text-2xl group-hover:text-white"></i>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 ml-3">오토바이 관리</h3>
                    </div>
                    <p class="text-sm text-gray-600">오토바이 목록 조회 및 관리</p>
                </div>

                <!-- 계약서 관리 -->
                <div class="border-2 border-orange-200 rounded-xl p-6 hover:border-orange-500 hover:shadow-lg transition-all cursor-pointer group" onclick="location.href='/static/business-contracts.html'">
                    <div class="flex items-center mb-3">
                        <div class="bg-orange-100 p-3 rounded-lg group-hover:bg-orange-500 transition-colors">
                            <i class="fas fa-file-contract text-orange-600 text-2xl group-hover:text-white"></i>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 ml-3">계약서 관리</h3>
                    </div>
                    <p class="text-sm text-gray-600">업체 계약서 목록 및 관리</p>
                </div>

                <!-- 새 계약서 작성 -->
                <div class="border-2 border-red-200 rounded-xl p-6 hover:border-red-500 hover:shadow-lg transition-all cursor-pointer group" onclick="location.href='/static/business-contract-new.html'">
                    <div class="flex items-center mb-3">
                        <div class="bg-red-100 p-3 rounded-lg group-hover:bg-red-500 transition-colors">
                            <i class="fas fa-file-signature text-red-600 text-2xl group-hover:text-white"></i>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 ml-3">새 계약서 작성</h3>
                    </div>
                    <p class="text-sm text-gray-600">업체 계약서 신규 작성</p>
                </div>

                <!-- 로그아웃 -->
                <div class="border-2 border-gray-200 rounded-xl p-6 hover:border-gray-500 hover:shadow-lg transition-all cursor-pointer group" onclick="logout()">
                    <div class="flex items-center mb-3">
                        <div class="bg-gray-100 p-3 rounded-lg group-hover:bg-gray-500 transition-colors">
                            <i class="fas fa-sign-out-alt text-gray-600 text-2xl group-hover:text-white"></i>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 ml-3">로그아웃</h3>
                    </div>
                    <p class="text-sm text-gray-600">시스템에서 로그아웃</p>
                </div>
            </div>
        </div>

        <!-- 최근 활동 -->
        <div class="bg-white rounded-2xl shadow-xl p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-6">
                <i class="fas fa-history text-blue-600 mr-2"></i>
                최근 등록된 업체
            </h2>
            
            <div id="recentCompanies" class="space-y-3">
                <div class="text-center py-8 text-gray-500">
                    <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
                    <p>데이터를 불러오는 중...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 현재 시간 업데이트
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleString('ko-KR', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('currentTime').textContent = timeString;
        }

        updateTime();
        setInterval(updateTime, 1000);

        // 사용자 정보 표시
        const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
        if (userInfo.username) {
            document.getElementById('userName').textContent = `${userInfo.username} 님`;
        }

        // 통계 데이터 로드
        async function loadStats() {
            try {
                // 업체 수
                const companiesRes = await axios.get('/api/companies');
                const companies = companiesRes.data;
                document.getElementById('companiesCount').textContent = companies.length;

                // 최근 업체 표시
                displayRecentCompanies(companies.slice(0, 5));

                // 오토바이 수
                try {
                    const motorcyclesRes = await axios.get('/api/motorcycles');
                    document.getElementById('motorcyclesCount').textContent = motorcyclesRes.data.length || 0;
                } catch (error) {
                    document.getElementById('motorcyclesCount').textContent = '0';
                }

                // 계약 수
                try {
                    const contractsRes = await axios.get('/api/business-contracts');
                    const activeContracts = contractsRes.data.filter(c => c.status === 'active');
                    document.getElementById('contractsCount').textContent = activeContracts.length || 0;
                } catch (error) {
                    document.getElementById('contractsCount').textContent = '0';
                }

                // 사용자 수 (임시)
                document.getElementById('usersCount').textContent = '1';

            } catch (error) {
                console.error('❌ 통계 로드 실패:', error);
                document.getElementById('companiesCount').textContent = '0';
                document.getElementById('motorcyclesCount').textContent = '0';
                document.getElementById('contractsCount').textContent = '0';
                document.getElementById('usersCount').textContent = '0';
            }
        }

        // 최근 업체 표시
        function displayRecentCompanies(companies) {
            const container = document.getElementById('recentCompanies');
            
            if (companies.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <i class="fas fa-inbox text-4xl mb-3"></i>
                        <p>등록된 업체가 없습니다</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = companies.map(company => `
                <div class="flex items-center justify-between p-4 border border-gray-200 rounded-lg hover:border-blue-500 hover:shadow-md transition-all cursor-pointer"
                     onclick="location.href='/static/companies-list.html'">
                    <div class="flex items-center">
                        <div class="bg-blue-100 p-3 rounded-lg mr-4">
                            <i class="fas fa-building text-blue-600"></i>
                        </div>
                        <div>
                            <h4 class="font-semibold text-gray-800">${company.company_name}</h4>
                            <p class="text-sm text-gray-600">${company.business_number} · ${company.representative}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-500">${new Date(company.created_at).toLocaleDateString('ko-KR')}</p>
                        <span class="text-xs px-2 py-1 bg-green-100 text-green-700 rounded-full">활성</span>
                    </div>
                </div>
            `).join('');
        }

        // 로그아웃
        function logout() {
            if (confirm('로그아웃 하시겠습니까?')) {
                localStorage.removeItem('token');
                localStorage.removeItem('userInfo');
                location.href = '/static/login.html';
            }
        }

        // 페이지 로드 시 통계 로드
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
        });
    </script>
</body>
</html>
