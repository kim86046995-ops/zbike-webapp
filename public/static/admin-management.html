<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 관리 - Z바이크</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
</head>
<body class="bg-gray-100">
    <!-- 헤더 -->
    <div class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <button onclick="history.back()" class="text-gray-600 hover:text-blue-600">
                        <i class="fas fa-arrow-left text-xl"></i>
                    </button>
                    <h1 class="text-2xl font-bold text-gray-800">
                        <i class="fas fa-users-cog mr-2 text-blue-600"></i>
                        관리자 관리
                    </h1>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/dashboard" class="text-gray-600 hover:text-blue-600 font-medium">
                        <i class="fas fa-tachometer-alt mr-1"></i>대시보드
                    </a>
                    <button onclick="logout()" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg font-medium transition">
                        <i class="fas fa-sign-out-alt mr-1"></i>로그아웃
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 메인 콘텐츠 -->
    <div class="container mx-auto px-4 py-8">
        <!-- 통계 카드 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-md">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600 text-sm">전체 관리자</p>
                        <p id="totalAdmins" class="text-3xl font-bold text-gray-800">0</p>
                    </div>
                    <div class="text-4xl text-blue-600"><i class="fas fa-users"></i></div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600 text-sm">활성 관리자</p>
                        <p id="activeAdmins" class="text-3xl font-bold text-green-600">0</p>
                    </div>
                    <div class="text-4xl text-green-600"><i class="fas fa-check-circle"></i></div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600 text-sm">정지된 관리자</p>
                        <p id="inactiveAdmins" class="text-3xl font-bold text-red-600">0</p>
                    </div>
                    <div class="text-4xl text-red-600"><i class="fas fa-ban"></i></div>
                </div>
            </div>
        </div>

        <!-- 관리자 목록 -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="p-6 border-b border-gray-200">
                <h2 class="text-xl font-bold text-gray-800">
                    <i class="fas fa-list mr-2"></i>관리자 목록
                </h2>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                ID
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                아이디
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                이름
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                이메일
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                연락처
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                역할
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                상태
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                로그인
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                관리
                            </th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody" class="bg-white divide-y divide-gray-200">
                        <!-- 동적으로 채워짐 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Axios 인터셉터 설정
        axios.interceptors.request.use(config => {
            const sessionId = localStorage.getItem('sessionId');
            if (sessionId) {
                config.headers['X-Session-ID'] = sessionId;
            }
            return config;
        });

        // 로그아웃 함수
        function logout() {
            localStorage.removeItem('sessionId');
            localStorage.removeItem('user');
            window.location.href = '/static/login.html';
        }

        // 관리자 목록 로드
        async function loadAdmins() {
            try {
                const response = await axios.get('/api/admin/users');
                const admins = response.data.admins;

                // 통계 업데이트
                document.getElementById('totalAdmins').textContent = admins.length;
                document.getElementById('activeAdmins').textContent = admins.filter(a => a.status === 'active').length;
                document.getElementById('inactiveAdmins').textContent = admins.filter(a => a.status === 'inactive').length;

                // 테이블 렌더링
                const tbody = document.getElementById('adminTableBody');
                tbody.innerHTML = '';

                admins.forEach(admin => {
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-gray-50';
                    
                    const roleText = admin.role === 'superadmin' || admin.role === 'super_admin' ? '슈퍼관리자' : '관리자';
                    const roleClass = admin.role === 'superadmin' || admin.role === 'super_admin' ? 'bg-purple-100 text-purple-800' : 'bg-blue-100 text-blue-800';
                    
                    const statusText = admin.status === 'active' ? '활성' : '정지';
                    const statusClass = admin.status === 'active' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800';
                    
                    const loginStatus = admin.is_logged_in > 0 ? '<span class="text-green-600"><i class="fas fa-circle text-xs"></i> 접속중</span>' : '<span class="text-gray-400">-</span>';

                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                            ${admin.id}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                            ${admin.username}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                            ${admin.name || '-'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${admin.email || '-'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${admin.phone || '-'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full ${roleClass}">
                                ${roleText}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full ${statusClass}">
                                ${statusText}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm">
                            ${loginStatus}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm">
                            ${getActionButton(admin)}
                        </td>
                    `;
                    
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('관리자 목록 로드 실패:', error);
                if (error.response?.status === 403) {
                    alert('권한이 없습니다. 슈퍼관리자만 접근할 수 있습니다.');
                    window.location.href = '/dashboard';
                } else {
                    alert('관리자 목록을 불러오는데 실패했습니다.');
                }
            }
        }

        // 액션 버튼 생성
        function getActionButton(admin) {
            // 슈퍼관리자는 버튼 없음
            if (admin.role === 'superadmin' || admin.role === 'super_admin') {
                return '<span class="text-gray-400 text-xs">-</span>';
            }

            if (admin.status === 'active') {
                return `
                    <button onclick="changeStatus(${admin.id}, 'inactive')" 
                            class="px-3 py-1 bg-red-500 hover:bg-red-600 text-white text-xs rounded-lg transition">
                        <i class="fas fa-ban mr-1"></i>사용중지
                    </button>
                `;
            } else {
                return `
                    <button onclick="changeStatus(${admin.id}, 'active')" 
                            class="px-3 py-1 bg-green-500 hover:bg-green-600 text-white text-xs rounded-lg transition">
                        <i class="fas fa-check mr-1"></i>사용허가
                    </button>
                `;
            }
        }

        // 상태 변경
        async function changeStatus(userId, newStatus) {
            const statusText = newStatus === 'active' ? '사용허가' : '사용중지';
            
            if (!confirm(`정말 이 관리자를 ${statusText} 하시겠습니까?${newStatus === 'inactive' ? '\n(모든 세션이 삭제되어 로그아웃됩니다)' : ''}`)) {
                return;
            }

            try {
                await axios.post(`/api/admin/users/${userId}/status`, {
                    status: newStatus
                });

                alert(`${statusText} 처리되었습니다.`);
                await loadAdmins(); // 목록 새로고침
            } catch (error) {
                console.error('상태 변경 실패:', error);
                if (error.response?.data?.error) {
                    alert(error.response.data.error);
                } else {
                    alert('상태 변경에 실패했습니다.');
                }
            }
        }

        // 페이지 로드 시
        (async () => {
            // 세션 확인
            const sessionId = localStorage.getItem('sessionId');
            if (!sessionId) {
                window.location.href = '/static/login.html';
                return;
            }

            // 슈퍼관리자 권한 확인
            const userStr = localStorage.getItem('user');
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    if (user.role !== 'superadmin') {
                        alert('슈퍼관리자만 접근할 수 있습니다.');
                        window.location.href = '/dashboard';
                        return;
                    }
                } catch (e) {
                    window.location.href = '/static/login.html';
                    return;
                }
            }

            // 관리자 목록 로드
            await loadAdmins();
        })();
    </script>
</body>
</html>
