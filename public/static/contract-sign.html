<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=0.25, user-scalable=yes">
    <title>Z-BIKE 전자계약서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen py-8 px-4">
        <div class="max-w-4xl mx-auto">
            <!-- 헤더 -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <div class="text-center">
                    <i class="fas fa-motorcycle text-4xl text-indigo-600 mb-3"></i>
                    <h1 id="pageTitle" class="text-2xl font-bold text-gray-800 mb-2">Z-BIKE 전자계약서</h1>
                    <p class="text-gray-600">아래 계약 내용을 확인하시고 서명해주세요</p>
                </div>
            </div>

            <!-- 로딩 중 -->
            <div id="loading" class="text-center py-12">
                <i class="fas fa-spinner fa-spin text-4xl text-indigo-600 mb-4"></i>
                <p class="text-gray-600">계약서를 불러오는 중...</p>
            </div>

            <!-- 만료됨 -->
            <div id="expired" class="hidden">
                <div class="bg-red-50 border border-red-200 rounded-lg p-8 text-center">
                    <i class="fas fa-exclamation-triangle text-5xl text-red-600 mb-4"></i>
                    <h2 class="text-xl font-bold text-gray-800 mb-2">계약서가 만료되었습니다</h2>
                    <p class="text-gray-600">이 계약서 링크는 이미 만료되었거나 완료되었습니다.</p>
                    <p class="text-sm text-gray-500 mt-2">관리자에게 문의해주세요.</p>
                </div>
            </div>

            <!-- 계약서 내용 -->
            <div id="contractContent" class="hidden space-y-6">
                <!-- 계약 정보 -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-xl font-bold mb-4">
                        <i class="fas fa-info-circle mr-2 text-indigo-600"></i>계약 정보
                    </h2>
                    <div id="contractInfo" class="space-y-2 text-base"></div>
                </div>

                <!-- 약관 동의 -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-xl font-bold mb-4">
                        <i class="fas fa-file-alt mr-2 text-indigo-600"></i>계약 약관
                    </h2>
                    <div id="contractTerms" class="p-4 bg-gray-50 rounded-lg text-base mb-4"></div>
                    
                    <div class="flex items-start">
                        <input 
                            type="checkbox" 
                            id="agreeTerms" 
                            class="mt-1 w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500"
                            required
                        >
                        <label for="agreeTerms" class="ml-2 text-base font-bold text-gray-700">
                            위 계약 약관을 모두 읽었으며 이에 동의합니다 *
                        </label>
                    </div>
                </div>

                <!-- 서명 -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-xl font-bold mb-4">
                        <i class="fas fa-signature mr-2 text-indigo-600"></i>전자서명
                    </h2>
                    <p class="text-sm text-gray-600 mb-4">아래 서명 박스에 서명해주세요</p>
                    <div class="border-2 border-gray-300 rounded-lg overflow-hidden">
                        <canvas id="signatureCanvas" width="800" height="200" class="w-full cursor-crosshair bg-white"></canvas>
                    </div>
                    <button type="button" onclick="clearSignature()" class="mt-2 text-sm text-blue-600 hover:text-blue-800">
                        <i class="fas fa-eraser mr-1"></i>서명 지우기
                    </button>
                </div>

                <!-- 신분증 촬영 -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-xl font-bold mb-4">
                        <i class="fas fa-id-card mr-2 text-indigo-600"></i>신분증 촬영
                    </h2>
                    
                    <!-- 카메라 미리보기 (숨김 상태) -->
                    <div id="cameraSection" class="hidden mb-4">
                        <video id="video" width="640" height="480" autoplay class="w-full rounded-lg border-2 border-gray-300"></video>
                        <div class="mt-2 flex gap-2">
                            <button type="button" onclick="capturePhoto()" class="flex-1 bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">
                                <i class="fas fa-camera mr-2"></i>촬영하기
                            </button>
                            <button type="button" onclick="stopCamera()" class="flex-1 bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600">
                                <i class="fas fa-times mr-2"></i>카메라 끄기
                            </button>
                        </div>
                    </div>

                    <!-- 촬영/업로드 버튼 -->
                    <div id="captureButtons" class="flex gap-2">
                        <button type="button" onclick="startCamera()" class="flex-1 bg-green-600 text-white px-4 py-3 rounded-lg hover:bg-green-700 font-semibold">
                            <i class="fas fa-camera mr-2"></i>카메라로 촬영
                        </button>
                        <label class="flex-1">
                            <input type="file" id="fileUpload" accept="image/*" class="hidden" onchange="uploadFile(event)">
                            <div class="bg-blue-600 text-white px-4 py-3 rounded-lg hover:bg-blue-700 font-semibold text-center cursor-pointer">
                                <i class="fas fa-upload mr-2"></i>파일 업로드
                            </div>
                        </label>
                    </div>

                    <!-- 미리보기 -->
                    <div id="previewSection" class="hidden mt-4">
                        <p class="text-sm text-gray-600 mb-2">촬영된 신분증:</p>
                        <div class="relative inline-block">
                            <img id="preview" class="max-w-full rounded-lg border-2 border-gray-300">
                            <button type="button" onclick="deletePhoto()" class="absolute top-2 right-2 bg-red-600 text-white p-2 rounded-full hover:bg-red-700 shadow-lg">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 제출 버튼 -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <button 
                        type="button" 
                        onclick="submitContract()"
                        class="w-full bg-indigo-600 text-white py-4 rounded-lg hover:bg-indigo-700 transition font-bold text-lg shadow-lg hover:shadow-xl"
                    >
                        <i class="fas fa-check-circle mr-2"></i>서명 완료 및 제출
                    </button>
                </div>
            </div>

            <!-- 제출 완료 -->
            <div id="completed" class="hidden">
                <div class="bg-green-50 border border-green-200 rounded-lg p-8 text-center">
                    <i class="fas fa-check-circle text-5xl text-green-600 mb-4"></i>
                    <h2 class="text-xl font-bold text-gray-800 mb-2">서명이 완료되었습니다</h2>
                    <p class="text-gray-600">계약서가 성공적으로 제출되었습니다.</p>
                    <p class="text-sm text-gray-500 mt-2">감사합니다!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let signaturePad = null;
        let currentStream = null;
        let idCardPhoto = '';
        let shareToken = '';
        let contractData = null;
        let companySettings = null;

        // URL에서 토큰 가져오기
        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            shareToken = urlParams.get('token');
            
            if (!shareToken) {
                showExpired();
                return;
            }
            
            // 업체 정보 먼저 로드
            await loadCompanySettings();
            loadContract();
            initSignaturePad();
        });

        // 업체 정보 로드
        async function loadCompanySettings() {
            try {
                const response = await axios.get('/api/company-settings');
                companySettings = response.data;
            } catch (error) {
                console.error('업체 정보 로드 실패:', error);
                // 기본값 설정
                companySettings = {
                    company_name: 'Z-BIKE',
                    business_number: '123-45-67890',
                    representative: '대표자',
                    address: '서울시',
                    phone: '02-1234-5678'
                };
            }
        }

        // 계약서 불러오기
        async function loadContract() {
            try {
                const response = await axios.get(`/api/contract-share/${shareToken}`);
                contractData = response.data;
                
                if (contractData.status === 'signed') {
                    showCompleted();
                    return;
                }
                
                if (contractData.status === 'expired') {
                    showExpired();
                    return;
                }
                
                displayContract(contractData);
            } catch (error) {
                console.error('계약서 로드 실패:', error);
                showExpired();
            }
        }

        // 계약서 표시
        function displayContract(data) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('contractContent').classList.remove('hidden');
            
            // 계약 타입에 따라 페이지 제목 변경
            const pageTitle = document.getElementById('pageTitle');
            if (data.contract_type === 'loan') {
                pageTitle.innerHTML = '<i class="fas fa-file-invoice-dollar mr-2"></i>Z-BIKE 대여금 계약서';
            } else {
                pageTitle.innerHTML = '<i class="fas fa-motorcycle mr-2"></i>Z-BIKE 오토바이 계약서';
            }
            
            // 계약 정보 표시
            const contractInfo = document.getElementById('contractInfo');
            const info = JSON.parse(data.contract_data);
            
            let infoHTML = '';
            
            // 차용증일 경우
            if (data.contract_type === 'loan') {
                infoHTML = `
                    <div class="space-y-4">
                        <div class="bg-indigo-50 p-4 rounded-lg border-l-4 border-indigo-600">
                            <p class="text-xl font-bold text-indigo-900 mb-3">📋 차주 정보</p>
                            <div class="space-y-2 text-gray-800">
                                <p><span class="font-semibold">성명:</span> ${data.customer_name}</p>
                                <p><span class="font-semibold">연락처:</span> ${data.customer_phone}</p>
                                ${info.resident_number ? `<p><span class="font-semibold">주민등록번호:</span> ${info.resident_number}</p>` : ''}
                                ${info.address ? `<p><span class="font-semibold">주소:</span> ${info.address}</p>` : ''}
                            </div>
                        </div>
                        <div class="bg-green-50 p-4 rounded-lg border-l-4 border-green-600">
                            <p class="text-xl font-bold text-green-900 mb-3">💰 대여금 정보</p>
                            <div class="space-y-2 text-gray-800">
                                ${info.loan_amount ? `<p><span class="font-semibold">대여금액:</span> ${parseInt(info.loan_amount).toLocaleString()}원</p>` : ''}
                                ${info.daily_deduction ? `<p><span class="font-semibold">일 차감액:</span> ${parseInt(info.daily_deduction).toLocaleString()}원</p>` : ''}
                                ${info.start_date ? `<p><span class="font-semibold">대여일:</span> ${info.start_date}</p>` : ''}
                                ${info.end_date ? `<p><span class="font-semibold">만기일:</span> ${info.end_date}</p>` : ''}
                            </div>
                        </div>
                        ${info.special_terms ? `
                        <div class="bg-yellow-50 p-4 rounded-lg border-l-4 border-yellow-600">
                            <p class="text-xl font-bold text-yellow-900 mb-3">📝 특약사항</p>
                            <p class="text-gray-800 whitespace-pre-wrap">${info.special_terms}</p>
                        </div>
                        ` : ''}
                    </div>
                `;
            } 
            // 오토바이 계약서 (리스/렌트/임시렌트)
            else {
                infoHTML = `
                    <div class="space-y-4">
                        <div class="bg-indigo-50 p-4 rounded-lg border-l-4 border-indigo-600">
                            <p class="text-xl font-bold text-indigo-900 mb-3">👤 고객 정보</p>
                            <div class="space-y-2 text-gray-800">
                                <p><span class="font-semibold">성명:</span> ${data.customer_name}</p>
                                <p><span class="font-semibold">연락처:</span> ${data.customer_phone}</p>
                                ${info.resident_number ? `<p><span class="font-semibold">주민등록번호:</span> ${info.resident_number}</p>` : ''}
                                ${info.address ? `<p><span class="font-semibold">주소:</span> ${info.address}</p>` : ''}
                            </div>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-lg border-l-4 border-blue-600">
                            <p class="text-xl font-bold text-blue-900 mb-3">🏍️ 오토바이 정보</p>
                            <div class="space-y-2 text-gray-800">
                                ${info.motorcycle_plate ? `<p><span class="font-semibold">차량번호:</span> ${info.motorcycle_plate}</p>` : ''}
                                ${info.motorcycle_name ? `<p><span class="font-semibold">차량명:</span> ${info.motorcycle_name}</p>` : ''}
                                ${info.chassis_number ? `<p><span class="font-semibold">차대번호:</span> ${info.chassis_number}</p>` : ''}
                            </div>
                        </div>
                        <div class="bg-green-50 p-4 rounded-lg border-l-4 border-green-600">
                            <p class="text-xl font-bold text-green-900 mb-3">📋 계약 정보</p>
                            <div class="space-y-2 text-gray-800">
                                ${info.start_date ? `<p><span class="font-semibold">계약 시작일:</span> ${info.start_date}</p>` : ''}
                                ${info.end_date ? `<p><span class="font-semibold">계약 종료일:</span> ${info.end_date}</p>` : ''}
                                ${info.monthly_fee ? `<p><span class="font-semibold">월 대여료:</span> ${parseInt(info.monthly_fee).toLocaleString()}원</p>` : ''}
                                ${info.daily_fee ? `<p><span class="font-semibold">일 차감액:</span> ${parseInt(info.daily_fee).toLocaleString()}원</p>` : ''}
                                ${info.deposit ? `<p><span class="font-semibold">보증금:</span> ${parseInt(info.deposit).toLocaleString()}원</p>` : ''}
                                ${info.driving_range ? `<p><span class="font-semibold">운전연령:</span> ${info.driving_range}</p>` : ''}
                            </div>
                        </div>
                        ${info.special_terms ? `
                        <div class="bg-yellow-50 p-4 rounded-lg border-l-4 border-yellow-600">
                            <p class="text-xl font-bold text-yellow-900 mb-3">📝 특약사항</p>
                            <p class="text-gray-800 whitespace-pre-wrap">${info.special_terms}</p>
                        </div>
                        ` : ''}
                    </div>
                `;
            }
            
            contractInfo.innerHTML = infoHTML;
            
            // 약관 표시 (타입별로 다른 약관)
            const terms = getContractTerms(data.contract_type);
            document.getElementById('contractTerms').innerHTML = terms;
        }

        // 계약 타입명
        function getContractTypeName(type) {
            const types = {
                'individual': '개인 계약 (리스/렌트)',
                'business': '업체 계약',
                'loan': '차용증'
            };
            return types[type] || type;
        }

        // 필드명 포맷
        function formatFieldName(key) {
            const names = {
                'motorcycle_id': '오토바이',
                'start_date': '시작일',
                'end_date': '종료일',
                'monthly_fee': '월 대여료',
                'deposit': '보증금',
                'daily_amount': '일 금액',
                'loan_amount': '차용 금액',
                'daily_deduction': '일 차감액'
            };
            return names[key] || key;
        }

        // 약관 내용
        function getContractTerms(type) {
            const companyName = companySettings?.company_name || 'Z-BIKE';
            const businessNumber = companySettings?.business_number || '사업자등록번호';
            const representative = companySettings?.representative || '대표자';
            const companyAddress = companySettings?.address || '주소';
            const companyPhone = companySettings?.phone || '연락처';
            
            if (type === 'loan') {
                // 차용증 약관
                return `
                    <div class="mb-6 p-4 bg-indigo-50 rounded-lg border-l-4 border-indigo-600">
                        <h3 class="font-bold text-lg mb-3">대주 정보</h3>
                        <div class="space-y-1 text-gray-800">
                            <p><span class="font-semibold">상호명:</span> ${companyName}</p>
                            <p><span class="font-semibold">사업자등록번호:</span> ${businessNumber}</p>
                            <p><span class="font-semibold">대표자:</span> ${representative}</p>
                            <p><span class="font-semibold">주소:</span> ${companyAddress}</p>
                            <p><span class="font-semibold">연락처:</span> ${companyPhone}</p>
                        </div>
                    </div>
                    
                    <h3 class="font-bold text-lg mb-3">금전소비대차 약관</h3>
                    
                    <div class="space-y-4">
                        <div>
                            <h4 class="font-bold mb-2">제1조 (목적)</h4>
                            <p class="text-gray-700">본 약관은 대주와 차주 간의 금전 대여에 관한 권리와 의무를 명확히 하여 원활한 거래를 도모함을 목적으로 합니다.</p>
                        </div>
                        
                        <div>
                            <h4 class="font-bold mb-2">제2조 (대여금의 지급)</h4>
                            <p class="text-gray-700">대주는 차주에게 계약서에 명시된 금액을 대여하며, 지급 방법은 현금 또는 계좌이체로 합니다.</p>
                        </div>
                        
                        <div>
                            <h4 class="font-bold mb-2">제3조 (상환 방법)</h4>
                            <p class="text-gray-700">차주는 매일 명시된 일차감액을 차감하는 방식으로 대여금을 상환합니다. 상환 기한을 준수해야 하며, 지연 시 연체료가 부과될 수 있습니다.</p>
                        </div>
                        
                        <div>
                            <h4 class="font-bold mb-2">제4조 (이자)</h4>
                            <p class="text-gray-700">이자율은 법정 최고 이자율을 초과하지 않으며, 구체적인 이자 조건은 계약서에 명시된 바에 따릅니다.</p>
                        </div>
                        
                        <div>
                            <h4 class="font-bold mb-2">제5조 (기한의 이익 상실)</h4>
                            <p class="text-gray-700">차주가 약정 상환을 2회 이상 연체하거나 허위 정보를 제공한 경우, 대주는 기한의 이익을 상실시키고 즉시 전액 상환을 청구할 수 있습니다.</p>
                        </div>
                        
                        <div>
                            <h4 class="font-bold mb-2">제6조 (담보 및 보증)</h4>
                            <p class="text-gray-700">본 대여는 무담보 대여이며, 별도의 담보나 보증인이 요구될 수 있습니다.</p>
                        </div>
                        
                        <div>
                            <h4 class="font-bold mb-2">제7조 (분쟁 해결)</h4>
                            <p class="text-gray-700">본 계약과 관련한 분쟁은 당사자 간 협의로 해결하며, 협의가 이루어지지 않을 경우 관할 법원의 판결에 따릅니다.</p>
                        </div>
                    </div>
                `;
            } else {
                // 오토바이 계약 약관
                return `
                    <div class="mb-6 p-4 bg-indigo-50 rounded-lg border-l-4 border-indigo-600">
                        <h3 class="font-bold text-lg mb-3">업체 정보</h3>
                        <div class="space-y-1 text-gray-800">
                            <p><span class="font-semibold">상호명:</span> ${companyName}</p>
                            <p><span class="font-semibold">사업자등록번호:</span> ${businessNumber}</p>
                            <p><span class="font-semibold">대표자:</span> ${representative}</p>
                            <p><span class="font-semibold">주소:</span> ${companyAddress}</p>
                            <p><span class="font-semibold">연락처:</span> ${companyPhone}</p>
                        </div>
                    </div>
                    
                    <h3 class="font-bold text-lg mb-3">오토바이 대여 약관</h3>
                    
                    <div class="space-y-4">
                        <div>
                            <h4 class="font-bold mb-2">제1조 (목적)</h4>
                            <p class="text-gray-700">본 약관은 오토바이 대여 계약에 관한 조건을 정함을 목적으로 합니다.</p>
                        </div>
                        
                        <div>
                            <h4 class="font-bold mb-2">제2조 (대여 기간 및 요금)</h4>
                            <p class="text-gray-700">대여 기간과 요금은 계약서에 명시된 조건에 따르며, 임차인은 이를 준수해야 합니다.</p>
                        </div>
                        
                        <div>
                            <h4 class="font-bold mb-2">제3조 (차량 관리 의무)</h4>
                            <p class="text-gray-700">임차인은 선량한 관리자의 주의로 차량을 관리하고, 정기적인 점검 및 유지보수를 실시해야 합니다.</p>
                        </div>
                        
                        <div>
                            <h4 class="font-bold mb-2">제4조 (사고 및 보험)</h4>
                            <p class="text-gray-700">사고 발생 시 즉시 업체에 통보해야 하며, 보험 처리는 계약 조건에 따릅니다. 임차인의 과실로 인한 손해는 임차인이 부담합니다.</p>
                        </div>
                        
                        <div>
                            <h4 class="font-bold mb-2">제5조 (계약 해지)</h4>
                            <p class="text-gray-700">계약 위반 시 업체는 계약을 해지할 수 있으며, 임차인은 위약금을 부담할 수 있습니다.</p>
                        </div>
                        
                        <div>
                            <h4 class="font-bold mb-2">제6조 (반환)</h4>
                            <p class="text-gray-700">계약 종료 시 차량을 원상태로 반환해야 하며, 손상이 있을 경우 수리 비용을 부담해야 합니다.</p>
                        </div>
                        
                        <div>
                            <h4 class="font-bold mb-2">제7조 (분쟁 해결)</h4>
                            <p class="text-gray-700">본 계약과 관련한 분쟁은 당사자 간 협의로 해결하며, 협의가 이루어지지 않을 경우 관할 법원의 판결에 따릅니다.</p>

                    </div>
                `;
            }
        }

        // 서명 패드 초기화
        function initSignaturePad() {
            const canvas = document.getElementById('signatureCanvas');
            const ctx = canvas.getContext('2d');
            
            let isDrawing = false;
            let lastX = 0;
            let lastY = 0;
            
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);
            
            // 터치 이벤트
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                lastX = touch.clientX - rect.left;
                lastY = touch.clientY - rect.top;
                isDrawing = true;
            });
            
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isDrawing) return;
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.stroke();
                
                lastX = x;
                lastY = y;
            });
            
            canvas.addEventListener('touchend', () => {
                isDrawing = false;
            });
            
            function startDrawing(e) {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                lastX = e.clientX - rect.left;
                lastY = e.clientY - rect.top;
            }
            
            function draw(e) {
                if (!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.stroke();
                
                lastX = x;
                lastY = y;
            }
            
            function stopDrawing() {
                isDrawing = false;
            }
        }

        // 서명 지우기
        function clearSignature() {
            const canvas = document.getElementById('signatureCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 카메라 시작
        async function startCamera() {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                const video = document.getElementById('video');
                video.srcObject = currentStream;
                
                document.getElementById('captureButtons').classList.add('hidden');
                document.getElementById('cameraSection').classList.remove('hidden');
            } catch (error) {
                alert('카메라에 접근할 수 없습니다.');
                console.error('카메라 오류:', error);
            }
        }

        // 사진 촬영
        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            idCardPhoto = canvas.toDataURL('image/jpeg', 0.8);
            
            stopCamera();
            showPreview(idCardPhoto);
        }

        // 카메라 중지
        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            
            document.getElementById('cameraSection').classList.add('hidden');
            document.getElementById('captureButtons').classList.remove('hidden');
        }

        // 파일 업로드
        function uploadFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                idCardPhoto = e.target.result;
                showPreview(idCardPhoto);
            };
            reader.readAsDataURL(file);
        }

        // 미리보기 표시
        function showPreview(dataUrl) {
            document.getElementById('preview').src = dataUrl;
            document.getElementById('previewSection').classList.remove('hidden');
            document.getElementById('captureButtons').classList.add('hidden');
        }

        // 사진 삭제
        function deletePhoto() {
            idCardPhoto = '';
            document.getElementById('previewSection').classList.add('hidden');
            document.getElementById('captureButtons').classList.remove('hidden');
        }

        // 계약서 제출
        async function submitContract() {
            // 약관 동의 확인
            if (!document.getElementById('agreeTerms').checked) {
                alert('약관에 동의해주세요.');
                return;
            }
            
            // 서명 확인
            const canvas = document.getElementById('signatureCanvas');
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const hasSignature = imageData.data.some(channel => channel !== 0);
            
            if (!hasSignature) {
                alert('서명을 해주세요.');
                return;
            }
            
            const signatureData = canvas.toDataURL('image/png');
            
            // 신분증 확인
            if (!idCardPhoto) {
                alert('신분증을 촬영하거나 업로드해주세요.');
                return;
            }
            
            try {
                await axios.post(`/api/contract-share/${shareToken}/sign`, {
                    signature_data: signatureData,
                    id_card_photo: idCardPhoto
                });
                
                showCompleted();
            } catch (error) {
                alert('제출에 실패했습니다. 다시 시도해주세요.');
                console.error('제출 오류:', error);
            }
        }

        // 만료 화면 표시
        function showExpired() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('expired').classList.remove('hidden');
        }

        // 완료 화면 표시
        function showCompleted() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('contractContent').classList.add('hidden');
            document.getElementById('completed').classList.remove('hidden');
        }
    </script>
</body>
