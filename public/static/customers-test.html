<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계약자 목록 테스트</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">계약자 목록 테스트</h1>
        
        <div id="status" class="mb-4 p-4 bg-blue-100 rounded"></div>
        
        <div id="customerList" class="bg-white rounded-lg shadow p-6">
            <p>로딩 중...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        console.log('✅ 스크립트 시작');
        
        // 인증 확인
        const sessionId = localStorage.getItem('sessionId');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        document.getElementById('status').innerHTML = `
            <p><strong>Session ID:</strong> ${sessionId || '❌ 없음'}</p>
            <p><strong>User:</strong> ${user.name || '❌ 없음'} (${user.role || '-'})</p>
        `;
        
        if (!sessionId) {
            document.getElementById('customerList').innerHTML = `
                <p class="text-red-600">❌ 로그인이 필요합니다.</p>
                <a href="/login" class="text-blue-600 underline">로그인 페이지로 이동</a>
            `;
        } else {
            // API 호출
            console.log('📡 API 호출 시작...');
            
            axios.get('/api/customers', {
                headers: { 'X-Session-ID': sessionId }
            })
            .then(response => {
                console.log('✅ API 성공:', response.data);
                const customers = response.data;
                
                let html = `
                    <h2 class="text-xl font-bold mb-4">총 ${customers.length}명</h2>
                    <table class="w-full">
                        <thead>
                            <tr class="bg-gray-100">
                                <th class="p-2 text-left">이름</th>
                                <th class="p-2 text-left">전화번호</th>
                                <th class="p-2 text-left">주민등록번호</th>
                                <th class="p-2 text-left">주소</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                customers.forEach(customer => {
                    html += `
                        <tr class="border-t">
                            <td class="p-2">${customer.name}</td>
                            <td class="p-2">${customer.phone}</td>
                            <td class="p-2">${customer.resident_number.replace(/(\d{6})-(\d{7})/, '$1-*******')}</td>
                            <td class="p-2">${customer.address || '-'}</td>
                        </tr>
                    `;
                });
                
                html += `
                        </tbody>
                    </table>
                `;
                
                document.getElementById('customerList').innerHTML = html;
            })
            .catch(error => {
                console.error('❌ API 실패:', error);
                document.getElementById('customerList').innerHTML = `
                    <p class="text-red-600">❌ API 호출 실패</p>
                    <pre class="mt-4 bg-gray-100 p-4 rounded text-sm">${JSON.stringify(error.response || error.message, null, 2)}</pre>
                `;
            });
        }
    </script>
</body>
</html>
