<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계약자 목록 테스트</title>
</head>
<body>
    <h1>테스트 페이지</h1>
    <div id="result"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        console.log('[테스트] 시작');
        
        async function testLoad() {
            try {
                const sid = localStorage.getItem('sessionId');
                console.log('[세션 ID]', sid);
                
                if (!sid) {
                    document.getElementById('result').innerHTML = '로그인 필요';
                    return;
                }
                
                const res = await axios.get('/api/customers', {
                    headers: { 'X-Session-ID': sid }
                });
                
                console.log('[성공]', res.data);
                document.getElementById('result').innerHTML = '데이터 개수: ' + res.data.length;
            } catch (err) {
                console.error('[실패]', err);
                document.getElementById('result').innerHTML = '에러: ' + err.message;
            }
        }
        
        window.addEventListener('DOMContentLoaded', testLoad);
    </script>
</body>
</html>
