<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>업체 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <style>
        @media print {
            @page {
                size: A4;
                margin: 10mm;
            }
            body {
                background: white;
            }
            .print-hidden {
                display: none !important;
            }
            #detailModal {
                position: static;
                background: white;
            }
            #detailModal > div {
                box-shadow: none;
                max-height: none;
                overflow: visible;
            }
            .resident-number-masked {
                display: none;
            }
            .resident-number-full {
                display: inline !important;
            }
        }
        @media screen {
            .resident-number-full {
                display: none;
            }
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 헤더 -->
    <header class="bg-pink-600 text-white shadow-md sticky top-0 z-10 print-hidden">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center gap-4">
                <button id="backBtn" class="hover:bg-pink-700 p-2 rounded-lg transition-colors">
                    <i class="fas fa-arrow-left text-2xl"></i>
                </button>
                <h1 class="text-2xl font-bold">
                    <i class="fas fa-building mr-2"></i>업체 목록
                </h1>
            </div>
        </div>
    </header>

    <!-- 메인 콘텐츠 -->
    <div class="container mx-auto px-4 py-6">
        <!-- 업체 정보 등록 섹션 -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-bold mb-4 text-gray-800">
                <i class="fas fa-building mr-2 text-pink-600"></i>업체 정보 등록
            </h2>
            <form id="companyForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">업체명 *</label>
                        <input type="text" id="companyName" required placeholder="예: 대성모터스" 
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-pink-500">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">사업자번호 *</label>
                        <input type="text" id="companyBusinessNumber" required placeholder="123-45-67890" 
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-pink-500">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">대표자 이름 *</label>
                        <input type="text" id="companyRepresentative" required placeholder="홍길동" 
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-pink-500">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">주민등록번호 *</label>
                        <input type="text" id="companyResidentNumber" required placeholder="000000-0000000" maxlength="14"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-pink-500">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">전화번호 *</label>
                        <input type="tel" id="companyPhone" required placeholder="010-0000-0000" 
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-pink-500">
                    </div>
                </div>

                <!-- 주소 입력 -->
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-gray-700">주소 *</label>
                    <div class="flex gap-2">
                        <input type="text" id="companyPostcode" required readonly placeholder="우편번호" 
                            class="w-32 px-4 py-2 border rounded-lg bg-gray-50">
                        <button type="button" id="searchBtn" 
                            class="px-4 py-2 bg-pink-600 hover:bg-pink-700 text-white rounded-lg">
                            <i class="fas fa-search mr-1"></i>우편번호 찾기
                        </button>
                    </div>
                    <input type="text" id="companyAddress" required readonly placeholder="기본 주소" 
                        class="w-full px-4 py-2 border rounded-lg bg-gray-50">
                    <input type="text" id="companyDetailAddress" placeholder="상세 주소" 
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-pink-500">
                </div>

                <!-- 대표자 서명 -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">대표자 서명 *</label>
                    <p class="text-xs text-gray-600 mb-2">
                        <i class="fas fa-info-circle mr-1"></i>
                        서명란을 클릭하거나 '서명하기' 버튼을 눌러 확대된 화면에서 서명하세요
                    </p>
                    <div class="border rounded-lg p-4 bg-gray-50">
                        <div class="text-center mb-2">
                            <canvas id="signaturePreview" width="300" height="100" 
                                onclick="openSignatureModal()"
                                class="border bg-white mx-auto cursor-pointer hover:border-blue-500 transition-colors"
                                title="클릭하여 서명하기"
                                style="max-width: 100%;"></canvas>
                        </div>
                        <div class="flex gap-2">
                            <button type="button" id="openSignatureBtn" 
                                class="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm">
                                <i class="fas fa-signature mr-1"></i>서명하기
                            </button>
                            <button type="button" id="clearSignatureBtn" 
                                class="px-4 py-2 bg-gray-500 hover:bg-gray-600 text-white rounded-lg text-sm">
                                <i class="fas fa-eraser mr-1"></i>지우기
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 신분증 사진 -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">대표자 신분증 *</label>
                    <div class="border rounded-lg p-4 bg-gray-50">
                        <div class="text-center mb-2">
                            <img id="idCardPreview" class="hidden border bg-white mx-auto" 
                                style="max-width: 100%; max-height: 200px;" />
                            <div id="idCardPlaceholder" class="text-gray-400 py-8">
                                <i class="fas fa-id-card text-4xl mb-2"></i>
                                <div>신분증 사진을 등록해주세요</div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button type="button" id="captureIdBtn" 
                                class="flex-1 px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm">
                                <i class="fas fa-camera mr-1"></i>촬영
                            </button>
                            <button type="button" id="uploadIdBtn" 
                                class="flex-1 px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg text-sm">
                                <i class="fas fa-upload mr-1"></i>업로드
                            </button>
                            <button type="button" id="clearIdBtn" 
                                class="px-4 py-2 bg-gray-500 hover:bg-gray-600 text-white rounded-lg text-sm">
                                <i class="fas fa-trash mr-1"></i>삭제
                            </button>
                        </div>
                        <input type="file" id="idCardFileInput" accept="image/*" class="hidden" />
                    </div>
                </div>

                <div class="flex gap-2">
                    <button type="button" id="clearBtn" 
                        class="flex-1 px-4 py-2 bg-gray-500 hover:bg-gray-600 text-white rounded-lg">
                        초기화
                    </button>
                    <button type="submit" 
                        class="flex-1 px-4 py-2 bg-pink-600 hover:bg-pink-700 text-white rounded-lg font-bold">
                        저장
                    </button>
                </div>
            </form>
        </div>

        <!-- 업체 목록 섹션 -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold mb-4 text-gray-800">
                <i class="fas fa-list mr-2 text-pink-600"></i>등록된 업체
            </h2>
            <div id="loadingState" class="text-center py-8 text-gray-500">
                <i class="fas fa-spinner fa-spin mr-2"></i>업체 목록을 불러오는 중...
            </div>
            <div id="emptyState" class="hidden text-center py-8 text-gray-500">
                등록된 업체(임차인)가 없습니다.
            </div>
            <div id="companyList"></div>
        </div>
    </div>

    <!-- 서명 모달 -->
    <div id="signatureModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full">
            <div class="border-b px-6 py-4 flex justify-between items-center">
                <h3 class="text-xl font-bold text-gray-800">
                    <i class="fas fa-signature mr-2 text-blue-600"></i>서명 입력
                </h3>
                <button onclick="closeSignatureModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>
            <div class="p-6">
                <div class="mb-4 text-sm text-gray-600">
                    마우스나 손가락으로 아래 영역에 서명해주세요.
                </div>
                <div class="border-2 border-dashed border-gray-300 rounded-lg overflow-hidden">
                    <canvas id="signatureCanvas" width="800" height="300" 
                        class="bg-white cursor-crosshair" style="width: 100%; height: auto;"></canvas>
                </div>
                <div class="flex gap-2 mt-4">
                    <button onclick="clearSignature()" 
                        class="flex-1 px-4 py-3 bg-gray-500 hover:bg-gray-600 text-white rounded-lg">
                        <i class="fas fa-eraser mr-2"></i>지우기
                    </button>
                    <button onclick="saveSignature()" 
                        class="flex-1 px-4 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold">
                        <i class="fas fa-check mr-2"></i>서명 완료
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 카메라 모달 -->
    <div id="cameraModal" class="hidden fixed inset-0 bg-black bg-opacity-95 z-50">
        <div class="h-full flex flex-col">
            <!-- 헤더 -->
            <div class="bg-blue-600 px-4 py-3 flex justify-between items-center">
                <h3 class="text-lg font-bold text-white">
                    <i class="fas fa-camera mr-2"></i>신분증 촬영
                </h3>
                <button onclick="closeCameraModal()" class="text-white hover:text-gray-200">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>
            
            <!-- 안내 메시지 -->
            <div class="bg-yellow-400 px-4 py-2">
                <p class="text-sm text-gray-800 text-center">
                    <i class="fas fa-info-circle mr-1"></i>
                    신분증을 가로로 놓고 틀 안에 꽉 채워주세요
                </p>
            </div>
            
            <!-- 카메라 영역 -->
            <div class="flex-1 relative bg-black overflow-hidden">
                <video id="cameraVideo" autoplay playsinline 
                    class="w-full h-full object-cover"
                    style="filter: brightness(1.2) contrast(1.1);"></video>
                
                <!-- 신분증 가이드 틀 -->
                <div class="absolute left-0 right-0 flex justify-center pointer-events-none" style="top: 60px;">
                    <div class="relative" style="width: 85%; max-width: 480px; aspect-ratio: 85.6/53.98;">
                        <!-- 반투명 오버레이 (틀 밖) -->
                        <div class="absolute inset-0" style="
                            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
                            border: 3px solid #10B981;
                            border-radius: 12px;
                        "></div>
                        
                        <!-- 모서리 가이드 -->
                        <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-green-400 rounded-tl-xl"></div>
                        <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-green-400 rounded-tr-xl"></div>
                        <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-green-400 rounded-bl-xl"></div>
                        <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-green-400 rounded-br-xl"></div>
                        
                        <!-- 중앙 십자선 -->
                        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
                            <div class="w-8 h-0.5 bg-green-400 mb-1"></div>
                            <div class="w-0.5 h-8 bg-green-400 mx-auto"></div>
                        </div>
                    </div>
                </div>
                
                <!-- 하단 안내 텍스트 -->
                <div class="absolute left-0 right-0 text-center" style="bottom: 100px;">
                    <p class="text-white text-sm bg-black bg-opacity-50 inline-block px-4 py-2 rounded-full">
                        신분증을 이 틀 안에 맞춰주세요
                    </p>
                </div>
            </div>
            
            <!-- 버튼 영역 -->
            <div class="bg-gray-900 px-4 py-4 flex gap-3">
                <button onclick="closeCameraModal()" 
                    class="flex-1 px-4 py-3 bg-red-600 hover:bg-red-700 text-white rounded-lg font-bold">
                    <i class="fas fa-times mr-2"></i>취소
                </button>
                <button onclick="capturePhoto()" 
                    class="flex-1 px-4 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold">
                    <i class="fas fa-camera mr-2"></i>촬영
                </button>
            </div>
        </div>
    </div>

    <!-- 상세보기 모달 -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center print-hidden">
                <h3 class="text-2xl font-bold text-gray-800">
                    <i class="fas fa-building mr-2 text-pink-600"></i>업체 상세정보
                </h3>
                <div class="flex gap-2">
                    <button onclick="printDetail()" class="px-4 py-2 bg-pink-600 hover:bg-pink-700 text-white rounded-lg">
                        <i class="fas fa-print mr-1"></i>인쇄
                    </button>
                    <button onclick="closeDetailModal()" class="px-4 py-2 bg-gray-500 hover:bg-gray-600 text-white rounded-lg">
                        <i class="fas fa-times mr-1"></i>닫기
                    </button>
                </div>
            </div>
            <div id="detailContent" class="p-6 space-y-4"></div>
        </div>
    </div>

    <script>
        let companies = [];
        let signatureData = null;
        let idCardData = null;
        let isDrawing = false;
        let signatureCanvas = null;
        let signatureCtx = null;
        let cameraStream = null;
        
        function log(msg) {
            console.log(msg);
        }

        // 우편번호 검색
        function searchAddress() {
            log('🔍 searchAddress 호출');
            
            if (typeof daum === 'undefined' || typeof daum.Postcode === 'undefined') {
                alert('Daum API가 로드되지 않았습니다.');
                return;
            }
            
            new daum.Postcode({
                oncomplete: function(data) {
                    document.getElementById('companyPostcode').value = data.zonecode;
                    document.getElementById('companyAddress').value = data.address;
                    document.getElementById('companyDetailAddress').focus();
                }
            }).open();
        }

        // 폼 초기화
        function clearForm() {
            document.getElementById('companyForm').reset();
            signatureData = null;
            idCardData = null;
            
            // 서명 미리보기 초기화
            const signaturePreview = document.getElementById('signaturePreview');
            const previewCtx = signaturePreview.getContext('2d');
            previewCtx.clearRect(0, 0, signaturePreview.width, signaturePreview.height);
            
            // 신분증 미리보기 초기화
            document.getElementById('idCardPreview').classList.add('hidden');
            document.getElementById('idCardPlaceholder').classList.remove('hidden');
        }

        // 서명 모달 열기
        function openSignatureModal() {
            document.getElementById('signatureModal').classList.remove('hidden');
            
            // 캔버스 초기화
            signatureCanvas = document.getElementById('signatureCanvas');
            signatureCtx = signatureCanvas.getContext('2d');
            signatureCtx.fillStyle = 'white';
            signatureCtx.fillRect(0, 0, signatureCanvas.width, signatureCanvas.height);
            signatureCtx.strokeStyle = '#000';
            signatureCtx.lineWidth = 2;
            signatureCtx.lineCap = 'round';
            
            // 기존 서명이 있으면 로드
            if (signatureData) {
                const img = new Image();
                img.onload = function() {
                    signatureCtx.drawImage(img, 0, 0);
                };
                img.src = signatureData;
            }
            
            // 이벤트 리스너 추가
            signatureCanvas.addEventListener('mousedown', startDrawing);
            signatureCanvas.addEventListener('mousemove', draw);
            signatureCanvas.addEventListener('mouseup', stopDrawing);
            signatureCanvas.addEventListener('mouseout', stopDrawing);
            
            // 터치 이벤트
            signatureCanvas.addEventListener('touchstart', handleTouchStart);
            signatureCanvas.addEventListener('touchmove', handleTouchMove);
            signatureCanvas.addEventListener('touchend', stopDrawing);
        }

        // 서명 모달 닫기
        function closeSignatureModal() {
            document.getElementById('signatureModal').classList.add('hidden');
            
            // 이벤트 리스너 제거
            if (signatureCanvas) {
                signatureCanvas.removeEventListener('mousedown', startDrawing);
                signatureCanvas.removeEventListener('mousemove', draw);
                signatureCanvas.removeEventListener('mouseup', stopDrawing);
                signatureCanvas.removeEventListener('mouseout', stopDrawing);
                signatureCanvas.removeEventListener('touchstart', handleTouchStart);
                signatureCanvas.removeEventListener('touchmove', handleTouchMove);
                signatureCanvas.removeEventListener('touchend', stopDrawing);
            }
        }

        // 그리기 시작
        function startDrawing(e) {
            isDrawing = true;
            const rect = signatureCanvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (signatureCanvas.width / rect.width);
            const y = (e.clientY - rect.top) * (signatureCanvas.height / rect.height);
            signatureCtx.beginPath();
            signatureCtx.moveTo(x, y);
        }

        // 그리기
        function draw(e) {
            if (!isDrawing) return;
            const rect = signatureCanvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (signatureCanvas.width / rect.width);
            const y = (e.clientY - rect.top) * (signatureCanvas.height / rect.height);
            signatureCtx.lineTo(x, y);
            signatureCtx.stroke();
        }

        // 그리기 중지
        function stopDrawing() {
            isDrawing = false;
        }

        // 터치 시작
        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            signatureCanvas.dispatchEvent(mouseEvent);
        }

        // 터치 이동
        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousemove', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            signatureCanvas.dispatchEvent(mouseEvent);
        }

        // 서명 지우기
        function clearSignature() {
            signatureCtx.fillStyle = 'white';
            signatureCtx.fillRect(0, 0, signatureCanvas.width, signatureCanvas.height);
        }

        // 서명 저장
        function saveSignature() {
            // JPEG로 변환 (품질 0.6, 배경 흰색)
            signatureData = signatureCanvas.toDataURL('image/jpeg', 0.6);
            
            // 미리보기에 표시
            const signaturePreview = document.getElementById('signaturePreview');
            const previewCtx = signaturePreview.getContext('2d');
            const img = new Image();
            img.onload = function() {
                previewCtx.clearRect(0, 0, signaturePreview.width, signaturePreview.height);
                previewCtx.drawImage(img, 0, 0, signaturePreview.width, signaturePreview.height);
            };
            img.src = signatureData;
            
            closeSignatureModal();
            log('✅ 서명 저장됨: ' + Math.round(signatureData.length / 1024) + ' KB');
        }

        // 서명 미리보기 지우기
        function clearSignaturePreview() {
            signatureData = null;
            const signaturePreview = document.getElementById('signaturePreview');
            const previewCtx = signaturePreview.getContext('2d');
            previewCtx.clearRect(0, 0, signaturePreview.width, signaturePreview.height);
        }

        // 카메라 시작
        async function startCamera() {
            try {
                document.getElementById('cameraModal').classList.remove('hidden');
                const video = document.getElementById('cameraVideo');
                
                // 고품질 카메라 설정 (밝기 및 해상도 향상)
                cameraStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        // 밝기 및 노출 자동 조절
                        advanced: [
                            { exposureMode: 'continuous' },
                            { whiteBalanceMode: 'continuous' },
                            { focusMode: 'continuous' }
                        ]
                    } 
                });
                
                video.srcObject = cameraStream;
                
                // 비디오 트랙 설정 (밝기 향상)
                const track = cameraStream.getVideoTracks()[0];
                const capabilities = track.getCapabilities();
                const settings = {};
                
                // 밝기 조절 가능하면 설정
                if (capabilities.brightness) {
                    settings.brightness = capabilities.brightness.max * 0.6; // 밝기 60%
                }
                if (capabilities.contrast) {
                    settings.contrast = capabilities.contrast.max * 0.6; // 대비 60%
                }
                if (capabilities.exposureCompensation) {
                    settings.exposureCompensation = capabilities.exposureCompensation.max * 0.3;
                }
                
                if (Object.keys(settings).length > 0) {
                    await track.applyConstraints({ advanced: [settings] });
                }
                
                log('✅ 카메라 시작됨 (고품질 모드)');
            } catch (error) {
                log('❌ 카메라 오류: ' + error.message);
                alert('카메라 접근 권한이 필요합니다.');
                closeCameraModal();
            }
        }

        // 카메라 모달 닫기
        function closeCameraModal() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            document.getElementById('cameraModal').classList.add('hidden');
        }

        // 사진 촬영
        function capturePhoto() {
            const video = document.getElementById('cameraVideo');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            // JPEG로 변환 (품질 0.7)
            const imageData = canvas.toDataURL('image/jpeg', 0.7);
            setIdCardImage(imageData);
            closeCameraModal();
        }

        // 파일 업로드
        function handleIdCardUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                // 이미지 리사이즈 및 JPEG 변환
                resizeImage(event.target.result, 1200, 1200, 0.7, function(resized) {
                    setIdCardImage(resized);
                });
            };
            reader.readAsDataURL(file);
        }

        // 이미지 리사이즈
        function resizeImage(dataUrl, maxWidth, maxHeight, quality, callback) {
            const img = new Image();
            img.onload = function() {
                let width = img.width;
                let height = img.height;
                
                if (width > maxWidth || height > maxHeight) {
                    const ratio = Math.min(maxWidth / width, maxHeight / height);
                    width = width * ratio;
                    height = height * ratio;
                }
                
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                callback(canvas.toDataURL('image/jpeg', quality));
            };
            img.src = dataUrl;
        }

        // 신분증 이미지 설정
        function setIdCardImage(imageData) {
            idCardData = imageData;
            
            document.getElementById('idCardPreview').src = imageData;
            document.getElementById('idCardPreview').classList.remove('hidden');
            document.getElementById('idCardPlaceholder').classList.add('hidden');
            
            log('✅ 신분증 사진 등록됨: ' + Math.round(imageData.length / 1024) + ' KB');
        }

        // 신분증 삭제
        function clearIdCard() {
            idCardData = null;
            document.getElementById('idCardPreview').classList.add('hidden');
            document.getElementById('idCardPlaceholder').classList.remove('hidden');
            document.getElementById('idCardFileInput').value = '';
        }

        // 업체 목록 로드
        async function loadCompanies() {
            log('📋 업체 목록 로드 시작');
            
            const sessionId = localStorage.getItem('sessionId');
            if (!sessionId) {
                alert('로그인이 필요합니다.');
                window.location.href = '/static/login.html';
                return;
            }
            
            try {
                const response = await axios.get('/api/companies', {
                    headers: { 'X-Session-ID': sessionId }
                });
                
                companies = response.data;
                log('✅ 업체 수: ' + companies.length);
                displayCompanies();
            } catch (error) {
                log('❌ 로드 실패: ' + error.message);
                alert('업체 목록을 불러오는데 실패했습니다.');
            }
        }

        // 업체 목록 표시
        function displayCompanies() {
            const loadingState = document.getElementById('loadingState');
            const emptyState = document.getElementById('emptyState');
            const companyList = document.getElementById('companyList');
            
            loadingState.classList.add('hidden');
            
            if (companies.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
            const isSuperAdmin = currentUser.role === 'super_admin';
            
            const html = companies.map(company => `
                <div class="border-b py-4 flex justify-between items-center">
                    <div class="flex-1">
                        <div class="font-bold text-lg">${company.name}</div>
                        <div class="text-sm text-gray-600">
                            사업자번호: ${company.business_number} | 대표자: ${company.representative} | 전화번호: ${company.phone}
                        </div>
                        <div class="text-sm text-gray-500">${company.address || ''} ${company.detail_address || ''}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="showDetail(${company.id})" 
                            class="px-4 py-2 bg-pink-600 hover:bg-pink-700 text-white rounded-lg text-sm">
                            상세
                        </button>
                        ${isSuperAdmin ? `
                        <button onclick="deleteCompany(${company.id}, '${company.name}')" 
                            class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm">
                            삭제
                        </button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
            
            companyList.innerHTML = html;
        }

        // 업체 저장
        async function saveCompany(e) {
            e.preventDefault();
            log('💾 업체 저장 시작');
            
            const sessionId = localStorage.getItem('sessionId');
            if (!sessionId) {
                alert('로그인이 필요합니다.');
                window.location.href = '/static/login.html';
                return;
            }
            
            const data = {
                name: document.getElementById('companyName').value.trim(),
                business_number: document.getElementById('companyBusinessNumber').value.trim(),
                representative: document.getElementById('companyRepresentative').value.trim(),
                representative_resident_number: document.getElementById('companyResidentNumber').value.trim(),
                phone: document.getElementById('companyPhone').value.trim(),
                postcode: document.getElementById('companyPostcode').value.trim(),
                address: document.getElementById('companyAddress').value.trim(),
                detail_address: document.getElementById('companyDetailAddress').value.trim() || '',
                signature_data: signatureData,
                id_card_photo: idCardData,
                terms_agreed: true // 약관 동의 여부
            };
            
            if (!document.getElementById('companyPostcode').value) {
                alert('우편번호를 검색하세요.');
                return;
            }
            
            if (!signatureData) {
                alert('대표자 서명을 입력해주세요.');
                return;
            }
            
            if (!idCardData) {
                alert('대표자 신분증을 등록해주세요.');
                return;
            }
            
            try {
                await axios.post('/api/companies', data, {
                    headers: { 
                        'X-Session-ID': sessionId,
                        'Content-Type': 'application/json'
                    }
                });
                
                log('✅ 저장 성공');
                alert('✅ 업체 정보가 저장되었습니다.');
                
                // 업체 등록 목록 페이지로 이동
                window.location.href = '/static/companies-list.html';
            } catch (error) {
                log('❌ 저장 실패: ' + error.message);
                alert('❌ 저장 실패: ' + error.message);
            }
        }

        // 상세보기
        function showDetail(id) {
            const company = companies.find(c => c.id === id);
            if (!company) return;
            
            const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
            const isSuperAdmin = currentUser.role === 'super_admin';
            
            const maskResidentNumber = (num) => {
                if (!num || num.length < 14) return num;
                return num.substring(0, 8) + '******';
            };
            
            const fullResidentNumber = company.representative_resident_number || '';
            const maskedResidentNumber = maskResidentNumber(fullResidentNumber);
            
            const content = `
                <div class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="border-b pb-2">
                            <div class="text-sm text-gray-600 mb-1">업체명</div>
                            <div class="text-lg font-bold">${company.name}</div>
                        </div>
                        <div class="border-b pb-2">
                            <div class="text-sm text-gray-600 mb-1">사업자번호</div>
                            <div class="text-lg">${company.business_number}</div>
                        </div>
                        <div class="border-b pb-2">
                            <div class="text-sm text-gray-600 mb-1">대표자</div>
                            <div class="text-lg">${company.representative}</div>
                        </div>
                        <div class="border-b pb-2">
                            <div class="text-sm text-gray-600 mb-1">대표자 주민등록번호</div>
                            <div class="text-lg">
                                <span class="resident-number-masked">${maskedResidentNumber}</span>
                                ${isSuperAdmin ? `<span class="resident-number-full">${fullResidentNumber}</span>` : ''}
                            </div>
                            ${!isSuperAdmin ? '<div class="text-xs text-red-500 mt-1">* 개인정보 보호를 위해 마스킹 처리되었습니다.</div>' : ''}
                            ${isSuperAdmin ? '<div class="text-xs text-blue-500 mt-1 print-hidden">* 슈퍼관리자: 인쇄 시 전체 번호가 표시됩니다.</div>' : ''}
                        </div>
                        <div class="border-b pb-2">
                            <div class="text-sm text-gray-600 mb-1">전화번호</div>
                            <div class="text-lg">${company.phone}</div>
                        </div>
                        <div class="border-b pb-2">
                            <div class="text-sm text-gray-600 mb-1">등록일</div>
                            <div class="text-lg">${new Date(company.created_at).toLocaleDateString('ko-KR')}</div>
                        </div>
                    </div>
                    <div class="border-b pb-2">
                        <div class="text-sm text-gray-600 mb-1">우편번호</div>
                        <div class="text-lg">${company.postcode || ''}</div>
                    </div>
                    <div class="border-b pb-2">
                        <div class="text-sm text-gray-600 mb-1">주소</div>
                        <div class="text-lg">${company.address || ''}</div>
                    </div>
                    <div class="border-b pb-2">
                        <div class="text-sm text-gray-600 mb-1">상세주소</div>
                        <div class="text-lg">${company.detail_address || '-'}</div>
                    </div>
                    ${company.signature_data ? `
                    <div class="border-b pb-2">
                        <div class="text-sm text-gray-600 mb-1">대표자 서명</div>
                        <img src="${company.signature_data}" class="border bg-white" style="max-height: 100px;" />
                    </div>
                    ` : ''}
                    ${company.id_card_photo ? `
                    <div class="border-b pb-2">
                        <div class="text-sm text-gray-600 mb-1">대표자 신분증</div>
                        <img src="${company.id_card_photo}" class="border bg-white cursor-pointer" 
                            style="max-height: 250px;" 
                            onclick="window.open('${company.id_card_photo}', '_blank')" />
                        <div class="text-xs text-gray-500 mt-1">* 클릭하면 크게 볼 수 있습니다.</div>
                    </div>
                    ` : ''}
                </div>
            `;
            
            document.getElementById('detailContent').innerHTML = content;
            document.getElementById('detailModal').classList.remove('hidden');
        }
        
        // 모달 닫기
        function closeDetailModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }
        
        // 인쇄
        function printDetail() {
            window.print();
        }

        // 업체 삭제 (슈퍼관리자만)
        async function deleteCompany(id, name) {
            if (!confirm(`⚠️ 경고: "${name}" 업체를 완전히 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없으며, 다음 항목들이 모두 삭제됩니다:\n• 업체 정보\n• 해당 업체(임차인)의 모든 계약서\n• 관련된 모든 데이터`)) return;
            
            const sessionId = localStorage.getItem('sessionId');
            
            try {
                await axios.delete(`/api/companies/${id}`, {
                    headers: { 'X-Session-ID': sessionId }
                });
                
                log('✅ 삭제 성공');
                alert('✅ 업체 및 관련 계약서가 완전히 삭제되었습니다.');
                await loadCompanies();
            } catch (error) {
                log('❌ 삭제 실패: ' + error.message);
                alert('❌ 삭제 실패: ' + (error.response?.data?.error || error.message));
            }
        }

        // 페이지 로드 시
        document.addEventListener('DOMContentLoaded', function() {
            log('✅ DOMContentLoaded');
            log('Daum API: ' + (typeof daum !== 'undefined' ? '✅' : '❌'));
            
            // 뒤로가기 버튼
            document.getElementById('backBtn').addEventListener('click', function() {
                // history.back()이 작동하지 않으면 메인 페이지로 이동
                if (document.referrer) {
                    window.location.href = document.referrer;
                } else {
                    window.location.href = '/';
                }
            });
            
            // 이벤트 리스너 연결
            document.getElementById('searchBtn').addEventListener('click', searchAddress);
            document.getElementById('clearBtn').addEventListener('click', clearForm);
            document.getElementById('companyForm').addEventListener('submit', saveCompany);
            
            // 서명 관련
            document.getElementById('openSignatureBtn').addEventListener('click', openSignatureModal);
            document.getElementById('clearSignatureBtn').addEventListener('click', clearSignaturePreview);
            
            // 신분증 관련
            document.getElementById('captureIdBtn').addEventListener('click', startCamera);
            document.getElementById('uploadIdBtn').addEventListener('click', function() {
                document.getElementById('idCardFileInput').click();
            });
            document.getElementById('idCardFileInput').addEventListener('change', handleIdCardUpload);
            document.getElementById('clearIdBtn').addEventListener('click', clearIdCard);
            
            // 업체 목록 로드
            loadCompanies();
        });
    </script>
</body>
</html>
