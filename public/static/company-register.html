<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업체정보 등록 - Z-BIKE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen py-8 px-4">
        <div class="max-w-4xl mx-auto">
            <!-- 헤더 -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <div class="flex items-center justify-between">
                    <div class="flex-1">
                        <h1 class="text-2xl font-bold text-gray-800 flex items-center">
                            <i class="fas fa-building text-blue-600 mr-3"></i>
                            업체정보 등록
                        </h1>
                        <p class="text-gray-600 mt-2">사업자 계약을 위한 업체 정보를 등록합니다. 신분증은 최초 1회만 등록하시면 됩니다.</p>
                    </div>
                    <button type="button" onclick="history.back()" 
                        class="ml-4 px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition font-semibold whitespace-nowrap">
                        <i class="fas fa-arrow-left mr-2"></i>
                        뒤로가기
                    </button>
                </div>
            </div>

            <!-- 등록 폼 -->
            <form id="companyForm" class="bg-white rounded-lg shadow-md p-6">
                <!-- 업체 기본 정보 -->
                <div class="mb-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4 pb-2 border-b border-gray-200">
                        <i class="fas fa-briefcase text-blue-600 mr-2"></i>
                        업체 기본 정보
                    </h2>
                    
                    <div class="grid grid-cols-1 gap-4">
                        <!-- 상호명 -->
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                상호명 <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="companyName" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                placeholder="예: (주)테스트컴퍼니">
                        </div>

                        <!-- 업체 코드 자동 생성 안내 -->
                        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                            <div class="flex items-start gap-3">
                                <i class="fas fa-barcode text-blue-600 text-2xl mt-0.5"></i>
                                <div class="flex-1">
                                    <p class="text-sm font-semibold text-blue-900 mb-2">업체 코드 (자동 생성)</p>
                                    <div class="bg-white border-2 border-blue-300 rounded-lg p-3">
                                        <p id="generatedCompanyCode" class="text-xl font-bold text-blue-600 text-center tracking-wider">
                                            <!-- 자동 생성된 코드가 여기 표시됩니다 -->
                                        </p>
                                    </div>
                                    <p class="text-xs text-blue-700 mt-2">
                                        <i class="fas fa-info-circle mr-1"></i>
                                        이 코드로 업체가 등록됩니다. 변경할 수 없습니다.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 대표자 정보 -->
                <div class="mb-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4 pb-2 border-b border-gray-200">
                        <i class="fas fa-user-tie text-blue-600 mr-2"></i>
                        대표자 정보
                    </h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- 대표자명 -->
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                대표자명 <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="representative" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                placeholder="홍길동">
                        </div>

                        <!-- 대표자 연락처 -->
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                대표자 연락처 <span class="text-red-500">*</span>
                            </label>
                            <input type="tel" id="representativePhone" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                placeholder="010-1234-5678">
                        </div>

                        <!-- 대표자 주민번호 -->
                        <div class="md:col-span-2">
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                대표자 주민번호 <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="representativeResidentNumber" required maxlength="14"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                placeholder="900806-1******">
                        </div>
                    </div>
                </div>

                <!-- 대표자 주소 -->
                <div class="mb-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4 pb-2 border-b border-gray-200">
                        <i class="fas fa-home text-blue-600 mr-2"></i>
                        대표자 주소
                    </h2>
                    
                    <div class="space-y-4">
                        <!-- 우편번호 -->
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                우편번호 <span class="text-red-500">*</span>
                            </label>
                            <div class="flex gap-2">
                                <input type="text" id="representativePostcode" readonly required
                                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg bg-gray-50"
                                    placeholder="우편번호">
                                <button type="button" onclick="searchRepresentativeAddress()"
                                    class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                                    <i class="fas fa-search mr-1"></i> 검색
                                </button>
                            </div>
                        </div>

                        <!-- 기본주소 -->
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                기본주소 <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="representativeAddress" readonly required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50"
                                placeholder="기본주소">
                        </div>

                        <!-- 상세주소 -->
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                상세주소
                            </label>
                            <input type="text" id="representativeDetailAddress"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                placeholder="상세주소 입력">
                        </div>
                    </div>
                </div>

                <!-- 신분증 업로드 -->
                <div class="mb-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4 pb-2 border-b border-gray-200">
                        <i class="fas fa-id-card text-blue-600 mr-2"></i>
                        대표자 신분증 (1회 등록)
                    </h2>
                    
                    <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center bg-gray-50">
                        <input type="file" id="idCardPhoto" accept="image/*" onchange="previewIdCard(event)"
                            class="hidden">
                        
                        <div id="idCardPreview" class="mb-4">
                            <i class="fas fa-camera text-gray-400 text-5xl mb-3"></i>
                            <p class="text-gray-700 font-medium mb-2">신분증 사진 업로드</p>
                            <p class="text-sm text-gray-500 mb-4">JPG, PNG 형식 (최대 10MB)</p>
                            
                            <label for="idCardPhoto" class="inline-block cursor-pointer">
                                <div class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition font-semibold">
                                    <i class="fas fa-upload mr-2"></i>
                                    파일 선택
                                </div>
                            </label>
                        </div>
                        
                        <img id="idCardImage" class="hidden max-w-full max-h-64 mx-auto rounded-lg shadow-lg">
                    </div>
                    <p class="text-sm text-gray-600 mt-2">
                        <i class="fas fa-info-circle text-blue-600 mr-1"></i>
                        신분증은 최초 1회만 등록하며, 모든 계약에서 재사용됩니다.
                    </p>
                </div>

                <!-- 등록 버튼 -->
                <div class="flex gap-4">
                    <button type="submit"
                        class="flex-1 bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition font-semibold">
                        <i class="fas fa-save mr-2"></i>
                        등록하기
                    </button>
                    <button type="button" onclick="resetForm()"
                        class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition font-semibold">
                        <i class="fas fa-redo mr-2"></i>
                        초기화
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 페이지 로드 시 업체 코드 자동 생성 및 표시
            generateCompanyCode();
            
            // 전화번호 자동 하이픈 추가
            document.getElementById('representativePhone').addEventListener('input', function(e) {
                let value = e.target.value.replace(/[^0-9]/g, '');
                if (value.length > 3 && value.length <= 7) {
                    value = value.slice(0, 3) + '-' + value.slice(3);
                } else if (value.length > 7) {
                    value = value.slice(0, 3) + '-' + value.slice(3, 7) + '-' + value.slice(7, 11);
                }
                e.target.value = value;
            });

            // 주민번호 자동 하이픈 추가
            document.getElementById('representativeResidentNumber').addEventListener('input', function(e) {
                let value = e.target.value.replace(/[^0-9]/g, '');
                if (value.length > 6) {
                    value = value.slice(0, 6) + '-' + value.slice(6, 13);
                }
                e.target.value = value;
            });
        });

        // 업체 코드 생성 함수
        function generateCompanyCode() {
            const now = new Date();
            const dateStr = now.getFullYear() + 
                           String(now.getMonth() + 1).padStart(2, '0') + 
                           String(now.getDate()).padStart(2, '0');
            const randomNum = String(Math.floor(Math.random() * 1000)).padStart(3, '0');
            const companyCode = `AUTO-${dateStr}-${randomNum}`;
            
            // 화면에 표시
            const codeElement = document.getElementById('generatedCompanyCode');
            if (codeElement) {
                codeElement.textContent = companyCode;
                console.log('🔢 업체 코드 생성됨:', companyCode);
            }
            
            return companyCode;
        }

        // 사업장 주소 검색
        // 대표자 주소 검색
        function searchRepresentativeAddress() {
            new daum.Postcode({
                oncomplete: function(data) {
                    document.getElementById('representativePostcode').value = data.zonecode;
                    document.getElementById('representativeAddress').value = data.address;
                    document.getElementById('representativeDetailAddress').focus();
                    
                    console.log('📍 대표자 주소:', {
                        postcode: data.zonecode,
                        address: data.address
                    });
                }
            }).open();
        }

        // 신분증 미리보기
        function previewIdCard(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('idCardPreview').classList.add('hidden');
                    document.getElementById('idCardImage').classList.remove('hidden');
                    document.getElementById('idCardImage').src = e.target.result;
                    
                    console.log('📸 신분증 업로드:', file.name, (file.size / 1024 / 1024).toFixed(2) + 'MB');
                };
                reader.readAsDataURL(file);
            }
        }

        // 폼 제출
        document.getElementById('companyForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // 유효성 검사
            const representativePostcode = document.getElementById('representativePostcode').value;
            const idCardFile = document.getElementById('idCardPhoto').files[0];
            
            if (!representativePostcode) {
                alert('대표자 주소를 검색해주세요.');
                return;
            }
            
            if (!idCardFile) {
                alert('신분증 사진을 업로드해주세요.');
                return;
            }
            
            // 화면에 표시된 업체 코드 사용
            const autoBusinessNumber = document.getElementById('generatedCompanyCode').textContent;
            
            console.log('🔢 사용할 업체 코드:', autoBusinessNumber);
            
            // 신분증 Base64 인코딩
            const reader = new FileReader();
            reader.onload = async function(e) {
                const idCardPhotoBase64 = e.target.result;
                
                const formData = {
                    company_name: document.getElementById('companyName').value,
                    company_code: autoBusinessNumber,  // 자동 생성된 번호
                    representative: document.getElementById('representative').value,
                    representative_phone: document.getElementById('representativePhone').value,
                    representative_resident_number: document.getElementById('representativeResidentNumber').value,
                    business_postcode: null,
                    business_address: null,
                    business_detail_address: null,
                    representative_postcode: representativePostcode,
                    representative_address: document.getElementById('representativeAddress').value,
                    representative_detail_address: document.getElementById('representativeDetailAddress').value,
                    id_card_photo: idCardPhotoBase64
                };
                
                console.log('📝 업체 등록 요청:', {
                    company_name: formData.company_name,
                    company_code: formData.company_code,
                    representative: formData.representative,
                    representative_phone: formData.representative_phone,
                    representative_resident_number: formData.representative_resident_number,
                    representative_postcode: formData.representative_postcode,
                    representative_address: formData.representative_address,
                    representative_detail_address: formData.representative_detail_address,
                    id_card_photo_length: formData.id_card_photo.length
                });
                
                try {
                    console.log('🚀 POST /api/companies 호출 중...');
                    const response = await axios.post('/api/companies', formData);
                    console.log('✅ 서버 응답:', response.status, response.data);
                    
                    alert('✅ 업체 정보가 성공적으로 등록되었습니다!\n\n업체명: ' + formData.company_name + '\n업체 코드: ' + formData.company_code + '\n업체 ID: ' + response.data.id);
                    
                    // 업체 목록 페이지로 자동 이동
                    console.log('🔄 업체 목록 페이지로 이동 중...');
                    window.location.href = '/static/companies-list.html';
                } catch (error) {
                    console.error('❌ 등록 실패 상세:', {
                        message: error.message,
                        response: error.response,
                        status: error.response?.status,
                        data: error.response?.data
                    });
                    
                    let errorMessage = '등록 중 오류가 발생했습니다.';
                    let errorDetails = '';
                    
                    if (error.response) {
                        // 서버에서 응답이 온 경우
                        const status = error.response.status;
                        const serverError = error.response.data?.error;
                        
                        console.log('🔍 에러 분석:', { status, serverError });
                        
                        if (status === 400) {
                            errorMessage = serverError || '이미 등록된 사업자번호입니다.';
                            errorDetails = '\n\n💡 다른 사업자번호로 시도해주세요.';
                        } else if (status === 500) {
                            errorMessage = serverError || '서버 오류가 발생했습니다.';
                            errorDetails = '\n\n💡 가능한 원인:\n- 이미 등록된 사업자번호\n- 데이터베이스 오류\n- 잘못된 데이터 형식\n\n다른 사업자번호로 시도해주세요.';
                        } else {
                            errorMessage = serverError || error.message;
                            errorDetails = '\n\n상태 코드: ' + status;
                        }
                    } else if (error.request) {
                        errorMessage = '서버와 통신할 수 없습니다.';
                        errorDetails = '\n\n💡 네트워크 연결을 확인해주세요.';
                    } else {
                        errorMessage = error.message;
                    }
                    
                    alert('❌ ' + errorMessage + errorDetails);
                }
            };
            reader.readAsDataURL(idCardFile);
        });

        // 폼 초기화
        function resetForm() {
            document.getElementById('companyForm').reset();
            document.getElementById('idCardPreview').classList.remove('hidden');
            document.getElementById('idCardImage').classList.add('hidden');
            document.getElementById('sameAsBusinessAddress').checked = false;
        }
    </script>
</body>
</html>
