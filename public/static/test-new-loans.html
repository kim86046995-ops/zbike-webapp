<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>차용증 관리 (인라인 스타일 버전)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen p-8">
        <div class="max-w-7xl mx-auto">
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h1 class="text-3xl font-bold text-gray-800 mb-6">
                    <i class="fas fa-file-invoice-dollar text-indigo-600 mr-3"></i>
                    차용증 관리 (NEW - 인라인 스타일)
                </h1>
                
                <div class="mb-4 p-4 bg-yellow-50 border border-yellow-300 rounded">
                    <p class="text-sm"><strong>🎯 테스트 버전:</strong> 이 페이지는 캐시 문제 없이 최신 인라인 스타일을 사용합니다.</p>
                    <p class="text-sm mt-2"><strong>📝 변경사항:</strong> 모든 Tailwind 클래스 → 인라인 스타일</p>
                </div>
                
                <div id="loansList" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- PDF 생성 전용 숨겨진 컨테이너 -->
    <div id="pdfContainer" style="position: absolute; left: -9999px; top: 0; width: 794px; background: white; padding: 20px;">
        <div id="pdfContent"></div>
    </div>

    <script>
        let currentLoan = null;
        
        const statusTexts = {
            'active': '진행중',
            'completed': '완료',
            'cancelled': '취소'
        };

        // 페이지 로드 시 데이터 로드
        document.addEventListener('DOMContentLoaded', loadLoans);

        async function loadLoans() {
            try {
                const response = await axios.get('/api/loan-contracts');
                const loans = response.data;
                
                const loansList = document.getElementById('loansList');
                loansList.innerHTML = loans.map(loan => `
                    <div class="bg-white border border-gray-200 rounded-lg p-4 hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <h3 class="text-lg font-bold text-gray-800 mb-2">
                                    ${loan.loan_number}
                                    <span class="ml-2 px-2 py-1 text-xs rounded ${loan.status === 'active' ? 'bg-green-100 text-green-800' : loan.status === 'completed' ? 'bg-blue-100 text-blue-800' : 'bg-red-100 text-red-800'}">
                                        ${statusTexts[loan.status] || loan.status}
                                    </span>
                                </h3>
                                <div class="grid grid-cols-2 gap-2 text-sm text-gray-600">
                                    <p><i class="fas fa-user mr-2"></i>${loan.borrower_name}</p>
                                    <p><i class="fas fa-phone mr-2"></i>${loan.borrower_phone}</p>
                                    <p><i class="fas fa-won-sign mr-2"></i>${Number(loan.loan_amount).toLocaleString()}원</p>
                                    <p><i class="fas fa-calendar mr-2"></i>${loan.loan_date}</p>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="viewDetail(${loan.id})" class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded text-sm">
                                    <i class="fas fa-eye mr-1"></i> 상세
                                </button>
                                <button onclick="quickDownloadLoanPDF(${loan.id})" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded text-sm">
                                    <i class="fas fa-download mr-1"></i> PDF
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                console.log('✅ 차용증 목록 로드 완료:', loans.length, '건');
            } catch (error) {
                console.error('❌ 차용증 목록 로드 실패:', error);
                alert('차용증 목록을 불러오는데 실패했습니다: ' + (error.response?.data?.error || error.message));
            }
        }

        async function viewDetail(id) {
            try {
                const response = await axios.get(`/api/loan-contracts/${id}`);
                currentLoan = response.data;
                alert('상세보기 기능은 구현 중입니다.\n\nPDF 다운로드 버튼을 사용해주세요.');
            } catch (error) {
                console.error('❌ 차용증 상세 조회 실패:', error);
                alert('차용증 정보를 불러오는데 실패했습니다');
            }
        }

        async function quickDownloadLoanPDF(id) {
            try {
                console.log('🔄 차용증 데이터 로드 중...', id);
                const response = await axios.get(`/api/loan-contracts/${id}`);
                currentLoan = response.data;
                
                if (!currentLoan) {
                    throw new Error('차용증 데이터를 불러올 수 없습니다');
                }
                
                console.log('✅ 차용증 데이터 로드 완료:', currentLoan.loan_number);
                
                // 인라인 스타일 HTML 렌더링
                renderLoanPDF();
                
                // DOM 업데이트 대기
                await new Promise(resolve => setTimeout(resolve, 500));
                
                // PDF 다운로드
                await downloadLoanPDF();
            } catch (error) {
                console.error('❌ 빠른 다운로드 오류:', error);
                alert(`PDF 다운로드에 실패했습니다\n오류: ${error.message}`);
            }
        }

        function renderLoanPDF() {
            const loan = currentLoan;
            
            const html = `
                <div style="font-size: 1.1rem; color: #1a1a1a; font-weight: 500;">
                    <!-- 차용증 제목 -->
                    <div style="text-align: center; border-bottom: 2px solid #1f2937; padding-bottom: 1rem; margin-bottom: 1.5rem;">
                        <h1 style="font-size: 2rem; font-weight: bold; margin-bottom: 0.5rem;">배달대행 차용증</h1>
                        <p style="font-size: 1.2rem;">차용증번호: ${loan.loan_number}</p>
                        <p style="font-size: 1rem; margin-top: 0.5rem;">상태: <span style="font-weight: bold; color: ${loan.status === 'active' ? '#16a34a' : loan.status === 'completed' ? '#2563eb' : '#dc2626'};">${statusTexts[loan.status] || loan.status}</span></p>
                    </div>

                    <!-- 임대인 (사업자) 정보 -->
                    <div style="background: #eef2ff; padding: 1.5rem; border-radius: 0.5rem; border: 2px solid #a5b4fc; margin-bottom: 1.5rem;">
                        <h3 style="font-weight: bold; color: #312e81; margin-bottom: 0.75rem; font-size: 1.4rem;">임대인 (사업자) 정보</h3>
                        <div style="font-size: 1.1rem;">
                            <p style="margin-bottom: 0.5rem;"><strong>상호:</strong> 대성</p>
                            <p style="margin-bottom: 0.5rem;"><strong>사업자등록번호:</strong> 487-39-01128</p>
                            <p><strong>대표자:</strong> 김상춘</p>
                        </div>
                    </div>

                    <!-- 임차인 정보 -->
                    <div style="border: 2px solid #d1d5db; padding: 1.5rem; border-radius: 0.5rem; margin-bottom: 1.5rem;">
                        <h3 style="font-weight: bold; font-size: 1.2rem; margin-bottom: 1rem;">임차인 정보</h3>
                        <div>
                            <p style="margin-bottom: 0.5rem;"><strong>이름:</strong> ${loan.borrower_name}</p>
                            <p style="margin-bottom: 0.5rem;"><strong>주민번호:</strong> ${loan.borrower_resident_number}</p>
                            <p style="margin-bottom: 0.5rem;"><strong>전화번호:</strong> ${loan.borrower_phone}</p>
                            <p><strong>주소:</strong> ${loan.borrower_address}</p>
                        </div>
                    </div>

                    <!-- 차용 상세 -->
                    <div style="border: 2px solid #d1d5db; padding: 1.5rem; border-radius: 0.5rem; margin-bottom: 1.5rem;">
                        <h3 style="font-weight: bold; font-size: 1.2rem; margin-bottom: 1rem;">차용 상세</h3>
                        <div>
                            <p style="margin-bottom: 0.5rem;"><strong>차용금액:</strong> ${Number(loan.loan_amount).toLocaleString()}원</p>
                            <p style="margin-bottom: 0.5rem;"><strong>차용일:</strong> ${loan.loan_date}</p>
                            <p style="margin-bottom: 0.5rem;"><strong>상환일:</strong> ${loan.repayment_date}</p>
                            ${loan.daily_deduction ? `<p style="margin-bottom: 0.5rem;"><strong>일차감금액:</strong> ${Number(loan.daily_deduction).toLocaleString()}원</p>` : ''}
                            ${loan.interest_rate ? `<p style="margin-bottom: 0.5rem;"><strong>이자율:</strong> 연 ${loan.interest_rate}%</p>` : ''}
                        </div>
                    </div>

                    <!-- 계약 체결일 -->
                    <div style="text-align: center; padding-top: 1rem; padding-bottom: 1rem; border-top: 2px solid #d1d5db; margin-top: 2rem;">
                        <p style="font-size: 1.2rem; font-weight: bold;">계약 체결일: ${new Date(loan.created_at).toLocaleDateString('ko-KR')}</p>
                    </div>
                </div>
            `;
            
            document.getElementById('pdfContent').innerHTML = html;
            console.log('✅ PDF 콘텐츠 렌더링 완료 (인라인 스타일)');
        }

        async function downloadLoanPDF() {
            try {
                console.log('📄 PDF 생성 시작:', currentLoan.loan_number);
                
                const element = document.getElementById('pdfContent');
                
                if (!element || !element.innerHTML.trim()) {
                    throw new Error('PDF 콘텐츠가 렌더링되지 않았습니다');
                }
                
                // html2pdf 라이브러리 로드
                if (typeof html2pdf === 'undefined') {
                    console.log('📦 html2pdf 라이브러리 로딩...');
                    await loadHtml2Pdf();
                }

                const fileName = `차용증_${currentLoan.loan_number}.pdf`;

                const opt = {
                    margin: [8, 10, 8, 10],
                    filename: fileName,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { 
                        scale: 2,
                        useCORS: true,
                        letterRendering: true,
                        logging: true,
                        scrollY: 0,
                        scrollX: 0
                    },
                    jsPDF: { 
                        unit: 'mm', 
                        format: 'a4', 
                        orientation: 'portrait',
                        compress: true
                    }
                };

                console.log('🎨 html2canvas 시작...');
                
                const pdfBlob = await html2pdf().set(opt).from(element).output('blob');
                
                console.log('✅ Blob 생성 완료:', pdfBlob.size, 'bytes');
                
                const url = URL.createObjectURL(pdfBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                console.log('✅ PDF 다운로드 완료:', fileName);
                alert(`✅ PDF 다운로드 완료!\n\n파일: ${fileName}\n크기: ${(pdfBlob.size / 1024).toFixed(2)} KB`);
            } catch (error) {
                console.error('❌ PDF 생성 오류:', error);
                alert(`PDF 다운로드에 실패했습니다.\n\n오류: ${error.message}`);
            }
        }

        async function loadHtml2Pdf() {
            return new Promise((resolve, reject) => {
                if (typeof html2pdf !== 'undefined') {
                    resolve();
                    return;
                }
                
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
                script.onload = () => {
                    console.log('✅ html2pdf 로드 완료');
                    resolve();
                };
                script.onerror = () => {
                    reject(new Error('html2pdf 라이브러리 로드 실패'));
                };
                document.head.appendChild(script);
            });
        }
    </script>
</body>
</html>
