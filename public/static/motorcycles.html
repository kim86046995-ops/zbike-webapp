<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <title>오토바이 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }
        .insurance-progress {
            transition: width 0.3s ease;
        }
        .motorcycle-card {
            transition: all 0.3s ease;
            border-left: 4px solid #3b82f6;
        }
        .motorcycle-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .motorcycle-card.status-available {
            border-left-color: #10b981;
        }
        .motorcycle-card.status-rented {
            border-left-color: #f59e0b;
        }
        .motorcycle-card.status-maintenance {
            border-left-color: #ef4444;
        }
        .progress-bar-wrapper {
            position: relative;
            height: 16px;
            background: #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            border-radius: 8px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.65rem;
        }
        .progress-bar.progress-safe {
            background: linear-gradient(90deg, #10b981, #34d399);
        }
        .progress-bar.progress-warning {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }
        .progress-bar.progress-danger {
            background: linear-gradient(90deg, #ef4444, #f87171);
        }
        .info-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .plate-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e40af;
            cursor: pointer;
            transition: color 0.2s;
        }
        .plate-number:hover {
            color: #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- 헤더 -->
        <header class="bg-blue-600 text-white shadow-lg">
            <div class="container mx-auto px-4 py-4 flex items-center justify-between">
                <a href="/dashboard" class="text-xl font-bold">
                    <i class="fas fa-arrow-left mr-2"></i>
                    오토바이 관리
                </a>
                <button id="addMotorcycleBtn" onclick="showAddModal()" class="bg-white text-blue-600 px-4 py-2 rounded-lg font-bold hover:bg-blue-50">
                    <i class="fas fa-plus mr-2"></i>오토바이 등록
                </button>
            </div>
        </header>

        <!-- 메인 컨텐츠 -->
        <main class="container mx-auto px-4 py-8">
            <!-- 검색 및 필터 -->
            <div class="bg-white rounded-lg shadow-md p-4 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- 검색창 -->
                    <div>
                        <label class="block text-sm font-bold mb-2">
                            <i class="fas fa-search mr-1 text-blue-500"></i>검색
                        </label>
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="번호판/계약자/명의자 검색..." 
                            oninput="filterAndSortMotorcycles()"
                            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                        >
                    </div>
                    
                    <!-- 상태 필터 -->
                    <div>
                        <label class="block text-sm font-bold mb-2">
                            <i class="fas fa-filter mr-1 text-green-500"></i>상태 필터
                        </label>
                        <select id="statusFilter" onchange="filterAndSortMotorcycles()" class="w-full px-3 py-2 border rounded-lg">
                            <option value="">전체</option>
                            <option value="available">사용가능</option>
                            <option value="rented">렌트중</option>
                            <option value="maintenance">정비중</option>
                            <option value="scrapped">폐지</option>
                        </select>
                    </div>
                    
                    <!-- 정렬 -->
                    <div>
                        <label class="block text-sm font-bold mb-2">
                            <i class="fas fa-sort mr-1 text-purple-500"></i>정렬
                        </label>
                        <select id="sortOrder" onchange="filterAndSortMotorcycles()" class="w-full px-3 py-2 border rounded-lg">
                            <option value="created_desc">입력순 (최신)</option>
                            <option value="created_asc">입력순 (오래된)</option>
                            <option value="plate_asc">번호 빠른순</option>
                            <option value="plate_desc">번호 늦은순</option>
                            <option value="insurance_exp">보험 만료일순</option>
                            <option value="inspection_exp">검사 가까운순</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 오토바이 목록 -->
            <div id="motorcycleList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                <!-- 로딩 중... -->
                <div class="col-span-full text-center py-8 text-gray-500">
                    <i class="fas fa-spinner fa-spin text-2xl"></i>
                    <p class="mt-2">로딩 중...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- 등록/수정 모달 -->
    <div id="motorcycleModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full my-8">
            <div class="p-6">
                <h2 id="modalTitle" class="text-2xl font-bold mb-6">오토바이 등록</h2>
                <form id="motorcycleForm" class="space-y-4">
                    <input type="hidden" id="motorcycleId">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold mb-2">번호판 *</label>
                            <input type="text" id="plateNumber" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">차량이름 *</label>
                            <input type="text" id="vehicleName" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">차대번호 *</label>
                            <input type="text" id="chassisNumber" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">키로수 *</label>
                            <input type="number" id="mileage" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">연식 *</label>
                            <input type="number" id="modelYear" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="예: 2023">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">보험사 *</label>
                            <input type="text" id="insuranceCompany" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">보험 시작일 *</label>
                            <input type="date" id="insuranceStartDate" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">보험 종료일 *</label>
                            <input type="date" id="insuranceEndDate" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">검사 시작일</label>
                            <input type="date" id="inspectionStartDate" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">검사 종료일</label>
                            <input type="date" id="inspectionEndDate" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">운전연령 *</label>
                            <select id="drivingRange" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                                <option value="">선택하세요</option>
                                <option value="전연령">전연령</option>
                                <option value="만19세이상">만19세이상</option>
                                <option value="만21세이상">만21세이상</option>
                                <option value="만24세이상">만24세이상</option>
                                <option value="만26세이상">만26세이상</option>
                                <option value="만30세이상">만30세이상</option>
                                <option value="만35세이상">만35세이상</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">명의자 *</label>
                            <input type="text" id="ownerName" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">보험료 (원) *</label>
                            <input type="number" id="insuranceFee" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">차량금액 (원) *</label>
                            <input type="number" id="vehiclePrice" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">일대여료 (원) *</label>
                            <input type="number" id="dailyRentalFee" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="1일 대여 금액">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">상태 *</label>
                            <select id="status" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                                <option value="available">사용가능</option>
                                <option value="rented">렌트중</option>
                                <option value="maintenance">정비중</option>
                                <option value="scrapped">폐지</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold mb-2">차량 사용필증 촬영</label>
                            <div class="space-y-2">
                                <div class="flex gap-2">
                                    <button type="button" onclick="startCertificateCamera()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
                                        <i class="fas fa-camera mr-2"></i>카메라로 촬영
                                    </button>
                                    <input type="file" id="certificateUpload" accept="image/*" onchange="handleCertificateUpload(event)" class="hidden">
                                    <button type="button" onclick="document.getElementById('certificateUpload').click()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                                        <i class="fas fa-upload mr-2"></i>파일 선택
                                    </button>
                                </div>
                                <div id="certificatePreview" class="hidden">
                                    <img id="certificateImage" class="max-w-full h-48 object-contain border rounded-lg">
                                    <button type="button" onclick="clearCertificate()" class="mt-2 text-red-600 hover:text-red-700">
                                        <i class="fas fa-times mr-1"></i>삭제
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold mb-2">사용페지</label>
                            <textarea id="usageNotes" rows="3" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="오토바이 사용 관련 특이사항을 입력하세요"></textarea>
                        </div>
                    </div>
                    
                    <!-- 카메라 모달 -->
                    <div id="cameraModal" class="hidden fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center p-4">
                        <div class="bg-white rounded-lg p-4 max-w-2xl w-full">
                            <h3 class="text-lg font-bold mb-4">사용필증 촬영</h3>
                            <video id="certificateVideo" class="w-full rounded-lg mb-4" autoplay playsinline></video>
                            <canvas id="certificateCanvas" class="hidden"></canvas>
                            <div class="flex gap-2">
                                <button type="button" onclick="captureCertificate()" class="flex-1 bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">
                                    <i class="fas fa-camera mr-2"></i>촬영
                                </button>
                                <button type="button" onclick="stopCertificateCamera()" class="flex-1 bg-gray-600 text-white py-2 rounded-lg hover:bg-gray-700">
                                    취소
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-3 pt-4">
                        <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                            <i class="fas fa-save mr-2"></i>저장
                        </button>
                        <button type="button" onclick="hideModal()" class="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-400 transition">
                            취소
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 계약 이력 모달 -->
    <div id="historyModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full my-8">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">
                        <i class="fas fa-history mr-2 text-blue-600"></i>
                        계약 이력
                    </h2>
                    <button onclick="hideHistoryModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
                
                <div id="motorcycleInfo" class="bg-blue-50 p-4 rounded-lg mb-6"></div>
                <div id="contractHistory"></div>

                <div class="mt-6">
                    <button onclick="hideHistoryModal()" class="w-full bg-gray-300 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-400">
                        닫기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        let motorcycles = [];
        let motorcycleContracts = {}; // 각 오토바이의 계약자 정보를 저장
        let sessionId = localStorage.getItem('sessionId');
        let currentUser = null; // 현재 로그인한 사용자 정보

        // 인증 체크
        async function checkAuth() {
            if (!sessionId) {
                window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname);
                return false;
            }

            try {
                const response = await axios.get('/api/auth/check', {
                    headers: { 'X-Session-ID': sessionId }
                });
                currentUser = response.data.user; // 사용자 정보 저장
                return true;
            } catch (error) {
                localStorage.removeItem('sessionId');
                localStorage.removeItem('user');
                window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname);
                return false;
            }
        }

        // Axios 인터셉터 설정 - 모든 요청에 세션 ID 추가
        axios.interceptors.request.use(config => {
            if (sessionId) {
                config.headers['X-Session-ID'] = sessionId;
            }
            return config;
        });

        // 401 에러 처리
        axios.interceptors.response.use(
            response => response,
            error => {
                if (error.response?.status === 401) {
                    localStorage.removeItem('sessionId');
                    localStorage.removeItem('user');
                    window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname);
                }
                return Promise.reject(error);
            }
        );

        window.addEventListener('DOMContentLoaded', async () => {
            if (await checkAuth()) {
                loadMotorcycles();
            }
        });

        async function loadMotorcycles() {
            try {
                const response = await axios.get('/api/motorcycles');
                motorcycles = response.data;
                
                // 각 오토바이의 계약자 정보를 미리 로드
                for (const m of motorcycles) {
                    try {
                        const contractResponse = await axios.get(`/api/motorcycles/${m.id}/contracts`);
                        const activeContract = contractResponse.data.find(c => c.status === 'active');
                        motorcycleContracts[m.id] = activeContract ? activeContract.customer_name : '';
                    } catch (err) {
                        motorcycleContracts[m.id] = '';
                    }
                }
                
                filterAndSortMotorcycles();
            } catch (error) {
                console.error('Error loading motorcycles:', error);
                alert('오토바이 목록을 불러오는데 실패했습니다');
            }
        }

        function filterAndSortMotorcycles() {
            // 검색어
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            
            // 상태 필터
            const statusFilter = document.getElementById('statusFilter').value;
            
            // 정렬 기준
            const sortOrder = document.getElementById('sortOrder').value;
            
            // 필터링
            let filtered = motorcycles.filter(m => {
                // 상태 필터
                if (statusFilter && m.status !== statusFilter) {
                    return false;
                }
                
                // 검색어 필터 (번호판, 계약자, 명의자)
                if (searchTerm) {
                    const plateNumber = (m.plate_number || '').toLowerCase();
                    const chassisNumber = (m.chassis_number || '').toLowerCase();
                    const ownerName = (m.owner_name || '').toLowerCase();
                    const contractorName = (motorcycleContracts[m.id] || '').toLowerCase();
                    
                    return plateNumber.includes(searchTerm) || 
                           chassisNumber.includes(searchTerm) ||
                           ownerName.includes(searchTerm) || 
                           contractorName.includes(searchTerm);
                }
                
                return true;
            });
            
            // 정렬
            filtered.sort((a, b) => {
                switch(sortOrder) {
                    case 'created_desc':
                        return b.id - a.id; // ID가 클수록 최신
                    case 'created_asc':
                        return a.id - b.id; // ID가 작을수록 오래된
                    case 'plate_asc':
                        return (a.plate_number || a.chassis_number || '').localeCompare(
                               (b.plate_number || b.chassis_number || '')
                        );
                    case 'plate_desc':
                        return (b.plate_number || b.chassis_number || '').localeCompare(
                               (a.plate_number || a.chassis_number || '')
                        );
                    case 'insurance_exp':
                        // 보험 만료일이 가까운 순
                        const aInsurance = a.insurance_end_date || '9999-12-31';
                        const bInsurance = b.insurance_end_date || '9999-12-31';
                        return aInsurance.localeCompare(bInsurance);
                    case 'inspection_exp':
                        // 검사 만료일이 가까운 순
                        const aInspection = a.inspection_end_date || '9999-12-31';
                        const bInspection = b.inspection_end_date || '9999-12-31';
                        return aInspection.localeCompare(bInspection);
                    default:
                        return b.id - a.id;
                }
            });
            
            renderMotorcycles(filtered);
        }

        function calculateInsuranceProgress(startDate, endDate) {
            const start = new Date(startDate);
            const end = new Date(endDate);
            const today = new Date();
            
            const totalDays = (end - start) / (1000 * 60 * 60 * 24);
            const elapsedDays = (today - start) / (1000 * 60 * 60 * 24);
            const remainingDays = (end - today) / (1000 * 60 * 60 * 24);
            
            const percentage = Math.max(0, Math.min(100, (elapsedDays / totalDays) * 100));
            const remainingPercentage = 100 - percentage;
            
            return {
                percentage: percentage.toFixed(1),
                remainingPercentage: remainingPercentage.toFixed(1),
                remainingDays: Math.ceil(remainingDays),
                isExpired: today > end,
                isExpiringSoon: remainingDays <= 30 && remainingDays > 0
            };
        }

        function getProgressColor(progress) {
            if (progress.isExpired) return 'bg-red-500';
            if (progress.isExpiringSoon) return 'bg-yellow-500';
            if (progress.remainingPercentage > 50) return 'bg-green-500';
            if (progress.remainingPercentage > 25) return 'bg-blue-500';
            return 'bg-orange-500';
        }

        function renderMotorcycles(filteredMotorcycles = motorcycles) {
            const listEl = document.getElementById('motorcycleList');
            
            if (filteredMotorcycles.length === 0) {
                listEl.innerHTML = `
                    <div class="col-span-full text-center py-12 text-gray-500">
                        <i class="fas fa-inbox text-5xl mb-3 opacity-50"></i>
                        <p class="text-lg">검색 결과가 없습니다</p>
                        <button onclick="showAddModal()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                            <i class="fas fa-plus mr-2"></i>오토바이 등록하기
                        </button>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = filteredMotorcycles.map(m => {
                const statusConfig = {
                    'available': { bg: 'bg-green-100', text: 'text-green-800', icon: 'fa-check-circle', label: '사용가능', border: 'status-available' },
                    'rented': { bg: 'bg-yellow-100', text: 'text-yellow-800', icon: 'fa-motorcycle', label: '렌트중', border: 'status-rented' },
                    'maintenance': { bg: 'bg-red-100', text: 'text-red-800', icon: 'fa-tools', label: '정비중', border: 'status-maintenance' },
                    'scrapped': { bg: 'bg-gray-100', text: 'text-gray-800', icon: 'fa-ban', label: '폐지', border: 'status-scrapped' }
                };

                const status = statusConfig[m.status] || statusConfig['available'];
                const progress = calculateInsuranceProgress(m.insurance_start_date, m.insurance_end_date);
                
                let progressClass = 'progress-safe';
                if (progress.isExpired) progressClass = 'progress-danger';
                else if (progress.isExpiringSoon) progressClass = 'progress-warning';
                else if (progress.remainingPercentage < 50) progressClass = 'progress-warning';
                
                // 폐지 오토바이는 차대번호 표시, 차량번호가 있으면 우선 표시
                const displayNumber = m.status === 'scrapped' ? (m.plate_number || m.chassis_number) : m.plate_number;
                const displayLabel = m.status === 'scrapped' ? (m.plate_number ? '번호판' : '차대번호') : '번호판';

                return `
                    <div class="motorcycle-card ${status.border} bg-white rounded-lg shadow-md overflow-hidden">
                        <!-- 상단: 번호판/차대번호 클릭 영역 -->
                        <div class="relative bg-gradient-to-br from-blue-600 via-blue-500 to-indigo-600 p-3 cursor-pointer hover:from-blue-700 hover:via-blue-600 hover:to-indigo-700 transition-all active:scale-95" onclick="showHistory(${m.id})">
                            <div class="flex justify-between items-center">
                                <div>
                                    <p class="text-blue-100 text-xs font-semibold mb-0.5">
                                        <i class="fas fa-id-card mr-1"></i>${displayLabel}
                                    </p>
                                    <p class="text-white text-2xl font-black tracking-tight">${displayNumber}</p>
                                </div>
                                <div class="flex flex-col items-center">
                                    <div class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center">
                                        <i class="fas fa-history text-lg text-white"></i>
                                    </div>
                                    <p class="text-white text-xs mt-0.5 font-medium">이력</p>
                                </div>
                            </div>
                        </div>

                        <div class="p-2.5 bg-gradient-to-br from-white to-gray-50">
                            <!-- 차량명 및 상태 -->
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <h3 class="text-base font-bold text-gray-800">${m.vehicle_name}</h3>
                                    <p class="text-xs text-gray-500"><i class="fas fa-calendar-alt mr-1"></i>${m.model_year}년식</p>
                                </div>
                                <span class="info-badge ${status.bg} ${status.text} text-xs">
                                    <i class="fas ${status.icon} mr-1"></i>${status.label}
                                </span>
                            </div>
                            
                            ${m.status === 'scrapped' ? `
                                <!-- 폐지 오토바이: 사용페지 표시 -->
                                <div class="mb-2 bg-gray-50 p-2 rounded-md border border-gray-200">
                                    <p class="text-xs font-bold text-gray-700 mb-1">
                                        <i class="fas fa-info-circle mr-1 text-gray-500"></i>사용페지
                                    </p>
                                    <p class="text-xs text-gray-600 whitespace-pre-wrap">${m.usage_notes || '정보 없음'}</p>
                                </div>
                            ` : `
                            <!-- 계약 기간 진행률 -->
                            <div class="mb-1.5 bg-white p-2 rounded-md shadow-sm border border-gray-100" id="contract-progress-${m.id}">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-xs font-bold text-gray-700 flex items-center">
                                        <i class="fas fa-file-contract mr-1 text-purple-500"></i>계약
                                    </span>
                                    <span class="text-xs text-gray-500" id="contract-status-${m.id}">-</span>
                                </div>
                                <div class="progress-bar-wrapper" id="contract-bar-${m.id}">
                                    <div class="progress-bar progress-safe" style="width: 0%"></div>
                                </div>
                                <div class="flex justify-between text-xs text-gray-400 mt-0.5" id="contract-dates-${m.id}">
                                    <span>-</span>
                                    <span>-</span>
                                </div>
                            </div>
                            
                            <!-- 보험 기간 진행률 -->
                            <div class="mb-1.5 bg-white p-2 rounded-md shadow-sm border border-gray-100">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-xs font-bold text-gray-700 flex items-center">
                                        <i class="fas fa-shield-alt mr-1 text-blue-500"></i>보험
                                    </span>
                                    <span class="text-xs font-bold ${progress.isExpired ? 'text-red-600' : progress.isExpiringSoon ? 'text-red-600' : 'text-blue-600'}">
                                        ${progress.isExpired ? '⚠️ 만료' : `${progress.remainingDays}일`}
                                    </span>
                                </div>
                                
                                <div class="progress-bar-wrapper">
                                    <div class="progress-bar ${progressClass}" style="width: ${progress.percentage}%">
                                        ${progress.percentage > 20 ? `${progress.percentage}%` : ''}
                                    </div>
                                </div>
                                
                                <div class="flex justify-between text-xs text-gray-400 mt-0.5">
                                    <span>${m.insurance_start_date}</span>
                                    <span>${m.insurance_end_date}</span>
                                </div>
                                
                                ${progress.isExpired ? `
                                    <div class="mt-1 bg-gradient-to-r from-red-50 to-red-100 text-red-700 px-1.5 py-0.5 rounded text-xs font-bold flex items-center">
                                        <i class="fas fa-exclamation-triangle mr-1"></i>만료
                                    </div>
                                ` : progress.isExpiringSoon ? `
                                    <div class="mt-1 bg-gradient-to-r from-red-50 to-red-100 text-red-700 px-1.5 py-0.5 rounded text-xs font-bold flex items-center">
                                        <i class="fas fa-exclamation-circle mr-1"></i>갱신필요
                                    </div>
                                ` : ''}
                            </div>
                            
                            <!-- 검사 기간 진행률 -->
                            <div class="mb-2 bg-white p-2 rounded-md shadow-sm border border-gray-100" id="inspection-progress-${m.id}">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-xs font-bold text-gray-700 flex items-center">
                                        <i class="fas fa-clipboard-check mr-1 text-green-500"></i>검사
                                    </span>
                                    <span class="text-xs text-gray-500" id="inspection-status-${m.id}">-</span>
                                </div>
                                <div class="progress-bar-wrapper" id="inspection-bar-${m.id}">
                                    <div class="progress-bar progress-safe" style="width: 0%"></div>
                                </div>
                                <div class="flex justify-between text-xs text-gray-400 mt-0.5" id="inspection-dates-${m.id}">
                                    <span>-</span>
                                    <span>-</span>
                                </div>
                            </div>
                            `}

                            <!-- 차량 상세 정보 -->
                            <div class="bg-white p-2 rounded-md shadow-sm border border-gray-100 mb-2">
                                <div class="grid grid-cols-2 gap-1.5 text-xs">
                                    <div class="flex items-center">
                                        <i class="fas fa-user w-3 text-blue-500 mr-1"></i>
                                        <div>
                                            <p class="text-xs text-gray-500">명의자</p>
                                            <p class="font-semibold text-gray-700 truncate">${m.owner_name}</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center">
                                        <i class="fas fa-id-card w-3 text-green-500 mr-1"></i>
                                        <div>
                                            <p class="text-xs text-gray-500">연령</p>
                                            <p class="font-semibold text-gray-700 text-xs">${m.driving_range}</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center col-span-2" id="contractor-info-${m.id}">
                                        <i class="fas fa-user-tie w-3 text-purple-500 mr-1"></i>
                                        <div>
                                            <p class="text-xs text-gray-500">계약자</p>
                                            <p class="font-semibold text-gray-700 truncate">-</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 버튼 -->
                            <div class="flex gap-1.5">
                                <button onclick="editMotorcycle(${m.id})" class="flex-1 bg-gradient-to-r from-blue-500 to-blue-600 text-white py-1.5 rounded-md hover:from-blue-600 hover:to-blue-700 transition-all active:scale-95 shadow-sm text-xs font-semibold">
                                    <i class="fas fa-edit mr-1"></i>수정
                                </button>
                                <button onclick="deleteMotorcycle(${m.id})" class="flex-1 bg-gradient-to-r from-red-500 to-red-600 text-white py-1.5 rounded-md hover:from-red-600 hover:to-red-700 transition-all active:scale-95 shadow-sm text-xs font-semibold">
                                    <i class="fas fa-trash mr-1"></i>삭제
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // 렌더링 후 각 오토바이의 계약 정보 및 검사 기간 로드
            motorcycles.forEach(m => {
                loadContractInfo(m.id);
                loadInspectionInfo(m);
            });
        }
        
        // 검사 기간 정보 로드 함수
        function loadInspectionInfo(motorcycle) {
            if (motorcycle.inspection_start_date && motorcycle.inspection_end_date) {
                const progress = calculateInsuranceProgress(motorcycle.inspection_start_date, motorcycle.inspection_end_date);
                
                let progressClass = 'progress-safe';
                let warningMessage = '';
                
                // 20일 이내면 빨간색
                if (progress.remainingDays <= 20 && progress.remainingDays > 0) {
                    progressClass = 'progress-danger';
                    warningMessage = `
                        <div class="mt-1 bg-gradient-to-r from-red-50 to-red-100 text-red-700 px-1.5 py-0.5 rounded text-xs font-bold flex items-center">
                            <i class="fas fa-exclamation-triangle mr-1"></i>검사임박
                        </div>
                    `;
                } else if (progress.isExpired) {
                    progressClass = 'progress-danger';
                    warningMessage = `
                        <div class="mt-1 bg-gradient-to-r from-red-50 to-red-100 text-red-700 px-1.5 py-0.5 rounded text-xs font-bold flex items-center">
                            <i class="fas fa-exclamation-triangle mr-1"></i>만료
                        </div>
                    `;
                } else if (progress.remainingDays <= 30) {
                    progressClass = 'progress-warning';
                }
                
                const inspectionStatusEl = document.getElementById(`inspection-status-${motorcycle.id}`);
                if (inspectionStatusEl) {
                    inspectionStatusEl.innerHTML = `
                        <span class="font-bold ${progress.remainingDays <= 20 ? 'text-red-600' : progress.remainingDays <= 30 ? 'text-yellow-600' : 'text-blue-600'}">
                            ${progress.isExpired ? '⚠️ 만료' : `${progress.remainingDays}일`}
                        </span>
                    `;
                }
                
                const inspectionBarEl = document.getElementById(`inspection-bar-${motorcycle.id}`);
                if (inspectionBarEl) {
                    inspectionBarEl.innerHTML = `
                        <div class="progress-bar ${progressClass}" style="width: ${progress.percentage}%">
                            ${progress.percentage > 15 ? `${progress.percentage}%` : ''}
                        </div>
                    `;
                    if (warningMessage) {
                        inspectionBarEl.insertAdjacentHTML('afterend', warningMessage);
                    }
                }
                
                const inspectionDatesEl = document.getElementById(`inspection-dates-${motorcycle.id}`);
                if (inspectionDatesEl) {
                    inspectionDatesEl.innerHTML = `
                        <span>${motorcycle.inspection_start_date}</span>
                        <span>${motorcycle.inspection_end_date}</span>
                    `;
                }
            }
        }
        
        // 계약 정보 로드 함수
        async function loadContractInfo(motorcycleId) {
            try {
                const response = await axios.get(`/api/motorcycles/${motorcycleId}/contracts`);
                const contracts = response.data;
                
                // 진행 중인 계약 찾기
                const activeContract = contracts.find(c => c.status === 'active');
                
                if (activeContract) {
                    // 계약자 정보 업데이트
                    const contractorEl = document.getElementById(`contractor-info-${motorcycleId}`);
                    if (contractorEl) {
                        contractorEl.innerHTML = `
                            <i class="fas fa-user-tie w-3 text-purple-500 mr-1"></i>
                            <div>
                                <p class="text-xs text-gray-500">계약자</p>
                                <p class="font-semibold text-gray-700 truncate">${activeContract.customer_name || '-'}</p>
                            </div>
                        `;
                    }
                    
                    // 계약 기간 프로그레스 바 업데이트
                    const progress = calculateInsuranceProgress(activeContract.start_date, activeContract.end_date);
                    
                    let progressClass = 'progress-safe';
                    let warningMessage = '';
                    
                    // 10일 이내면 빨간색
                    if (progress.remainingDays <= 10 && progress.remainingDays > 0) {
                        progressClass = 'progress-danger';
                        warningMessage = `
                            <div class="mt-1 bg-gradient-to-r from-red-50 to-red-100 text-red-700 px-1.5 py-0.5 rounded text-xs font-bold flex items-center">
                                <i class="fas fa-exclamation-triangle mr-1"></i>종료임박
                            </div>
                        `;
                    } else if (progress.isExpired) {
                        progressClass = 'progress-danger';
                        warningMessage = `
                            <div class="mt-1 bg-gradient-to-r from-red-50 to-red-100 text-red-700 px-1.5 py-0.5 rounded text-xs font-bold flex items-center">
                                <i class="fas fa-exclamation-triangle mr-1"></i>만료
                            </div>
                        `;
                    } else if (progress.remainingDays <= 30) {
                        progressClass = 'progress-warning';
                    }
                    
                    const contractStatusEl = document.getElementById(`contract-status-${motorcycleId}`);
                    if (contractStatusEl) {
                        contractStatusEl.innerHTML = `
                            <span class="font-bold ${progress.remainingDays <= 10 ? 'text-red-600' : progress.remainingDays <= 30 ? 'text-yellow-600' : 'text-blue-600'}">
                                ${progress.isExpired ? '⚠️ 만료' : `${progress.remainingDays}일`}
                            </span>
                        `;
                    }
                    
                    const contractBarEl = document.getElementById(`contract-bar-${motorcycleId}`);
                    if (contractBarEl) {
                        contractBarEl.innerHTML = `
                            <div class="progress-bar ${progressClass}" style="width: ${progress.percentage}%">
                                ${progress.percentage > 15 ? `${progress.percentage}%` : ''}
                            </div>
                        `;
                        if (warningMessage) {
                            contractBarEl.insertAdjacentHTML('afterend', warningMessage);
                        }
                    }
                    
                    const contractDatesEl = document.getElementById(`contract-dates-${motorcycleId}`);
                    if (contractDatesEl) {
                        contractDatesEl.innerHTML = `
                            <span>${activeContract.start_date}</span>
                            <span>${activeContract.end_date}</span>
                        `;
                    }
                }
            } catch (error) {
                console.error(`Error loading contract info for motorcycle ${motorcycleId}:`, error);
            }
        }

        async function showHistory(motorcycleId) {
            try {
                // 오토바이 정보 조회
                const motorcycleResponse = await axios.get(`/api/motorcycles/${motorcycleId}`);
                const motorcycle = motorcycleResponse.data;
                
                // 계약 이력 조회
                const historyResponse = await axios.get(`/api/motorcycles/${motorcycleId}/contracts`);
                const contracts = historyResponse.data;
                
                // 오토바이 정보 표시
                document.getElementById('motorcycleInfo').innerHTML = `
                    <h3 class="text-lg font-bold mb-2">${motorcycle.vehicle_name}</h3>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <p><strong>번호판:</strong> ${motorcycle.plate_number}</p>
                        <p><strong>차대번호:</strong> ${motorcycle.chassis_number}</p>
                        <p><strong>연식:</strong> ${motorcycle.model_year}년</p>
                        <p><strong>주행거리:</strong> ${Number(motorcycle.mileage).toLocaleString()} km</p>
                    </div>
                `;
                
                // 계약 이력 표시
                if (contracts.length === 0) {
                    document.getElementById('contractHistory').innerHTML = `
                        <div class="text-center py-8 text-gray-500">
                            <i class="fas fa-inbox text-4xl mb-2 opacity-50"></i>
                            <p>계약 이력이 없습니다</p>
                        </div>
                    `;
                } else {
                    const statusColors = {
                        'active': 'bg-green-100 text-green-800',
                        'completed': 'bg-gray-100 text-gray-800',
                        'cancelled': 'bg-red-100 text-red-800'
                    };
                    const statusTexts = {
                        'active': '진행중',
                        'completed': '완료',
                        'cancelled': '취소'
                    };
                    const typeTexts = {
                        'lease': '리스',
                        'rent': '렌트'
                    };
                    
                    document.getElementById('contractHistory').innerHTML = `
                        <div class="space-y-4">
                            <h4 class="font-bold text-gray-700">총 ${contracts.length}건의 계약</h4>
                            ${contracts.map(contract => `
                                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                    <div class="flex justify-between items-start mb-3">
                                        <div>
                                            <p class="font-bold text-gray-800">${contract.contract_number}</p>
                                            <p class="text-sm text-gray-600">${contract.customer_name} (${contract.customer_phone})</p>
                                        </div>
                                        <div class="flex gap-2">
                                            <span class="px-2 py-1 rounded text-xs font-bold ${statusColors[contract.status]}">
                                                ${statusTexts[contract.status]}
                                            </span>
                                            <span class="px-2 py-1 rounded text-xs font-bold bg-blue-100 text-blue-800">
                                                ${typeTexts[contract.contract_type]}
                                            </span>
                                        </div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-2 text-sm text-gray-600">
                                        <p><strong>계약기간:</strong> ${contract.start_date} ~ ${contract.end_date}</p>
                                        <p><strong>월납부금:</strong> ${Number(contract.monthly_fee).toLocaleString()}원</p>
                                        <p><strong>보증금:</strong> ${Number(contract.deposit || 0).toLocaleString()}원</p>
                                        <p><strong>작성일:</strong> ${new Date(contract.created_at).toLocaleDateString('ko-KR')}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
                
                document.getElementById('historyModal').classList.remove('hidden');
            } catch (error) {
                console.error('Error loading contract history:', error);
                alert('계약 이력을 불러오는데 실패했습니다');
            }
        }

        function hideHistoryModal() {
            document.getElementById('historyModal').classList.add('hidden');
        }

        function showAddModal() {
            document.getElementById('modalTitle').textContent = '오토바이 등록';
            document.getElementById('motorcycleForm').reset();
            document.getElementById('motorcycleId').value = '';
            clearCertificate();
            document.getElementById('motorcycleModal').classList.remove('hidden');
        }
        
        // 사용필증 촬영 관련 변수
        let certificatePhotoData = '';
        let certificateStream = null;
        
        function startCertificateCamera() {
            const video = document.getElementById('certificateVideo');
            
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: 'environment',
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                } 
            })
            .then(stream => {
                certificateStream = stream;
                video.srcObject = stream;
                document.getElementById('cameraModal').classList.remove('hidden');
            })
            .catch(err => {
                console.error('Camera error:', err);
                alert('카메라를 시작할 수 없습니다. 권한을 확인해주세요.');
            });
        }
        
        function captureCertificate() {
            const video = document.getElementById('certificateVideo');
            const canvas = document.getElementById('certificateCanvas');
            const context = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            certificatePhotoData = canvas.toDataURL('image/jpeg', 0.8);
            
            document.getElementById('certificateImage').src = certificatePhotoData;
            document.getElementById('certificatePreview').classList.remove('hidden');
            
            stopCertificateCamera();
        }
        
        function stopCertificateCamera() {
            if (certificateStream) {
                certificateStream.getTracks().forEach(track => track.stop());
                certificateStream = null;
            }
            document.getElementById('cameraModal').classList.add('hidden');
        }
        
        function handleCertificateUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    certificatePhotoData = e.target.result;
                    document.getElementById('certificateImage').src = certificatePhotoData;
                    document.getElementById('certificatePreview').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }
        
        function clearCertificate() {
            certificatePhotoData = '';
            document.getElementById('certificatePreview').classList.add('hidden');
            document.getElementById('certificateUpload').value = '';
        }

        async function editMotorcycle(id) {
            try {
                const response = await axios.get(`/api/motorcycles/${id}`);
                const m = response.data;

                document.getElementById('modalTitle').textContent = '오토바이 수정';
                document.getElementById('motorcycleId').value = m.id;
                document.getElementById('plateNumber').value = m.plate_number;
                document.getElementById('vehicleName').value = m.vehicle_name;
                document.getElementById('chassisNumber').value = m.chassis_number;
                document.getElementById('mileage').value = m.mileage;
                document.getElementById('modelYear').value = m.model_year;
                document.getElementById('insuranceCompany').value = m.insurance_company;
                document.getElementById('insuranceStartDate').value = m.insurance_start_date;
                document.getElementById('insuranceEndDate').value = m.insurance_end_date;
                document.getElementById('inspectionStartDate').value = m.inspection_start_date || '';
                document.getElementById('inspectionEndDate').value = m.inspection_end_date || '';
                document.getElementById('drivingRange').value = m.driving_range;
                document.getElementById('ownerName').value = m.owner_name;
                document.getElementById('insuranceFee').value = m.insurance_fee;
                document.getElementById('vehiclePrice').value = m.vehicle_price;
                document.getElementById('dailyRentalFee').value = m.daily_rental_fee || 0;
                document.getElementById('usageNotes').value = m.usage_notes || '';
                document.getElementById('status').value = m.status;
                
                // 사용필증 로드
                if (m.certificate_photo) {
                    certificatePhotoData = m.certificate_photo;
                    document.getElementById('certificateImage').src = certificatePhotoData;
                    document.getElementById('certificatePreview').classList.remove('hidden');
                } else {
                    clearCertificate();
                }

                document.getElementById('motorcycleModal').classList.remove('hidden');
            } catch (error) {
                console.error('Error loading motorcycle:', error);
                alert('오토바이 정보를 불러오는데 실패했습니다');
            }
        }

        async function deleteMotorcycle(id) {
            if (!confirm('정말 삭제하시겠습니까?')) return;

            try {
                await axios.delete(`/api/motorcycles/${id}`);
                alert('삭제되었습니다');
                loadMotorcycles();
            } catch (error) {
                console.error('Error deleting motorcycle:', error);
                alert('삭제에 실패했습니다');
            }
        }

        function hideModal() {
            document.getElementById('motorcycleModal').classList.add('hidden');
        }

        document.getElementById('motorcycleForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('motorcycleId').value;
            const data = {
                plate_number: document.getElementById('plateNumber').value,
                vehicle_name: document.getElementById('vehicleName').value,
                chassis_number: document.getElementById('chassisNumber').value,
                mileage: parseInt(document.getElementById('mileage').value),
                model_year: parseInt(document.getElementById('modelYear').value),
                insurance_company: document.getElementById('insuranceCompany').value,
                insurance_start_date: document.getElementById('insuranceStartDate').value,
                insurance_end_date: document.getElementById('insuranceEndDate').value,
                inspection_start_date: document.getElementById('inspectionStartDate').value || null,
                inspection_end_date: document.getElementById('inspectionEndDate').value || null,
                driving_range: document.getElementById('drivingRange').value,
                owner_name: document.getElementById('ownerName').value,
                insurance_fee: parseInt(document.getElementById('insuranceFee').value),
                vehicle_price: parseInt(document.getElementById('vehiclePrice').value),
                daily_rental_fee: parseInt(document.getElementById('dailyRentalFee').value) || 0,
                usage_notes: document.getElementById('usageNotes').value || '',
                status: document.getElementById('status').value,
                certificate_photo: certificatePhotoData || null
            };

            try {
                if (id) {
                    await axios.put(`/api/motorcycles/${id}`, data);
                    alert('수정되었습니다');
                } else {
                    await axios.post('/api/motorcycles', data);
                    alert('등록되었습니다');
                }
                hideModal();
                loadMotorcycles();
            } catch (error) {
                console.error('Error saving motorcycle:', error);
                alert('저장에 실패했습니다');
            }
        });
    </script>
</body>
</html>
