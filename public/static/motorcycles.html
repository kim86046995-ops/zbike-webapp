            const data = {
                plate_number: document.getElementById('plateNumber').value,
                vehicle_name: document.getElementById('vehicleName').value,
                chassis_number: document.getElementById('chassisNumber').value,
                model_year: parseInt(document.getElementById('modelYear').value),
                insurance_company: document.getElementById('insuranceCompany').value,
                insurance_start_date: document.getElementById('insuranceStartDate').value,
                insurance_end_date: document.getElementById('insuranceEndDate').value,
                inspection_start_date: document.getElementById('inspectionStartDate').value || null,
                inspection_end_date: document.getElementById('inspectionEndDate').value || null,
                driving_range: document.getElementById('drivingRange').value,
                owner_name: document.getElementById('ownerName').value,
                insurance_fee: parseInt(document.getElementById('insuranceFee').value),
                vehicle_price: parseInt(document.getElementById('vehiclePrice').value),
                usage_notes: document.getElementById('usageNotes').value || '',
                status: 'available', // 항상 available로 설정
                certificate_photo: certificatePhotoData || null
            };

            try {
                if (id) {
                    await axios.put(`/api/motorcycles/${id}`, data);
                    alert('수정되었습니다');
                } else {
                    await axios.post('/api/motorcycles', data);
                    alert('등록되었습니다');
                }
                hideModal();
                loadMotorcycles();
            } catch (error) {
                console.error('Error saving motorcycle:', error);
                alert('저장에 실패했습니다');
            }
        });

        // 사용 이력 조회
        async function searchHistory() {
            const searchTerm = document.getElementById('historySearchInput').value.trim();
            
            if (!searchTerm) {
                alert('번호판 또는 차대번호를 입력해주세요');
                return;
            }
            
            try {
                const response = await axios.get(`/api/motorcycles/history/search?q=${encodeURIComponent(searchTerm)}`);
                const { motorcycle, history } = response.data;
                
                displayHistory(motorcycle, history);
                document.getElementById('historySearchModal').classList.remove('hidden');
            } catch (error) {
                console.error('Error searching history:', error);
                if (error.response?.status === 404) {
                    alert('해당 오토바이를 찾을 수 없습니다');
                } else {
                    alert('사용 이력 조회에 실패했습니다: ' + (error.response?.data?.error || error.message));
                }
            }
        }

        function displayHistory(motorcycle, history) {
            // 오토바이 정보 표시
            const motorcycleInfoHtml = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                    <div><strong class="text-blue-600">번호판:</strong> ${motorcycle.plate_number}</div>
                    <div><strong class="text-blue-600">차량명:</strong> ${motorcycle.vehicle_name}</div>
                    <div><strong class="text-blue-600">차대번호:</strong> ${motorcycle.chassis_number}</div>
                    <div><strong class="text-blue-600">연식:</strong> ${motorcycle.model_year}년</div>
                </div>
            `;
            document.getElementById('historyMotorcycleInfo').innerHTML = motorcycleInfoHtml;
            
            // 이력 목록 표시
            if (history.length === 0) {
                document.getElementById('historyList').innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <i class="fas fa-inbox text-4xl mb-2"></i>
                        <p>사용 이력이 없습니다</p>
                    </div>
                `;
                return;
            }
            
            const typeTexts = { 'lease': '리스', 'rent': '렌트', 'business': '업체리스/렌트' };
            const statusTexts = { 'active': '진행중', 'completed': '완료', 'cancelled': '취소', 'pending': '대기' };
            
            const historyHtml = history.map((h, index) => {
                const isDeleted = h.deleted_at !== null;
                const statusBadge = isDeleted 
                    ? '<span class="px-2 py-1 text-xs rounded bg-red-100 text-red-600">삭제됨</span>'
                    : `<span class="px-2 py-1 text-xs rounded ${h.status === 'active' ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-600'}">${statusTexts[h.status]}</span>`;
                
                return `
                    <div class="bg-white border ${isDeleted ? 'border-red-200' : 'border-gray-200'} rounded-lg p-4 mb-3">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="font-bold text-lg">#${index + 1} ${h.contract_number}</span>
                                    ${statusBadge}
                                    <span class="px-2 py-1 text-xs rounded bg-blue-100 text-blue-600">${typeTexts[h.contract_type]}</span>
                                </div>
                                <p class="text-sm text-gray-600">
                                    <i class="fas fa-calendar mr-1"></i>
                                    작성일: ${new Date(h.created_at).toLocaleString('ko-KR')}
                                </p>
                                ${isDeleted ? `<p class="text-sm text-red-600"><i class="fas fa-trash mr-1"></i>삭제일: ${new Date(h.deleted_at).toLocaleString('ko-KR')}</p>` : ''}
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm">
                            <div>
                                <p class="mb-1"><strong>계약자:</strong> <span class="text-lg font-bold text-gray-900">${h.customer_name}</span></p>
                                <p class="mb-1"><strong>전화번호:</strong> ${h.customer_phone}</p>
                                <p><strong>주민번호:</strong> ${h.resident_number || '-'}</p>
                            </div>
                            <div>
                                <p class="mb-1"><strong>계약기간:</strong> ${h.start_date} ~ ${h.end_date}</p>
                                <p class="mb-1"><strong>일대여료:</strong> ${Number(h.monthly_fee).toLocaleString()}원</p>
                                <p><strong>보증금:</strong> ${Number(h.deposit || 0).toLocaleString()}원</p>
                            </div>
                        </div>
                        
                        ${h.special_terms ? `
                            <div class="mt-3 pt-3 border-t">
                                <p class="text-sm"><strong>특약사항:</strong></p>
                                <p class="text-sm text-gray-600 whitespace-pre-wrap">${h.special_terms}</p>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            document.getElementById('historyList').innerHTML = `
                <div class="mb-3 text-sm text-gray-600">
                    <i class="fas fa-info-circle mr-1"></i>
                    총 ${history.length}건의 사용 이력 (삭제된 계약 포함)
                </div>
                ${historyHtml}
            `;
        }

        function hideHistoryModal() {
            // 두 모달 모두 닫기
            document.getElementById('historyModal').classList.add('hidden');
            document.getElementById('historySearchModal').classList.add('hidden');
            document.getElementById('historySearchInput').value = '';
        }
    </script>
</body>
</html>
