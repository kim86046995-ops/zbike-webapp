<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오토바이 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .insurance-progress {
            transition: width 0.3s ease;
        }
        .motorcycle-card {
            transition: all 0.3s ease;
            border-left: 4px solid #3b82f6;
        }
        .motorcycle-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .motorcycle-card.status-available {
            border-left-color: #10b981;
        }
        .motorcycle-card.status-rented {
            border-left-color: #f59e0b;
        }
        .motorcycle-card.status-maintenance {
            border-left-color: #ef4444;
        }
        .progress-bar-wrapper {
            position: relative;
            height: 24px;
            background: #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            border-radius: 12px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.75rem;
        }
        .progress-bar.progress-safe {
            background: linear-gradient(90deg, #10b981, #34d399);
        }
        .progress-bar.progress-warning {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }
        .progress-bar.progress-danger {
            background: linear-gradient(90deg, #ef4444, #f87171);
        }
        .info-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .plate-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e40af;
            cursor: pointer;
            transition: color 0.2s;
        }
        .plate-number:hover {
            color: #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- 헤더 -->
        <header class="bg-blue-600 text-white shadow-lg">
            <div class="container mx-auto px-4 py-4 flex items-center justify-between">
                <a href="/" class="text-xl font-bold">
                    <i class="fas fa-arrow-left mr-2"></i>
                    오토바이 관리
                </a>
                <button onclick="showAddModal()" class="bg-white text-blue-600 px-4 py-2 rounded-lg font-bold hover:bg-blue-50">
                    <i class="fas fa-plus mr-2"></i>오토바이 등록
                </button>
            </div>
        </header>

        <!-- 메인 컨텐츠 -->
        <main class="container mx-auto px-4 py-8">
            <!-- 필터 -->
            <div class="bg-white rounded-lg shadow-md p-4 mb-6">
                <label class="block text-sm font-bold mb-2">상태 필터</label>
                <select id="statusFilter" onchange="filterMotorcycles()" class="w-full md:w-64 px-3 py-2 border rounded-lg">
                    <option value="">전체</option>
                    <option value="available">사용가능</option>
                    <option value="rented">렌트중</option>
                    <option value="maintenance">정비중</option>
                </select>
            </div>

            <!-- 오토바이 목록 -->
            <div id="motorcycleList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 로딩 중... -->
                <div class="col-span-full text-center py-8 text-gray-500">
                    <i class="fas fa-spinner fa-spin text-2xl"></i>
                    <p class="mt-2">로딩 중...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- 등록/수정 모달 -->
    <div id="motorcycleModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full my-8">
            <div class="p-6">
                <h2 id="modalTitle" class="text-2xl font-bold mb-6">오토바이 등록</h2>
                <form id="motorcycleForm" class="space-y-4">
                    <input type="hidden" id="motorcycleId">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold mb-2">번호판 *</label>
                            <input type="text" id="plateNumber" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">차량이름 *</label>
                            <input type="text" id="vehicleName" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">차대번호 *</label>
                            <input type="text" id="chassisNumber" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">키로수 *</label>
                            <input type="number" id="mileage" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">연식 *</label>
                            <input type="number" id="modelYear" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="예: 2023">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">보험사 *</label>
                            <input type="text" id="insuranceCompany" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">보험 시작일 *</label>
                            <input type="date" id="insuranceStartDate" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">보험 종료일 *</label>
                            <input type="date" id="insuranceEndDate" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">운전연령 *</label>
                            <select id="drivingRange" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                                <option value="">선택하세요</option>
                                <option value="전연령">전연령</option>
                                <option value="만19세이상">만19세이상</option>
                                <option value="만21세이상">만21세이상</option>
                                <option value="만24세이상">만24세이상</option>
                                <option value="만26세이상">만26세이상</option>
                                <option value="만30세이상">만30세이상</option>
                                <option value="만35세이상">만35세이상</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">명의자 *</label>
                            <input type="text" id="ownerName" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">보험료 (원) *</label>
                            <input type="number" id="insuranceFee" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">차량금액 (원) *</label>
                            <input type="number" id="vehiclePrice" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">일대여료 (원) *</label>
                            <input type="number" id="dailyRentalFee" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="1일 대여 금액">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">상태 *</label>
                            <select id="status" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                                <option value="available">사용가능</option>
                                <option value="rented">렌트중</option>
                                <option value="maintenance">정비중</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold mb-2">사용페지</label>
                            <textarea id="usageNotes" rows="3" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="오토바이 사용 관련 특이사항을 입력하세요"></textarea>
                        </div>
                    </div>

                    <div class="flex gap-3 pt-4">
                        <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                            <i class="fas fa-save mr-2"></i>저장
                        </button>
                        <button type="button" onclick="hideModal()" class="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-400 transition">
                            취소
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 계약 이력 모달 -->
    <div id="historyModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full my-8">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">
                        <i class="fas fa-history mr-2 text-blue-600"></i>
                        계약 이력
                    </h2>
                    <button onclick="hideHistoryModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
                
                <div id="motorcycleInfo" class="bg-blue-50 p-4 rounded-lg mb-6"></div>
                <div id="contractHistory"></div>

                <div class="mt-6">
                    <button onclick="hideHistoryModal()" class="w-full bg-gray-300 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-400">
                        닫기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        let motorcycles = [];

        window.addEventListener('DOMContentLoaded', loadMotorcycles);

        async function loadMotorcycles() {
            try {
                const status = document.getElementById('statusFilter').value;
                const url = status ? `/api/motorcycles?status=${status}` : '/api/motorcycles';
                const response = await axios.get(url);
                motorcycles = response.data;
                renderMotorcycles();
            } catch (error) {
                console.error('Error loading motorcycles:', error);
                alert('오토바이 목록을 불러오는데 실패했습니다');
            }
        }

        function filterMotorcycles() {
            loadMotorcycles();
        }

        function calculateInsuranceProgress(startDate, endDate) {
            const start = new Date(startDate);
            const end = new Date(endDate);
            const today = new Date();
            
            const totalDays = (end - start) / (1000 * 60 * 60 * 24);
            const elapsedDays = (today - start) / (1000 * 60 * 60 * 24);
            const remainingDays = (end - today) / (1000 * 60 * 60 * 24);
            
            const percentage = Math.max(0, Math.min(100, (elapsedDays / totalDays) * 100));
            const remainingPercentage = 100 - percentage;
            
            return {
                percentage: percentage.toFixed(1),
                remainingPercentage: remainingPercentage.toFixed(1),
                remainingDays: Math.ceil(remainingDays),
                isExpired: today > end,
                isExpiringSoon: remainingDays <= 30 && remainingDays > 0
            };
        }

        function getProgressColor(progress) {
            if (progress.isExpired) return 'bg-red-500';
            if (progress.isExpiringSoon) return 'bg-yellow-500';
            if (progress.remainingPercentage > 50) return 'bg-green-500';
            if (progress.remainingPercentage > 25) return 'bg-blue-500';
            return 'bg-orange-500';
        }

        function renderMotorcycles() {
            const listEl = document.getElementById('motorcycleList');
            
            if (motorcycles.length === 0) {
                listEl.innerHTML = `
                    <div class="col-span-full text-center py-12 text-gray-500">
                        <i class="fas fa-inbox text-5xl mb-3 opacity-50"></i>
                        <p class="text-lg">등록된 오토바이가 없습니다</p>
                        <button onclick="showAddModal()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                            <i class="fas fa-plus mr-2"></i>첫 오토바이 등록하기
                        </button>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = motorcycles.map(m => {
                const statusConfig = {
                    'available': { bg: 'bg-green-100', text: 'text-green-800', icon: 'fa-check-circle', label: '사용가능', border: 'status-available' },
                    'rented': { bg: 'bg-yellow-100', text: 'text-yellow-800', icon: 'fa-motorcycle', label: '렌트중', border: 'status-rented' },
                    'maintenance': { bg: 'bg-red-100', text: 'text-red-800', icon: 'fa-tools', label: '정비중', border: 'status-maintenance' }
                };

                const status = statusConfig[m.status] || statusConfig['available'];
                const progress = calculateInsuranceProgress(m.insurance_start_date, m.insurance_end_date);
                
                let progressClass = 'progress-safe';
                if (progress.isExpired) progressClass = 'progress-danger';
                else if (progress.isExpiringSoon) progressClass = 'progress-warning';
                else if (progress.remainingPercentage < 50) progressClass = 'progress-warning';

                return `
                    <div class="motorcycle-card ${status.border} bg-white rounded-xl shadow-md overflow-hidden">
                        <!-- 상단: 번호판 클릭 영역 -->
                        <div class="relative bg-gradient-to-br from-blue-600 via-blue-500 to-indigo-600 p-5 cursor-pointer hover:from-blue-700 hover:via-blue-600 hover:to-indigo-700 transition-all" onclick="showHistory(${m.id})">
                            <div class="flex justify-between items-center">
                                <div>
                                    <p class="text-blue-100 text-xs font-semibold uppercase tracking-wide mb-1">
                                        <i class="fas fa-id-card mr-1"></i>번호판
                                    </p>
                                    <p class="text-white text-3xl font-black tracking-tight">${m.plate_number}</p>
                                </div>
                                <div class="flex flex-col items-center">
                                    <div class="w-12 h-12 bg-white bg-opacity-20 rounded-full flex items-center justify-center">
                                        <i class="fas fa-history text-2xl text-white"></i>
                                    </div>
                                    <p class="text-white text-xs mt-1 font-medium">계약이력</p>
                                </div>
                            </div>
                        </div>

                        <div class="p-6 bg-gradient-to-br from-white to-gray-50">
                            <!-- 차량명 및 상태 -->
                            <div class="flex justify-between items-start mb-5">
                                <div>
                                    <h3 class="text-2xl font-bold text-gray-800 mb-1">${m.vehicle_name}</h3>
                                    <p class="text-sm text-gray-500"><i class="fas fa-calendar-alt mr-1"></i>${m.model_year}년식</p>
                                </div>
                                <span class="info-badge ${status.bg} ${status.text}">
                                    <i class="fas ${status.icon} mr-1"></i>${status.label}
                                </span>
                            </div>
                            
                            <!-- 계약 기간 진행률 (보험 위에 표시) -->
                            <div class="mb-3 bg-white p-4 rounded-xl shadow-sm border border-gray-100" id="contract-progress-${m.id}">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-sm font-bold text-gray-700 flex items-center">
                                        <i class="fas fa-file-contract mr-2 text-purple-500"></i>계약 기간
                                    </span>
                                    <span class="text-xs text-gray-500" id="contract-status-${m.id}">
                                        <i class="fas fa-spinner fa-spin"></i> 조회중...
                                    </span>
                                </div>
                                <div class="progress-bar-wrapper" id="contract-bar-${m.id}">
                                    <div class="progress-bar progress-safe" style="width: 0%"></div>
                                </div>
                                <div class="flex justify-between text-xs text-gray-400 mt-1" id="contract-dates-${m.id}">
                                    <span>-</span>
                                    <span>-</span>
                                </div>
                            </div>
                            
                            <!-- 보험 기간 진행률 -->
                            <div class="mb-5 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                                <div class="flex justify-between items-center mb-3">
                                    <span class="text-sm font-bold text-gray-700 flex items-center">
                                        <i class="fas fa-shield-alt mr-2 text-blue-500"></i>보험 기간
                                    </span>
                                    <span class="text-sm font-bold ${progress.isExpired ? 'text-red-600' : progress.isExpiringSoon ? 'text-red-600' : 'text-blue-600'}">
                                        ${progress.isExpired ? '⚠️ 만료됨' : `🕒 ${progress.remainingDays}일 남음`}
                                    </span>
                                </div>
                                
                                <div class="progress-bar-wrapper">
                                    <div class="progress-bar ${progressClass}" style="width: ${progress.percentage}%">
                                        ${progress.percentage > 15 ? `${progress.percentage}%` : ''}
                                    </div>
                                </div>
                                
                                <div class="flex justify-between text-xs text-gray-500 mt-2">
                                    <span><i class="far fa-calendar-check mr-1"></i>${m.insurance_start_date}</span>
                                    <span><i class="far fa-calendar-times mr-1"></i>${m.insurance_end_date}</span>
                                </div>
                                
                                ${progress.isExpired ? `
                                    <div class="mt-3 bg-gradient-to-r from-red-50 to-red-100 text-red-700 px-3 py-2 rounded-lg text-xs font-bold flex items-center">
                                        <i class="fas fa-exclamation-triangle mr-2 text-lg"></i>보험이 만료되었습니다! 즉시 갱신 필요
                                    </div>
                                ` : progress.isExpiringSoon ? `
                                    <div class="mt-3 bg-gradient-to-r from-red-50 to-red-100 text-red-700 px-3 py-2 rounded-lg text-xs font-bold flex items-center">
                                        <i class="fas fa-exclamation-circle mr-2 text-lg"></i>보험 갱신이 곧 필요합니다 (30일 이내)
                                    </div>
                                ` : ''}
                            </div>

                            <!-- 차량 상세 정보 -->
                            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-5">
                                <h4 class="text-sm font-bold text-gray-700 mb-3 flex items-center">
                                    <i class="fas fa-info-circle mr-2 text-blue-500"></i>차량 정보
                                </h4>
                                <div class="grid grid-cols-2 gap-3 text-sm">
                                    <div class="flex items-center">
                                        <i class="fas fa-user w-5 text-blue-500 mr-2"></i>
                                        <div>
                                            <p class="text-xs text-gray-500">명의자</p>
                                            <p class="font-semibold text-gray-700">${m.owner_name}</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center">
                                        <i class="fas fa-id-card w-5 text-green-500 mr-2"></i>
                                        <div>
                                            <p class="text-xs text-gray-500">운전연령</p>
                                            <p class="font-semibold text-gray-700">${m.driving_range}</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center" id="contractor-info-${m.id}">
                                        <i class="fas fa-user-tie w-5 text-purple-500 mr-2"></i>
                                        <div>
                                            <p class="text-xs text-gray-500">계약자</p>
                                            <p class="font-semibold text-gray-700">-</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 버튼 -->
                            <div class="flex gap-3">
                                <button onclick="editMotorcycle(${m.id})" class="flex-1 bg-gradient-to-r from-blue-500 to-blue-600 text-white py-3 rounded-lg hover:from-blue-600 hover:to-blue-700 transition-all shadow-md hover:shadow-lg font-semibold">
                                    <i class="fas fa-edit mr-2"></i>수정
                                </button>
                                <button onclick="deleteMotorcycle(${m.id})" class="flex-1 bg-gradient-to-r from-red-500 to-red-600 text-white py-3 rounded-lg hover:from-red-600 hover:to-red-700 transition-all shadow-md hover:shadow-lg font-semibold">
                                    <i class="fas fa-trash mr-2"></i>삭제
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // 렌더링 후 각 오토바이의 계약 정보 로드
            motorcycles.forEach(m => {
                loadContractInfo(m.id);
            });
        }
        
        // 계약 정보 로드 함수
        async function loadContractInfo(motorcycleId) {
            try {
                const response = await axios.get(`/api/motorcycles/${motorcycleId}/contracts`);
                const contracts = response.data;
                
                // 진행 중인 계약 찾기
                const activeContract = contracts.find(c => c.status === 'active');
                
                if (activeContract) {
                    // 계약자 정보 업데이트
                    const contractorEl = document.getElementById(`contractor-info-${motorcycleId}`);
                    if (contractorEl) {
                        contractorEl.innerHTML = `
                            <i class="fas fa-user-tie w-5 text-purple-500 mr-2"></i>
                            <div>
                                <p class="text-xs text-gray-500">계약자</p>
                                <p class="font-semibold text-gray-700">${activeContract.customer_name || '-'}</p>
                            </div>
                        `;
                    }
                    
                    // 계약 기간 프로그레스 바 업데이트
                    const progress = calculateInsuranceProgress(activeContract.start_date, activeContract.end_date);
                    
                    let progressClass = 'progress-safe';
                    let warningMessage = '';
                    
                    // 10일 이내면 빨간색
                    if (progress.remainingDays <= 10 && progress.remainingDays > 0) {
                        progressClass = 'progress-danger';
                        warningMessage = `
                            <div class="mt-2 bg-gradient-to-r from-red-50 to-red-100 text-red-700 px-3 py-2 rounded-lg text-xs font-bold flex items-center">
                                <i class="fas fa-exclamation-triangle mr-2 text-lg"></i>계약 종료가 임박했습니다! (10일 이내)
                            </div>
                        `;
                    } else if (progress.isExpired) {
                        progressClass = 'progress-danger';
                        warningMessage = `
                            <div class="mt-2 bg-gradient-to-r from-red-50 to-red-100 text-red-700 px-3 py-2 rounded-lg text-xs font-bold flex items-center">
                                <i class="fas fa-exclamation-triangle mr-2 text-lg"></i>계약이 만료되었습니다!
                            </div>
                        `;
                    } else if (progress.remainingDays <= 30) {
                        progressClass = 'progress-warning';
                    }
                    
                    const contractStatusEl = document.getElementById(`contract-status-${motorcycleId}`);
                    if (contractStatusEl) {
                        contractStatusEl.innerHTML = `
                            <span class="font-bold ${progress.remainingDays <= 10 ? 'text-red-600' : progress.remainingDays <= 30 ? 'text-yellow-600' : 'text-blue-600'}">
                                ${progress.isExpired ? '⚠️ 만료됨' : `🕒 ${progress.remainingDays}일 남음`}
                            </span>
                        `;
                    }
                    
                    const contractBarEl = document.getElementById(`contract-bar-${motorcycleId}`);
                    if (contractBarEl) {
                        contractBarEl.innerHTML = `
                            <div class="progress-bar ${progressClass}" style="width: ${progress.percentage}%">
                                ${progress.percentage > 15 ? `${progress.percentage}%` : ''}
                            </div>
                        `;
                        contractBarEl.insertAdjacentHTML('afterend', warningMessage);
                    }
                    
                    const contractDatesEl = document.getElementById(`contract-dates-${motorcycleId}`);
                    if (contractDatesEl) {
                        contractDatesEl.innerHTML = `
                            <span><i class="far fa-calendar-check mr-1"></i>${activeContract.start_date}</span>
                            <span><i class="far fa-calendar-times mr-1"></i>${activeContract.end_date}</span>
                        `;
                    }
                } else {
                    // 진행 중인 계약이 없을 때
                    const contractProgressEl = document.getElementById(`contract-progress-${motorcycleId}`);
                    if (contractProgressEl) {
                        contractProgressEl.innerHTML = `
                            <div class="text-center text-gray-400 text-xs py-2">
                                <i class="fas fa-info-circle mr-1"></i>진행 중인 계약이 없습니다
                            </div>
                        `;
                    }
                }
            } catch (error) {
                console.error(`Error loading contract info for motorcycle ${motorcycleId}:`, error);
            }
        }

        async function showHistory(motorcycleId) {
            try {
                // 오토바이 정보 조회
                const motorcycleResponse = await axios.get(`/api/motorcycles/${motorcycleId}`);
                const motorcycle = motorcycleResponse.data;
                
                // 계약 이력 조회
                const historyResponse = await axios.get(`/api/motorcycles/${motorcycleId}/contracts`);
                const contracts = historyResponse.data;
                
                // 오토바이 정보 표시
                document.getElementById('motorcycleInfo').innerHTML = `
                    <h3 class="text-lg font-bold mb-2">${motorcycle.vehicle_name}</h3>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <p><strong>번호판:</strong> ${motorcycle.plate_number}</p>
                        <p><strong>차대번호:</strong> ${motorcycle.chassis_number}</p>
                        <p><strong>연식:</strong> ${motorcycle.model_year}년</p>
                        <p><strong>주행거리:</strong> ${Number(motorcycle.mileage).toLocaleString()} km</p>
                    </div>
                `;
                
                // 계약 이력 표시
                if (contracts.length === 0) {
                    document.getElementById('contractHistory').innerHTML = `
                        <div class="text-center py-8 text-gray-500">
                            <i class="fas fa-inbox text-4xl mb-2 opacity-50"></i>
                            <p>계약 이력이 없습니다</p>
                        </div>
                    `;
                } else {
                    const statusColors = {
                        'active': 'bg-green-100 text-green-800',
                        'completed': 'bg-gray-100 text-gray-800',
                        'cancelled': 'bg-red-100 text-red-800'
                    };
                    const statusTexts = {
                        'active': '진행중',
                        'completed': '완료',
                        'cancelled': '취소'
                    };
                    const typeTexts = {
                        'lease': '리스',
                        'rent': '렌트'
                    };
                    
                    document.getElementById('contractHistory').innerHTML = `
                        <div class="space-y-4">
                            <h4 class="font-bold text-gray-700">총 ${contracts.length}건의 계약</h4>
                            ${contracts.map(contract => `
                                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                    <div class="flex justify-between items-start mb-3">
                                        <div>
                                            <p class="font-bold text-gray-800">${contract.contract_number}</p>
                                            <p class="text-sm text-gray-600">${contract.customer_name} (${contract.customer_phone})</p>
                                        </div>
                                        <div class="flex gap-2">
                                            <span class="px-2 py-1 rounded text-xs font-bold ${statusColors[contract.status]}">
                                                ${statusTexts[contract.status]}
                                            </span>
                                            <span class="px-2 py-1 rounded text-xs font-bold bg-blue-100 text-blue-800">
                                                ${typeTexts[contract.contract_type]}
                                            </span>
                                        </div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-2 text-sm text-gray-600">
                                        <p><strong>계약기간:</strong> ${contract.start_date} ~ ${contract.end_date}</p>
                                        <p><strong>월납부금:</strong> ${Number(contract.monthly_fee).toLocaleString()}원</p>
                                        <p><strong>보증금:</strong> ${Number(contract.deposit || 0).toLocaleString()}원</p>
                                        <p><strong>작성일:</strong> ${new Date(contract.created_at).toLocaleDateString('ko-KR')}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
                
                document.getElementById('historyModal').classList.remove('hidden');
            } catch (error) {
                console.error('Error loading contract history:', error);
                alert('계약 이력을 불러오는데 실패했습니다');
            }
        }

        function hideHistoryModal() {
            document.getElementById('historyModal').classList.add('hidden');
        }

        function showAddModal() {
            document.getElementById('modalTitle').textContent = '오토바이 등록';
            document.getElementById('motorcycleForm').reset();
            document.getElementById('motorcycleId').value = '';
            document.getElementById('motorcycleModal').classList.remove('hidden');
        }

        async function editMotorcycle(id) {
            try {
                const response = await axios.get(`/api/motorcycles/${id}`);
                const m = response.data;

                document.getElementById('modalTitle').textContent = '오토바이 수정';
                document.getElementById('motorcycleId').value = m.id;
                document.getElementById('plateNumber').value = m.plate_number;
                document.getElementById('vehicleName').value = m.vehicle_name;
                document.getElementById('chassisNumber').value = m.chassis_number;
                document.getElementById('mileage').value = m.mileage;
                document.getElementById('modelYear').value = m.model_year;
                document.getElementById('insuranceCompany').value = m.insurance_company;
                document.getElementById('insuranceStartDate').value = m.insurance_start_date;
                document.getElementById('insuranceEndDate').value = m.insurance_end_date;
                document.getElementById('drivingRange').value = m.driving_range;
                document.getElementById('ownerName').value = m.owner_name;
                document.getElementById('insuranceFee').value = m.insurance_fee;
                document.getElementById('vehiclePrice').value = m.vehicle_price;
                document.getElementById('dailyRentalFee').value = m.daily_rental_fee || 0;
                document.getElementById('usageNotes').value = m.usage_notes || '';
                document.getElementById('status').value = m.status;

                document.getElementById('motorcycleModal').classList.remove('hidden');
            } catch (error) {
                console.error('Error loading motorcycle:', error);
                alert('오토바이 정보를 불러오는데 실패했습니다');
            }
        }

        async function deleteMotorcycle(id) {
            if (!confirm('정말 삭제하시겠습니까?')) return;

            try {
                await axios.delete(`/api/motorcycles/${id}`);
                alert('삭제되었습니다');
                loadMotorcycles();
            } catch (error) {
                console.error('Error deleting motorcycle:', error);
                alert('삭제에 실패했습니다');
            }
        }

        function hideModal() {
            document.getElementById('motorcycleModal').classList.add('hidden');
        }

        document.getElementById('motorcycleForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('motorcycleId').value;
            const data = {
                plate_number: document.getElementById('plateNumber').value,
                vehicle_name: document.getElementById('vehicleName').value,
                chassis_number: document.getElementById('chassisNumber').value,
                mileage: parseInt(document.getElementById('mileage').value),
                model_year: parseInt(document.getElementById('modelYear').value),
                insurance_company: document.getElementById('insuranceCompany').value,
                insurance_start_date: document.getElementById('insuranceStartDate').value,
                insurance_end_date: document.getElementById('insuranceEndDate').value,
                driving_range: document.getElementById('drivingRange').value,
                owner_name: document.getElementById('ownerName').value,
                insurance_fee: parseInt(document.getElementById('insuranceFee').value),
                vehicle_price: parseInt(document.getElementById('vehiclePrice').value),
                daily_rental_fee: parseInt(document.getElementById('dailyRentalFee').value) || 0,
                usage_notes: document.getElementById('usageNotes').value || '',
                status: document.getElementById('status').value
            };

            try {
                if (id) {
                    await axios.put(`/api/motorcycles/${id}`, data);
                    alert('수정되었습니다');
                } else {
                    await axios.post('/api/motorcycles', data);
                    alert('등록되었습니다');
                }
                hideModal();
                loadMotorcycles();
            } catch (error) {
                console.error('Error saving motorcycle:', error);
                alert('저장에 실패했습니다');
            }
        });
    </script>
</body>
</html>
