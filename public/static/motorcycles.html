<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <title>오토바이 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }
        .insurance-progress {
            transition: width 0.3s ease;
        }
        .motorcycle-card {
            transition: all 0.3s ease;
            border-left: 4px solid #3b82f6;
        }
        .motorcycle-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .motorcycle-card.status-available {
            border-left-color: #10b981;
        }
        .motorcycle-card.status-rented {
            border-left-color: #f59e0b;
        }
        .motorcycle-card.status-maintenance {
            border-left-color: #ef4444;
        }
        .progress-bar-wrapper {
            position: relative;
            height: 16px;
            background: #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            border-radius: 8px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.65rem;
        }
        .progress-bar.progress-safe {
            background: linear-gradient(90deg, #10b981, #34d399);
        }
        .progress-bar.progress-warning {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }
        .progress-bar.progress-danger {
            background: linear-gradient(90deg, #ef4444, #f87171);
        }
        .info-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .plate-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e40af;
            cursor: pointer;
            transition: color 0.2s;
        }
        .plate-number:hover {
            color: #3b82f6;
        }
    </style>
    
    
    
    
    <noscript>
        <meta http-equiv="refresh" content="0; url=/login">
    </noscript>
    <style>
        body { 
            display: none;
            opacity: 0;
            visibility: hidden;
        }
        body.auth-checked {
            display: block;
            opacity: 1;
            visibility: visible;
        }
    </style>
    <script>
        // 즉시 실행: 로그인 체크
        (function() {
            var sessionId = localStorage.getItem('sessionId');
            var user = localStorage.getItem('user');
            if (!sessionId || !user) {
                window.location.replace('/login?redirect=' + encodeURIComponent(window.location.pathname));
            } else {
                document.addEventListener('DOMContentLoaded', function() {
                    document.body.classList.add('auth-checked');
                });
            }
        })();
    </script>
</head>
<body class="bg-gray-50"  class="" class="authenticated">
    
    <div class="min-h-screen">
        <!-- 헤더 -->
        <header class="bg-blue-600 text-white shadow-lg">
            <div class="container mx-auto px-4 py-4">
                <a href="/" class="text-xl font-bold flex items-center hover:bg-blue-700 px-3 py-2 rounded-lg transition-colors cursor-pointer inline-flex">
                    <i class="fas fa-arrow-left mr-2"></i>
                    <span>오토바이 관리</span>
                </a>
            </div>
        </header>

        <!-- 메인 컨텐츠 -->
        <main class="container mx-auto px-4 py-8">
            <!-- 검색 및 필터 -->
            <div class="bg-white rounded-lg shadow-md p-4 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <!-- 검색창 -->
                    <div>
                        <label class="block text-sm font-bold mb-2">
                            <i class="fas fa-search mr-1 text-blue-500"></i>검색
                        </label>
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="번호판/계약자/명의자 검색..." 
                            oninput="filterAndSortMotorcycles()"
                            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                        >
                    </div>
                    
                    <!-- 상태 필터 -->
                    <div>
                        <label class="block text-sm font-bold mb-2">
                            <i class="fas fa-filter mr-1 text-green-500"></i>상태 필터
                        </label>
                        <select id="statusFilter" onchange="filterAndSortMotorcycles()" class="w-full px-3 py-2 border rounded-lg">
                            <option value="">전체</option>
                            <option value="available">사용가능</option>
                            <option value="rented">렌트중</option>
                            <option value="maintenance">정비중</option>
                            <option value="scrapped">폐지</option>
                        </select>
                    </div>
                    
                    <!-- 정렬 -->
                    <div>
                        <label class="block text-sm font-bold mb-2">
                            <i class="fas fa-sort mr-1 text-purple-500"></i>정렬
                        </label>
                        <select id="sortOrder" onchange="filterAndSortMotorcycles()" class="w-full px-3 py-2 border rounded-lg">
                            <option value="created_desc">입력순 (최신)</option>
                            <option value="created_asc">입력순 (오래된)</option>
                            <option value="plate_asc">번호 빠른순</option>
                            <option value="plate_desc">번호 늦은순</option>
                            <option value="insurance_exp">보험 만료일순</option>
                            <option value="inspection_exp">검사 가까운순</option>
                        </select>
                    </div>
                </div>

                <!-- 사용 이력 검색 -->
                <div class="border-t pt-4 mt-4">
                    <label class="block text-sm font-bold mb-2">
                        <i class="fas fa-history mr-1 text-orange-500"></i>사용 이력 조회 (번호판 또는 차대번호)
                    </label>
                    <div class="flex gap-2">
                        <input 
                            type="text" 
                            id="historySearchInput" 
                            placeholder="번호판 또는 차대번호 입력..." 
                            class="flex-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500"
                        >
                        <button onclick="searchHistory()" class="bg-orange-600 text-white px-6 py-2 rounded-lg hover:bg-orange-700">
                            <i class="fas fa-search mr-2"></i>이력 조회
                        </button>
                    </div>
                </div>
            </div>

            <!-- 오토바이 목록 -->
            <div id="motorcycleList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                <!-- 로딩 중... -->
                <div class="col-span-full text-center py-8 text-gray-500">
                    <i class="fas fa-spinner fa-spin text-2xl"></i>
                    <p class="mt-2">로딩 중...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- 사용 이력 모달 -->
    <div id="historyModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white rounded-lg shadow-xl max-w-6xl w-full my-8 max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-bold">
                        <i class="fas fa-history mr-2 text-orange-600"></i>오토바이 사용 이력
                    </h2>
                    <button onclick="hideHistoryModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
                
                <!-- 오토바이 정보 -->
                <div id="motorcycleInfo" class="bg-blue-50 p-4 rounded-lg mb-4"></div>
                
                <!-- 이력 목록 -->
                <div id="contractHistory"></div>
            </div>
        </div>
    </div>

    <!-- 등록/수정 모달 -->
    <div id="motorcycleModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white rounded-lg shadow-xl max-w-5xl w-full my-8 max-h-[95vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="modalTitle" class="text-2xl font-bold">오토바이 등록</h2>
                    <button onclick="hideModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
                
                <!-- 문서 자동 입력 -->
                <div class="mb-6 p-4 bg-gradient-to-r from-purple-50 to-indigo-50 border-2 border-purple-200 rounded-lg">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center">
                            <i class="fas fa-magic text-purple-600 text-xl mr-2"></i>
                            <h3 class="text-lg font-bold text-purple-800">문서에서 자동 입력</h3>
                        </div>
                        <span class="text-xs text-purple-600 font-semibold bg-purple-100 px-3 py-1 rounded-full">AI 자동 추출</span>
                    </div>
                    <p class="text-sm text-gray-600 mb-3">등록증, 보험증서 등의 사진을 업로드하면 정보를 자동으로 입력해드립니다.</p>
                    <div class="flex gap-2">
                        <input type="file" id="documentUpload" accept="image/*" onchange="handleDocumentUpload(event)" class="hidden">
                        <button type="button" onclick="document.getElementById('documentUpload').click()" class="flex-1 bg-purple-600 text-white px-4 py-3 rounded-lg hover:bg-purple-700 transition-all shadow-md hover:shadow-lg font-semibold">
                            <i class="fas fa-file-upload mr-2"></i>문서 업로드
                        </button>
                        <button type="button" onclick="startDocumentCamera()" class="flex-1 bg-indigo-600 text-white px-4 py-3 rounded-lg hover:bg-indigo-700 transition-all shadow-md hover:shadow-lg font-semibold">
                            <i class="fas fa-camera mr-2"></i>문서 촬영
                        </button>
                    </div>
                    <div id="documentProcessing" class="hidden mt-3 text-center">
                        <div class="inline-flex items-center bg-white px-4 py-2 rounded-lg shadow">
                            <i class="fas fa-spinner fa-spin text-purple-600 mr-2"></i>
                            <span class="text-sm font-semibold text-gray-700">문서 분석 중...</span>
                        </div>
                    </div>
                </div>
                
                <form id="motorcycleForm" class="space-y-6">
                    <input type="hidden" id="motorcycleId">
                    
                    <!-- 기본 정보 섹션 -->
                    <div class="border-2 border-blue-200 rounded-lg p-4 bg-blue-50">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-bold text-blue-800">
                                <i class="fas fa-motorcycle mr-2"></i>기본 정보
                            </h3>
                            <button type="button" onclick="saveBasicInfo()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm font-semibold">
                                <i class="fas fa-save mr-1"></i>기본 정보 수정
                            </button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold mb-2">차량번호 *</label>
                                <input type="text" id="plateNumber" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 bg-white">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">차량이름 *</label>
                                <input type="text" id="vehicleName" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 bg-white">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">년식 *</label>
                                <input type="number" id="modelYear" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 bg-white" placeholder="예: 2024">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">차대번호</label>
                                <input type="text" id="chassisNumber" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 bg-white" placeholder="차대번호 입력">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">키로수 (km)</label>
                                <input type="number" id="mileage" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 bg-white" placeholder="주행거리 입력">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">검사 시작일</label>
                                <input type="date" id="inspectionStartDate" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 bg-white">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">검사 종료일</label>
                                <input type="date" id="inspectionEndDate" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 bg-white">
                            </div>
                        </div>
                    </div>
                    
                    <!-- 계약 정보 섹션 -->
                    <div class="border-2 border-green-200 rounded-lg p-4 bg-green-50">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-bold text-green-800">
                                <i class="fas fa-file-contract mr-2"></i>계약 정보
                            </h3>
                            <button type="button" onclick="saveContractInfo()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 text-sm font-semibold">
                                <i class="fas fa-save mr-1"></i>계약 정보 수정
                            </button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold mb-2">대여료 (원)</label>
                                <input type="number" id="monthlyFee" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 bg-white" placeholder="대여료 입력">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">계약종류</label>
                                <input type="text" id="contractType" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 bg-white" placeholder="계약종류 입력">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">선납/보증금 (원)</label>
                                <input type="number" id="deposit" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 bg-white" placeholder="보증금 입력">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">계약 시작일</label>
                                <input type="date" id="contractStartDate" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 bg-white">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">계약 종료일</label>
                                <input type="date" id="contractEndDate" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 bg-white">
                            </div>
                        </div>
                    </div>
                    
                    <!-- 보험 정보 섹션 -->
                    <div class="border-2 border-purple-200 rounded-lg p-4 bg-purple-50">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-bold text-purple-800">
                                <i class="fas fa-shield-alt mr-2"></i>보험 정보
                            </h3>
                            <button type="button" onclick="saveInsuranceInfo()" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 text-sm font-semibold">
                                <i class="fas fa-save mr-1"></i>보험 정보 수정
                            </button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold mb-2">보험사</label>
                                <input type="text" id="insuranceCompany" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 bg-white" placeholder="보험사 입력">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">명의자</label>
                                <input type="text" id="ownerName" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 bg-white" placeholder="명의자 입력">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">보험 시작일</label>
                                <input type="date" id="insuranceStartDate" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 bg-white">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">보험 종료일</label>
                                <input type="date" id="insuranceEndDate" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 bg-white">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">보험 운전범위</label>
                                <select id="drivingRange" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 bg-white">
                                    <option value="">선택하세요</option>
                                    <option value="전연령">전연령</option>
                                    <option value="만19세이상">만19세이상</option>
                                    <option value="만21세이상">만21세이상</option>
                                    <option value="만24세이상">만24세이상</option>
                                    <option value="만26세이상">만26세이상</option>
                                    <option value="만30세이상">만30세이상</option>
                                    <option value="만35세이상">만35세이상</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 추가 정보 -->
                    <div class="border-2 border-gray-200 rounded-lg p-4 bg-gray-50">
                        <h3 class="text-lg font-bold text-gray-800 mb-4">
                            <i class="fas fa-cog mr-2"></i>추가 정보
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold mb-2">차량금액 (원)</label>
                                <input type="number" id="vehiclePrice" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-gray-500 bg-white">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">보험료 (원)</label>
                                <input type="number" id="insuranceFee" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-gray-500 bg-white">
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-sm font-bold mb-2">차량 사용필증 촬영</label>
                                <div class="space-y-2">
                                    <div class="flex gap-2">
                                        <button type="button" onclick="startCertificateCamera()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
                                            <i class="fas fa-camera mr-2"></i>카메라로 촬영
                                        </button>
                                        <input type="file" id="certificateUpload" accept="image/*" onchange="handleCertificateUpload(event)" class="hidden">
                                        <button type="button" onclick="document.getElementById('certificateUpload').click()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                                            <i class="fas fa-upload mr-2"></i>파일 선택
                                        </button>
                                    </div>
                                    <div id="certificatePreview" class="hidden">
                                        <img id="certificateImage" class="max-w-full h-48 object-contain border rounded-lg">
                                        <button type="button" onclick="clearCertificate()" class="mt-2 text-red-600 hover:text-red-700">
                                            <i class="fas fa-times mr-1"></i>삭제
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-sm font-bold mb-2">사용페지</label>
                                <textarea id="usageNotes" rows="3" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-gray-500 bg-white" placeholder="오토바이 사용 관련 특이사항을 입력하세요"></textarea>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 카메라 모달 (사용필증) -->
                    <div id="cameraModal" class="hidden fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center p-4">
                        <div class="bg-white rounded-lg p-4 max-w-2xl w-full">
                            <h3 class="text-lg font-bold mb-4">사용필증 촬영</h3>
                            <video id="certificateVideo" class="w-full rounded-lg mb-4" autoplay playsinline></video>
                            <canvas id="certificateCanvas" class="hidden"></canvas>
                            <div class="flex gap-2">
                                <button type="button" onclick="captureCertificate()" class="flex-1 bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">
                                    <i class="fas fa-camera mr-2"></i>촬영
                                </button>
                                <button type="button" onclick="stopCertificateCamera()" class="flex-1 bg-gray-600 text-white py-2 rounded-lg hover:bg-gray-700">
                                    취소
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 문서 카메라 모달 -->
                    <div id="documentCameraModal" class="hidden fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center p-4">
                        <div class="bg-white rounded-lg p-4 max-w-2xl w-full">
                            <h3 class="text-lg font-bold mb-4">문서 촬영</h3>
                            <video id="documentVideo" class="w-full rounded-lg mb-4" autoplay playsinline></video>
                            <canvas id="documentCanvas" class="hidden"></canvas>
                            <div class="flex gap-2">
                                <button type="button" onclick="captureDocument()" class="flex-1 bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700">
                                    <i class="fas fa-camera mr-2"></i>촬영
                                </button>
                                <button type="button" onclick="stopDocumentCamera()" class="flex-1 bg-gray-600 text-white py-2 rounded-lg hover:bg-gray-700">
                                    취소
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-3 pt-4">
                        <button type="button" onclick="hideModal()" class="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-400 transition">
                            <i class="fas fa-times mr-2"></i>닫기
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 계약 이력 모달 -->
    <div id="historyModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full my-8">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">
                        <i class="fas fa-history mr-2 text-blue-600"></i>
                        계약 이력
                    </h2>
                    <button onclick="hideHistoryModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
                
                <div id="motorcycleInfo" class="bg-blue-50 p-4 rounded-lg mb-6"></div>
                <div id="contractHistory"></div>

                <div class="mt-6">
                    <button onclick="hideHistoryModal()" class="w-full bg-gray-300 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-400">
                        닫기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        let motorcycles = [];
        let motorcycleContracts = {}; // 각 오토바이의 계약자 정보를 저장
        let sessionId = localStorage.getItem('sessionId');
        let currentUser = null; // 현재 로그인한 사용자 정보

        // 카메라 권한 체크
        async function checkCameraPermission() {
            try {
                const result = await navigator.permissions.query({ name: 'camera' });
                console.log('카메라 권한 상태:', result.state);
                return result.state === 'granted';
            } catch (e) {
                // permissions API를 지원하지 않는 브라우저
                console.log('Permissions API 미지원');
                return null;
            }
        }

        // 인증 체크
        async function checkAuth() {
            if (!sessionId) {
                window.location.href = '/static/login.html?redirect=' + encodeURIComponent(window.location.pathname);
                return false;
            }

            try {
                const response = await axios.get('/api/auth/check', {
                    headers: { 'X-Session-ID': sessionId }
                });
                currentUser = response.data.user; // 사용자 정보 저장
                return true;
            } catch (error) {
                localStorage.removeItem('sessionId');
                localStorage.removeItem('user');
                window.location.href = '/static/login.html?redirect=' + encodeURIComponent(window.location.pathname);
                return false;
            }
        }

        // Axios 인터셉터 설정 - 모든 요청에 세션 ID 추가
        axios.interceptors.request.use(config => {
            if (sessionId) {
                config.headers['X-Session-ID'] = sessionId;
            }
            return config;
        });

        // 401 에러 처리
        axios.interceptors.response.use(
            response => response,
            error => {
                if (error.response?.status === 401) {
                    localStorage.removeItem('sessionId');
                    localStorage.removeItem('user');
                    window.location.href = '/static/login.html?redirect=' + encodeURIComponent(window.location.pathname);
                }
                return Promise.reject(error);
            }
        );

        window.addEventListener('DOMContentLoaded', async () => {
            if (await checkAuth()) {
                // URL 파라미터로 전달된 상태 필터 확인
                const urlParams = new URLSearchParams(window.location.search);
                const statusParam = urlParams.get('status');
                
                // 상태 필터 설정
                if (statusParam) {
                    const statusFilterElement = document.getElementById('statusFilter');
                    if (statusParam === 'all') {
                        statusFilterElement.value = '';
                    } else if (statusParam === 'maintenance_scrapped') {
                        statusFilterElement.value = 'maintenance';
                    } else {
                        statusFilterElement.value = statusParam;
                    }
                }
                
                loadMotorcycles();
            }
        });

        async function loadMotorcycles() {
            try {
                const response = await axios.get('/api/motorcycles');
                motorcycles = response.data;
                
                // 각 오토바이의 계약자 정보를 미리 로드
                for (const m of motorcycles) {
                    try {
                        const contractResponse = await axios.get(`/api/motorcycles/${m.id}/contracts`);
                        const activeContract = contractResponse.data.find(c => c.status === 'active');
                        motorcycleContracts[m.id] = activeContract ? activeContract.customer_name : '';
                    } catch (err) {
                        motorcycleContracts[m.id] = '';
                    }
                }
                
                filterAndSortMotorcycles();
            } catch (error) {
                console.error('Error loading motorcycles:', error);
                alert('오토바이 목록을 불러오는데 실패했습니다');
            }
        }

        // 통계 카드 업데이트
        function filterAndSortMotorcycles() {
            // 검색어
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            
            // 상태 필터
            const statusFilter = document.getElementById('statusFilter').value;
            
            // 정렬 기준
            const sortOrder = document.getElementById('sortOrder').value;
            
            // 필터링
            let filtered = motorcycles.filter(m => {
                // 상태 필터
                if (statusFilter) {
                    // 수리중/폐지 복합 필터 처리
                    if (statusFilter === 'maintenance') {
                        if (m.status !== 'maintenance' && m.status !== 'scrapped') {
                            return false;
                        }
                    } else if (m.status !== statusFilter) {
                        return false;
                    }
                }
                
                // 검색어 필터 (번호판, 계약자, 명의자)
                if (searchTerm) {
                    const plateNumber = (m.plate_number || '').toLowerCase();
                    const chassisNumber = (m.chassis_number || '').toLowerCase();
                    const ownerName = (m.owner_name || '').toLowerCase();
                    const contractorName = (motorcycleContracts[m.id] || '').toLowerCase();
                    
                    return plateNumber.includes(searchTerm) || 
                           chassisNumber.includes(searchTerm) ||
                           ownerName.includes(searchTerm) || 
                           contractorName.includes(searchTerm);
                }
                
                return true;
            });
            
            // 정렬
            filtered.sort((a, b) => {
                switch(sortOrder) {
                    case 'created_desc':
                        return b.id - a.id; // ID가 클수록 최신
                    case 'created_asc':
                        return a.id - b.id; // ID가 작을수록 오래된
                    case 'plate_asc':
                        return (a.plate_number || a.chassis_number || '').localeCompare(
                               (b.plate_number || b.chassis_number || '')
                        );
                    case 'plate_desc':
                        return (b.plate_number || b.chassis_number || '').localeCompare(
                               (a.plate_number || a.chassis_number || '')
                        );
                    case 'insurance_exp':
                        // 보험 만료일이 가까운 순
                        const aInsurance = a.insurance_end_date || '9999-12-31';
                        const bInsurance = b.insurance_end_date || '9999-12-31';
                        return aInsurance.localeCompare(bInsurance);
                    case 'inspection_exp':
                        // 검사 만료일이 가까운 순
                        const aInspection = a.inspection_end_date || '9999-12-31';
                        const bInspection = b.inspection_end_date || '9999-12-31';
                        return aInspection.localeCompare(bInspection);
                    default:
                        return b.id - a.id;
                }
            });
            
            renderMotorcycles(filtered);
        }

        function calculateInsuranceProgress(startDate, endDate) {
            const start = new Date(startDate);
            const end = new Date(endDate);
            const today = new Date();
            
            const totalDays = (end - start) / (1000 * 60 * 60 * 24);
            const elapsedDays = (today - start) / (1000 * 60 * 60 * 24);
            const remainingDays = (end - today) / (1000 * 60 * 60 * 24);
            
            const percentage = Math.max(0, Math.min(100, (elapsedDays / totalDays) * 100));
            const remainingPercentage = 100 - percentage;
            
            return {
                percentage: percentage.toFixed(1),
                remainingPercentage: remainingPercentage.toFixed(1),
                remainingDays: Math.ceil(remainingDays),
                isExpired: today > end,
                isExpiringSoon: remainingDays <= 30 && remainingDays > 0
            };
        }

        function getProgressColor(progress) {
            if (progress.isExpired) return 'bg-red-500';
            if (progress.isExpiringSoon) return 'bg-yellow-500';
            if (progress.remainingPercentage > 50) return 'bg-green-500';
            if (progress.remainingPercentage > 25) return 'bg-blue-500';
            return 'bg-orange-500';
        }

        function renderMotorcycles(filteredMotorcycles = motorcycles) {
            const listEl = document.getElementById('motorcycleList');
            
            if (filteredMotorcycles.length === 0) {
                listEl.innerHTML = `
                    <div class="col-span-full text-center py-12 text-gray-500">
                        <i class="fas fa-inbox text-5xl mb-3 opacity-50"></i>
                        <p class="text-lg">검색 결과가 없습니다</p>
                        <button onclick="showAddModal()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                            <i class="fas fa-plus mr-2"></i>오토바이 등록하기
                        </button>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = filteredMotorcycles.map(m => {
                const statusConfig = {
                    'available': { bg: 'bg-green-100', text: 'text-green-800', icon: 'fa-check-circle', label: '휴차중', border: 'status-available' },
                    'rented': { bg: 'bg-yellow-100', text: 'text-yellow-800', icon: 'fa-motorcycle', label: '사용중', border: 'status-rented' },
                    'maintenance': { bg: 'bg-red-100', text: 'text-red-800', icon: 'fa-tools', label: '수리중', border: 'status-maintenance' },
                    'scrapped': { bg: 'bg-gray-100', text: 'text-gray-800', icon: 'fa-ban', label: '폐지', border: 'status-scrapped' }
                };

                const status = statusConfig[m.status] || statusConfig['available'];
                const progress = calculateInsuranceProgress(m.insurance_start_date, m.insurance_end_date);
                
                let progressClass = 'progress-safe';
                if (progress.isExpired) progressClass = 'progress-danger';
                else if (progress.isExpiringSoon) progressClass = 'progress-warning';
                else if (progress.remainingPercentage < 50) progressClass = 'progress-warning';
                
                // 폐지 오토바이는 차대번호 표시, 차량번호가 있으면 우선 표시
                const displayNumber = m.status === 'scrapped' ? (m.plate_number || m.chassis_number) : m.plate_number;
                const displayLabel = m.status === 'scrapped' ? (m.plate_number ? '번호판' : '차대번호') : '번호판';

                return `
                    <div class="motorcycle-card ${status.border} bg-white rounded-lg shadow-md overflow-hidden">
                        <!-- 상단: 번호판/차대번호 클릭 영역 -->
                        <div class="relative bg-gradient-to-br from-blue-600 via-blue-500 to-indigo-600 p-1 cursor-pointer hover:from-blue-700 hover:via-blue-600 hover:to-indigo-700 transition-all active:scale-95" onclick="showHistory(${m.id})">
                            <div class="flex justify-between items-center">
                                <div>
                                    <p class="text-blue-100 text-xs font-semibold mb-0">
                                        <i class="fas fa-id-card mr-1"></i>${displayLabel}
                                    </p>
                                    <p class="text-white text-lg font-black tracking-tight">${displayNumber}</p>
                                </div>
                                <div class="flex flex-col items-center">
                                    <div class="w-6 h-6 bg-white bg-opacity-20 rounded-full flex items-center justify-center">
                                        <i class="fas fa-history text-xs text-white"></i>
                                    </div>
                                    <p class="text-white text-xs mt-0 font-medium">이력</p>
                                </div>
                            </div>
                        </div>

                        <div class="p-1 bg-gradient-to-br from-white to-gray-50">
                            <!-- 차량명 및 상태 -->
                            <div class="flex justify-between items-start mb-0.5">
                                <div>
                                    <h3 class="text-xs font-bold text-gray-800">${m.vehicle_name}</h3>
                                    <p class="text-xs text-gray-500"><i class="fas fa-calendar-alt mr-1"></i>${m.model_year}년식</p>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span id="status-badge-${m.id}" class="info-badge ${status.bg} ${status.text} text-xs">
                                        <i id="status-icon-${m.id}" class="fas ${status.icon} mr-1"></i><span id="status-label-${m.id}">${status.label}</span>
                                    </span>
                                </div>
                            </div>
                            
                            ${m.status === 'scrapped' ? `
                                <!-- 폐지 오토바이: 사용페지 표시 -->
                                <div class="mb-0.5 bg-gray-50 p-1 rounded border border-gray-200">
                                    <p class="text-xs font-bold text-gray-700 mb-0">
                                        <i class="fas fa-info-circle mr-1 text-gray-500"></i>사용페지
                                    </p>
                                    <p class="text-xs text-gray-600 whitespace-pre-wrap">${m.usage_notes || '정보 없음'}</p>
                                </div>
                            ` : `
                            <!-- 계약 기간 진행률 -->
                            <div class="mb-0.5 bg-white p-1 rounded shadow-sm border border-gray-100" id="contract-progress-${m.id}">
                                <div class="flex justify-between items-center mb-0.5">
                                    <span class="text-xs font-bold text-gray-700 flex items-center">
                                        <i class="fas fa-file-contract mr-1 text-purple-500"></i>계약
                                    </span>
                                    <span class="text-xs text-gray-500" id="contract-status-${m.id}">-</span>
                                </div>
                                <div class="progress-bar-wrapper" id="contract-bar-${m.id}">
                                    <div class="progress-bar progress-safe" style="width: 0%"></div>
                                </div>
                                <div class="flex justify-between text-xs text-gray-400 mt-0" id="contract-dates-${m.id}">
                                    <span>-</span>
                                    <span>-</span>
                                </div>
                            </div>
                            
                            <!-- 보험 기간 진행률 -->
                            <div class="mb-0.5 bg-white p-1 rounded shadow-sm border border-gray-100">
                                <div class="flex justify-between items-center mb-0.5">
                                    <span class="text-xs font-bold text-gray-700 flex items-center">
                                        <i class="fas fa-shield-alt mr-1 text-blue-500"></i>보험
                                    </span>
                                    <span class="text-xs font-bold ${progress.isExpired ? 'text-red-600' : progress.isExpiringSoon ? 'text-red-600' : 'text-blue-600'}">
                                        ${progress.isExpired ? '⚠️ 만료' : `${progress.remainingDays}일`}
                                    </span>
                                </div>
                                
                                <div class="progress-bar-wrapper">
                                    <div class="progress-bar ${progressClass}" style="width: ${progress.percentage}%">
                                        ${progress.percentage > 20 ? `${progress.percentage}%` : ''}
                                    </div>
                                </div>
                                
                                <div class="flex justify-between text-xs text-gray-400 mt-0">
                                    <span>${m.insurance_start_date}</span>
                                    <span>${m.insurance_end_date}</span>
                                </div>
                                
                                ${progress.isExpired ? `
                                    <div class="mt-0.5 bg-gradient-to-r from-red-50 to-red-100 text-red-700 px-1 py-0.5 rounded text-xs font-bold flex items-center">
                                        <i class="fas fa-exclamation-triangle mr-1"></i>만료
                                    </div>
                                ` : progress.isExpiringSoon ? `
                                    <div class="mt-0.5 bg-gradient-to-r from-red-50 to-red-100 text-red-700 px-1 py-0.5 rounded text-xs font-bold flex items-center">
                                        <i class="fas fa-exclamation-circle mr-1"></i>갱신필요
                                    </div>
                                ` : ''}
                            </div>
                            
                            <!-- 검사 기간 진행률 -->
                            <div class="mb-0.5 bg-white p-1 rounded shadow-sm border border-gray-100" id="inspection-progress-${m.id}">
                                <div class="flex justify-between items-center mb-0.5">
                                    <span class="text-xs font-bold text-gray-700 flex items-center">
                                        <i class="fas fa-clipboard-check mr-1 text-green-500"></i>검사
                                    </span>
                                    <span class="text-xs text-gray-500" id="inspection-status-${m.id}">-</span>
                                </div>
                                <div class="progress-bar-wrapper" id="inspection-bar-${m.id}">
                                    <div class="progress-bar progress-safe" style="width: 0%"></div>
                                </div>
                                <div class="flex justify-between text-xs text-gray-400 mt-0" id="inspection-dates-${m.id}">
                                    <span>-</span>
                                    <span>-</span>
                                </div>
                            </div>
                            `}

                            <!-- 차량 상세 정보 -->
                            <div class="bg-white p-1 rounded shadow-sm border border-gray-100 mb-0.5">
                                <div class="grid grid-cols-2 gap-0.5 text-xs">
                                    <div class="flex items-center">
                                        <i class="fas fa-user w-3 text-blue-500 mr-1"></i>
                                        <div>
                                            <p class="text-xs text-gray-500">명의자</p>
                                            <p class="font-semibold text-gray-700 truncate">${m.owner_name}</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center">
                                        <i class="fas fa-id-card w-3 text-green-500 mr-1"></i>
                                        <div>
                                            <p class="text-xs text-gray-500">연령</p>
                                            <p class="font-semibold text-gray-700 text-xs">${m.driving_range}</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center col-span-2" id="contractor-info-${m.id}">
                                        <i class="fas fa-user-tie w-3 text-purple-500 mr-1"></i>
                                        <div>
                                            <p class="text-xs text-gray-500">계약자</p>
                                            <p class="font-semibold text-gray-700 truncate">-</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 버튼 -->
                            <div class="grid grid-cols-2 gap-0.5">
                                <button onclick="editMotorcycle(${m.id})" class="bg-gradient-to-r from-blue-500 to-blue-600 text-white py-0.5 rounded hover:from-blue-600 hover:to-blue-700 transition-all active:scale-95 shadow-sm text-xs font-semibold">
                                    <i class="fas fa-edit mr-1"></i>수정
                                </button>
                                <button onclick="terminateMotorcycle(${m.id})" class="bg-gradient-to-r from-orange-500 to-orange-600 text-white py-0.5 rounded hover:from-orange-600 hover:to-orange-700 transition-all active:scale-95 shadow-sm text-xs font-semibold" title="계약 해지">
                                    <i class="fas fa-ban mr-1"></i>해지
                                </button>
                                <button onclick="scrapMotorcycle(${m.id})" class="bg-gradient-to-r from-gray-500 to-gray-600 text-white py-0.5 rounded hover:from-gray-600 hover:to-gray-700 transition-all active:scale-95 shadow-sm text-xs font-semibold" title="사용 폐지">
                                    <i class="fas fa-times-circle mr-1"></i>폐지
                                </button>
                                <button onclick="deleteMotorcycle(${m.id})" class="bg-gradient-to-r from-red-500 to-red-600 text-white py-0.5 rounded hover:from-red-600 hover:to-red-700 transition-all active:scale-95 shadow-sm text-xs font-semibold" title="오토바이 삭제">
                                    <i class="fas fa-trash-alt mr-1"></i>삭제
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // 렌더링 후 각 오토바이의 계약 정보 및 검사 기간 로드
            motorcycles.forEach(m => {
                loadContractInfo(m.id);
                loadInspectionInfo(m);
            });
        }
        
        // 검사 기간 정보 로드 함수
        function loadInspectionInfo(motorcycle) {
            if (motorcycle.inspection_start_date && motorcycle.inspection_end_date) {
                const progress = calculateInsuranceProgress(motorcycle.inspection_start_date, motorcycle.inspection_end_date);
                
                let progressClass = 'progress-safe';
                let warningMessage = '';
                
                // 20일 이내면 빨간색
                if (progress.remainingDays <= 20 && progress.remainingDays > 0) {
                    progressClass = 'progress-danger';
                    warningMessage = `
                        <div class="mt-0.5 bg-gradient-to-r from-red-50 to-red-100 text-red-700 px-1 py-0.5 rounded text-xs font-bold flex items-center">
                            <i class="fas fa-exclamation-triangle mr-1"></i>검사임박
                        </div>
                    `;
                } else if (progress.isExpired) {
                    progressClass = 'progress-danger';
                    warningMessage = `
                        <div class="mt-0.5 bg-gradient-to-r from-red-50 to-red-100 text-red-700 px-1 py-0.5 rounded text-xs font-bold flex items-center">
                            <i class="fas fa-exclamation-triangle mr-1"></i>만료
                        </div>
                    `;
                } else if (progress.remainingDays <= 30) {
                    progressClass = 'progress-warning';
                }
                
                const inspectionStatusEl = document.getElementById(`inspection-status-${motorcycle.id}`);
                if (inspectionStatusEl) {
                    inspectionStatusEl.innerHTML = `
                        <span class="font-bold ${progress.remainingDays <= 20 ? 'text-red-600' : progress.remainingDays <= 30 ? 'text-yellow-600' : 'text-blue-600'}">
                            ${progress.isExpired ? '⚠️ 만료' : `${progress.remainingDays}일`}
                        </span>
                    `;
                }
                
                const inspectionBarEl = document.getElementById(`inspection-bar-${motorcycle.id}`);
                if (inspectionBarEl) {
                    inspectionBarEl.innerHTML = `
                        <div class="progress-bar ${progressClass}" style="width: ${progress.percentage}%">

        // 계약 정보 로드 함수
        async function loadContractInfo(motorcycleId) {
            try {
                const response = await axios.get(`/api/motorcycles/${motorcycleId}/contracts`);
                const contracts = response.data;
                
                // 진행 중인 계약 찾기
                const activeContract = contracts.find(c => c.status === 'active');
                
                // 오토바이 정보 찾기
                const motorcycle = motorcycles.find(m => m.id === motorcycleId);
                
                // 상태 배지 업데이트 (폐지, 수리중이 아닌 경우만)
                if (motorcycle && motorcycle.status !== 'scrapped' && motorcycle.status !== 'maintenance') {
                    const statusBadge = document.getElementById(`status-badge-${motorcycleId}`);
                    const statusIcon = document.getElementById(`status-icon-${motorcycleId}`);
                    const statusLabel = document.getElementById(`status-label-${motorcycleId}`);
                    
                    if (statusBadge && statusIcon && statusLabel) {
                        if (activeContract) {
                            // 계약자가 있으면 '사용중'
                            statusBadge.className = 'info-badge bg-yellow-100 text-yellow-800 text-xs';
                            statusIcon.className = 'fas fa-motorcycle mr-1';
                            statusLabel.textContent = '사용중';
                        } else {
                            // 계약자가 없으면 '휴차중'
                            statusBadge.className = 'info-badge bg-green-100 text-green-800 text-xs';
                            statusIcon.className = 'fas fa-check-circle mr-1';
                            statusLabel.textContent = '휴차중';
                        }
                    }
                }
                
                if (activeContract) {
                    // 계약자 정보 업데이트
                    const contractorEl = document.getElementById(`contractor-info-${motorcycleId}`);
                    if (contractorEl) {
                        contractorEl.innerHTML = `
                            <i class="fas fa-user-tie w-3 text-purple-500 mr-1"></i>
                            <div>
                                <p class="text-xs text-gray-500">계약자</p>
                                <p class="font-semibold text-gray-700 truncate">${activeContract.customer_name || '-'}</p>
                            </div>
                        `;
                    }
                    
                    // 계약 기간 프로그레스 바 업데이트
                    const progress = calculateInsuranceProgress(activeContract.start_date, activeContract.end_date);
                    
                    let progressClass = 'progress-safe';
                    let warningMessage = '';
                    
                    // 10일 이내면 빨간색
                    if (progress.remainingDays <= 10 && progress.remainingDays > 0) {
                        progressClass = 'progress-danger';
                        warningMessage = `
                            <div class="mt-1 bg-gradient-to-r from-red-50 to-red-100 text-red-700 px-1.5 py-0.5 rounded text-xs font-bold flex items-center">
                                <i class="fas fa-exclamation-triangle mr-1"></i>종료임박
                            </div>
                        `;
                    } else if (progress.isExpired) {
                        progressClass = 'progress-danger';
                        warningMessage = `
                            <div class="mt-1 bg-gradient-to-r from-red-50 to-red-100 text-red-700 px-1.5 py-0.5 rounded text-xs font-bold flex items-center">
                                <i class="fas fa-exclamation-triangle mr-1"></i>만료
                            </div>
                        `;
                    } else if (progress.remainingDays <= 30) {
                        progressClass = 'progress-warning';
                    }
                    
                    const contractStatusEl = document.getElementById(`contract-status-${motorcycleId}`);
                    if (contractStatusEl) {
                        contractStatusEl.innerHTML = `
                            <span class="font-bold ${progress.remainingDays <= 10 ? 'text-red-600' : progress.remainingDays <= 30 ? 'text-yellow-600' : 'text-blue-600'}">
                                ${progress.isExpired ? '⚠️ 만료' : `${progress.remainingDays}일`}
                            </span>
                        `;
                    }
                    
                    const contractBarEl = document.getElementById(`contract-bar-${motorcycleId}`);
                    if (contractBarEl) {
                        contractBarEl.innerHTML = `
                            <div class="progress-bar ${progressClass}" style="width: ${progress.percentage}%">
                                ${progress.percentage > 15 ? `${progress.percentage}%` : ''}
                            </div>
                        `;
                        if (warningMessage) {
                            contractBarEl.insertAdjacentHTML('afterend', warningMessage);
                        }
                    }
                    
                    const contractDatesEl = document.getElementById(`contract-dates-${motorcycleId}`);
                    if (contractDatesEl) {
                        contractDatesEl.innerHTML = `
                            <span>${activeContract.start_date}</span>
                            <span>${activeContract.end_date}</span>
                        `;
                    }
                }
            } catch (error) {
                console.error(`Error loading contract info for motorcycle ${motorcycleId}:`, error);
            }
        }

        // 문서 카메라 시작
        async function startDocumentCamera() {
            const video = document.getElementById('documentVideo');
            
            try {
                // 먼저 기본 제약 조건으로 시도
                let stream = null;
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            facingMode: { ideal: 'environment' },
                            width: { ideal: 1920 },
                            height: { ideal: 1080 }
                        } 
                    });
                } catch (e) {
                    // 실패하면 더 간단한 제약으로 재시도
                    console.log('고급 설정 실패, 기본 설정으로 시도:', e);
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: true 
                    });
                }
                
                documentStream = stream;
                video.srcObject = stream;
                document.getElementById('documentCameraModal').classList.remove('hidden');
                
                // 비디오가 로드될 때까지 대기
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
            } catch (err) {
                console.error('카메라 접근 오류:', err);
                let errorMsg = '카메라에 접근할 수 없습니다.';
                
                if (err.name === 'NotAllowedError') {
                    errorMsg = '카메라 권한이 거부되었습니다. 브라우저 설정에서 카메라 권한을 허용해주세요.';
                } else if (err.name === 'NotFoundError') {
                    errorMsg = '카메라를 찾을 수 없습니다.';
                } else if (err.name === 'NotReadableError') {
                    errorMsg = '카메라가 다른 앱에서 사용 중입니다.';
                }
                
                alert(errorMsg);
            }
        }

            canvas.height = video.videoHeight;

            const imageData = canvas.toDataURL('image/jpeg', 0.95);
            stopDocumentCamera();
            processDocumentImage(imageData);

                console.error('문서 처리 오류:', error);

        // 보험 정보 저장
        async function saveInsuranceInfo() {
            try {
                const id = document.getElementById('motorcycleId').value;
                if (!id) {
                    alert('오토바이 ID가 없습니다');
                    return;
                }
                
                const sessionId = localStorage.getItem('sessionId');
                if (!sessionId) {
                    alert('⚠️ 로그인이 필요합니다.');
                    window.location.href = '/static/login.html';
                    return;
                }
                
                // 1. 진행 중인 계약 확인
                const contractsResponse = await axios.get(`/api/motorcycles/${id}/contracts`, {
                    headers: { 'X-Session-ID': sessionId }
                });
                
                const activeContracts = contractsResponse.data.filter(c => c.status === 'active');
                
                // 2. 진행 중인 계약이 있으면 계약 해지 확인
                if (activeContracts.length > 0) {
                    const contractInfo = activeContracts.map(c => 
                        `• ${c.contract_number} - ${c.customer_name} (${c.customer_phone})`
                    ).join('\n');
                    
                    const shouldTerminate = confirm(
                        `⚠️ 현재 진행 중인 계약이 있습니다\n\n` +
                        `진행 중인 계약 ${activeContracts.length}건:\n${contractInfo}\n\n` +
                        `보험 정보를 수정하면 위 계약들이 해지됩니다.\n\n` +
                        `계약을 해지하고 보험 정보를 수정하시겠습니까?\n\n` +
                        `[확인] - 계약 해지 후 보험 정보 수정\n` +
                        `[취소] - 보험 정보 수정 취소`
                    );
                    
                    if (!shouldTerminate) {
                        console.log('보험 정보 수정 취소됨 (사용자가 취소 선택)');
                        return;
                    }
                    
                    // 3. 계약 해지 진행
                    console.log(`계약 해지 진행: ${activeContracts.length}건`);
                    for (const contract of activeContracts) {
                        await axios.patch(`/api/contracts/${contract.id}/status`, 
                            { status: 'cancelled' },
                            { headers: { 'X-Session-ID': sessionId } }
                        );
                    }
                    console.log('✅ 계약 해지 완료');
                    
                    // 4. 오토바이 상태를 available로 변경하고 계약정보 초기화
                    await axios.patch(`/api/motorcycles/${id}/status`, 
                        { status: 'available' },
                        { headers: { 'X-Session-ID': sessionId } }
                    );
                    console.log('✅ 오토바이 상태 초기화 완료');
                }
                
                // 5. 보험 정보 수정
                const data = {
                    insurance_company: document.getElementById('insuranceCompany').value,
                    owner_name: document.getElementById('ownerName').value,
                    insurance_start_date: document.getElementById('insuranceStartDate').value,
                    insurance_end_date: document.getElementById('insuranceEndDate').value,
                    driving_range: document.getElementById('drivingRange').value

                        `해지된 계약: ${activeContracts.length}건\n` +
                        `• 계약 상태: 해지됨\n` +

                    return;

                const contractsResponse = await axios.get(`/api/motorcycles/${id}/contracts`, {
                    headers: { 'X-Session-ID': sessionId }
                });
                
                const activeContracts = contractsResponse.data.filter(c => c.status === 'active');
                console.log(`📋 진행중인 계약 ${activeContracts.length}건 발견`);
                
                // 2. 모든 진행중인 계약을 'cancelled' 상태로 변경
                for (const contract of activeContracts) {
                    console.log(`  - 계약 해지: ${contract.contract_number}`);
                    await axios.patch(`/api/contracts/${contract.id}/status`, 
                        { status: 'cancelled' },
                        { headers: { 'X-Session-ID': sessionId } }
                    );
                }
                console.log(`✅ 계약서 해지 완료: ${activeContracts.length}건`);
                
                // 3. 오토바이 상태를 available로 변경 (계약정보만 초기화, 기본정보와 보험정보는 유지)

                await axios.patch(`/api/motorcycles/${id}/status`, 
                    { status: 'available' },
                    { headers: { 'X-Session-ID': sessionId } }

                alert(

                    `🏍️ 오토바이 상태: 휴차중\n` +
                    `📋 해지된 계약서: ${activeContracts.length}건 (기록 보존)\n\n` +
                    `✅ 계약 정보: 초기화됨 (월차감, 보증금, 계약기간 등)\n` +

        async function scrapMotorcycle(id) {
            // 1단계: 폐지 확인
            if (!confirm('⚠️ 오토바이를 폐지하시겠습니까?\n\n폐지하면:\n✓ 계약 이력은 모두 보존됩니다\n✓ 차대번호, 연식, 차량명만 남습니다\n✓ 기타 정보는 초기화됩니다\n\n이 작업은 되돌릴 수 없습니다.')) {
                return;
            }
            
            // 2단계: 폐지 사유 입력
            const usageNotes = prompt('폐지 사유를 입력해주세요:\n(예: 차량 노후, 사고, 부품 손상 등)');
            
            if (usageNotes === null) {
                return; // 취소
            }
            
            if (!usageNotes.trim()) {
                alert('⚠️ 폐지 사유를 입력해주세요.');
                return;
            }
            
            // 3단계: 최종 확인
            if (!confirm(`정말로 폐지 처리하시겠습니까?\n\n폐지 사유: ${usageNotes}\n\n⚠️ 이 작업은 되돌릴 수 없습니다!`)) {
                return;
            }

            try {
                await axios.post(`/api/motorcycles/${id}/scrap`, { 
                    usage_notes: usageNotes
                });
                alert('✅ 오토바이가 폐지 처리되었습니다.\n\n• 계약 이력: 모두 보존\n• 차량 정보: 초기화 완료');
                loadMotorcycles();
            } catch (error) {
                console.error('Error scrapping motorcycle:', error);
                alert('❌ 폐지 처리에 실패했습니다');
            }
        }

                const statusBadge = isDeleted 
                    ? '<span class="px-2 py-1 text-xs rounded bg-red-100 text-red-600">삭제됨</span>'
                    : `<span class="px-2 py-1 text-xs rounded ${h.status === 'active' ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-600'}">${statusTexts[h.status]}</span>`;
                
                return `
                    <div class="bg-white border ${isDeleted ? 'border-red-200' : 'border-gray-200'} rounded-lg p-4 mb-3">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="font-bold text-lg">#${index + 1} ${h.contract_number}</span>
                                    ${statusBadge}
                                    <span class="px-2 py-1 text-xs rounded bg-blue-100 text-blue-600">${typeTexts[h.contract_type]}</span>
                                </div>
                                <p class="text-sm text-gray-600">
                                    <i class="fas fa-calendar mr-1"></i>
                                    작성일: ${new Date(h.created_at).toLocaleString('ko-KR')}
                                </p>
                                ${isDeleted ? `<p class="text-sm text-red-600"><i class="fas fa-trash mr-1"></i>삭제일: ${new Date(h.deleted_at).toLocaleString('ko-KR')}</p>` : ''}
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm">
                            <div>
                                <p class="mb-1"><strong>계약자:</strong> <span class="text-lg font-bold text-gray-900">${h.customer_name}</span></p>
                                <p class="mb-1"><strong>전화번호:</strong> ${h.customer_phone}</p>
                                <p><strong>주민번호:</strong> ${h.resident_number || '-'}</p>
                            </div>
                            <div>
                                <p class="mb-1"><strong>계약기간:</strong> ${h.start_date} ~ ${h.end_date}</p>
                                <p class="mb-1"><strong>일 대여료:</strong> ${Number(h.monthly_fee).toLocaleString()}원</p>
                                <p><strong>보증금:</strong> ${Number(h.deposit || 0).toLocaleString()}원</p>
                            </div>
                        </div>
                        
                        ${h.special_terms ? `
                            <div class="mt-3 pt-3 border-t">
                                <p class="text-sm"><strong>특약사항:</strong></p>
                                <p class="text-sm text-gray-600 whitespace-pre-wrap">${h.special_terms}</p>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            document.getElementById('historyList').innerHTML = `
                <div class="mb-3 text-sm text-gray-600">
                    <i class="fas fa-info-circle mr-1"></i>
                    총 ${history.length}건의 사용 이력 (삭제된 계약 포함)
                </div>
                ${historyHtml}
            `;
        }

        function hideHistoryModal() {
            document.getElementById('historyModal').classList.add('hidden');
            document.getElementById('historySearchInput').value = '';
        }
    </script>
</body>
</html>
