<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=0.25, user-scalable=yes">
    <title>계약서 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* A4 출력 스타일 - 원본 그대로 출력 */
        @media print {
            body {
                margin: 0;
                padding: 0;
                background: white;
            }
            
            /* 모달 배경 숨김 */
            #detailModal {
                position: static !important;
                background: white !important;
                padding: 0 !important;
            }
            
            /* 모달 내용만 표시 */
            .modal-content {
                max-width: 100% !important;
                margin: 0 !important;
                padding: 10mm !important;
                box-shadow: none !important;
            }
            
            /* 버튼과 헤더 숨김 */
            header, .no-print, button, nav {
                display: none !important;
            }
            
            /* A4 페이지 설정 */
            @page {
                size: A4;
                margin: 10mm 12mm;
            }
            
            /* 계약서 컨테이너 - 원본 그대로 */
            .contract-print {
                font-size: 10pt !important;
                line-height: 1.4 !important;
                max-height: none !important;
                overflow: visible !important;
            }
            
            /* 제목 */
            .contract-print h1 {
                font-size: 18pt !important;
                margin-bottom: 8mm !important;
                page-break-after: avoid;
            }
            
            /* 섹션 제목 */
            .contract-print h2,
            .contract-print h3,
            .contract-print h4,
            .contract-print .text-xl {
                font-size: 12pt !important;
                margin-top: 4mm !important;
                margin-bottom: 2mm !important;
                page-break-after: avoid;
            }
            
            /* 본문 텍스트 */
            .contract-print p,
            .contract-print div {
                font-size: 10pt !important;
                line-height: 1.4 !important;
                margin-bottom: 1mm !important;
            }
            
            /* 약관 텍스트 - 더 작고 compact하게 */
            .contract-terms {
                font-size: 9pt !important;
                line-height: 1.3 !important;
                margin-top: 2mm !important;
            }
            
            .contract-terms h3 {
                font-size: 10pt !important;
                margin-top: 3mm !important;
                margin-bottom: 1.5mm !important;
                page-break-after: avoid;
            }
            
            .contract-terms p {
                margin-bottom: 0.5mm !important;
                text-indent: 0 !important;
            }
            
            .contract-terms p.font-bold {
                font-size: 10pt !important;
                margin-top: 2mm !important;
                page-break-after: avoid;
            }
            
            /* 들여쓰기 */
            .contract-terms .ml-4 {
                margin-left: 4mm !important;
            }
            
            .contract-terms .ml-8 {
                margin-left: 8mm !important;
            }
            
            /* 페이지 나누기 방지 - 관련 내용은 함께 */
            .contract-terms > div,
            .contract-terms > p.font-bold {
                page-break-inside: avoid;
            }
            
            /* 약관 동의 체크박스 영역 - 인쇄 시 명확하게 표시 */
            .bg-yellow-50 {
                background-color: #fffbeb !important;
                border: 2px solid #fbbf24 !important;
                padding: 4mm !important;
                margin-bottom: 4mm !important;
                margin-top: 4mm !important;
                page-break-inside: avoid;
                page-break-before: avoid;
            }
            
            .bg-yellow-50 label {
                font-size: 12pt !important;
                font-weight: bold !important;
                line-height: 1.6 !important;
            }
            
            .bg-yellow-50 .fa-check {
                display: inline-block !important;
            }
            
            .bg-green-600 {
                background-color: #16a34a !important;
            }
            
            /* 서명 섹션 - 인쇄 시 명확하게 표시 */
            .contract-print img {
                max-width: 100% !important;
                height: auto !important;
                max-height: 50mm !important;
                page-break-inside: avoid !important;
                page-break-before: avoid !important;
                page-break-after: avoid !important;
                break-inside: avoid !important;
                border: 2px solid #374151 !important;
                border-radius: 2mm !important;
                padding: 2mm !important;
                background: white !important;
                object-fit: contain !important;
            }
            
            /* 서명/신분증 컨테이너 */
            .border-2 {
                border-width: 2px !important;
                padding: 4mm !important;
                page-break-inside: avoid !important;
                page-break-before: avoid !important;
                page-break-after: avoid !important;
                break-inside: avoid !important;
                margin-bottom: 4mm !important;
            }
            
            /* 서명/신분증 제목 */
            .contract-print h3,
            .contract-print h4 {
                font-size: 12pt !important;
                font-weight: bold !important;
                margin-bottom: 2mm !important;
                page-break-after: avoid;
            }
            
            /* 그리드 레이아웃 유지 */
            .grid {
                display: grid !important;
            }
            
            .grid-cols-2 {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 3mm !important;
            }
            
            .grid > div {
                margin-bottom: 0 !important;
            }
            
            /* 배경색 유지 */
            .bg-indigo-50 {
                background-color: #eef2ff !important;
                border: 2px solid #818cf8 !important;
            }
            
            .bg-white {
                background-color: white !important;
            }
            
            .bg-gray-50 {
                background-color: #f9fafb !important;
            }
            
            /* 테이블 */
            table {
                page-break-inside: avoid;
            }
            
            /* 색상 유지 */
            .text-red-600 {
                color: #dc2626 !important;
            }
            
            .text-green-600 {
                color: #16a34a !important;
            }
            
            .text-blue-600 {
                color: #2563eb !important;
            }
            
            .text-indigo-900 {
                color: #312e81 !important;
            }
        }
        
        /* 모달 스크롤 */
        .modal-content {
            max-height: 85vh;
            overflow-y: auto;
        }
    </style>
    
    
    
    
    <noscript>
        <meta http-equiv="refresh" content="0; url=/login">
    </noscript>
    <style>
        body { 
            display: none;
            opacity: 0;
            visibility: hidden;
        }
        body.auth-checked {
            display: block;
            opacity: 1;
            visibility: visible;
        }
    </style>
    <script>
        // 즉시 실행: 로그인 체크
        (function() {
            var sessionId = localStorage.getItem('sessionId');
            var user = localStorage.getItem('user');
            if (!sessionId || !user) {
                window.location.replace('/login?redirect=' + encodeURIComponent(window.location.pathname));
            } else {
                document.addEventListener('DOMContentLoaded', function() {
                    document.body.classList.add('auth-checked');
                });
            }
        })();
    </script>
</head>
<body class="bg-gray-50"  class="" class="authenticated">
    
    <div class="min-h-screen">
        <!-- 헤더 -->
        <header class="bg-purple-600 text-white shadow-lg">
            <div class="container mx-auto px-4 py-4 flex items-center justify-between">
                <a href="/" class="text-xl font-bold flex items-center hover:bg-purple-700 px-3 py-2 rounded-lg transition-colors cursor-pointer">
                    <i class="fas fa-arrow-left mr-2"></i>
                    <span>계약서 목록</span>
                </a>
                <a href="/contract/new" class="bg-white text-purple-600 px-4 py-2 rounded-lg font-bold hover:bg-purple-50">
                    <i class="fas fa-plus mr-2"></i>새 계약서 작성
                </a>
            </div>
        </header>

        <!-- 메인 컨텐츠 -->
        <main class="container mx-auto px-4 py-8">
            <!-- 필터 -->
            <div class="bg-white rounded-lg shadow-md p-4 mb-6 flex flex-wrap gap-4 items-center">
                <div>
                    <label class="block text-sm font-bold mb-2">계약 타입</label>
                    <select id="typeFilter" onchange="filterContracts()" class="px-3 py-2 border rounded-lg">
                        <option value="">전체</option>
                        <option value="lease">리스</option>
                        <option value="rent">렌트</option>
                        <option value="business">업체리스/렌트</option>
                        <option value="temp_rent">임시렌트</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">상태</label>
                    <select id="statusFilter" onchange="filterContracts()" class="px-3 py-2 border rounded-lg">
                        <option value="">전체</option>
                        <option value="active">계약중</option>
                        <option value="completed">완료</option>
                        <option value="cancelled">계약종료</option>
                    </select>
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-bold mb-2">검색</label>
                    <input type="text" id="searchInput" onkeyup="filterContracts()" placeholder="계약번호, 고객명, 번호판" class="w-full px-3 py-2 border rounded-lg">
                </div>
            </div>

            <!-- 계약서 목록 -->
            <div id="contractList" class="space-y-4">
                <!-- 로딩 중... -->
                <div class="text-center py-12 text-gray-500">
                    <i class="fas fa-spinner fa-spin text-2xl"></i>
                    <p class="mt-2">로딩 중...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- 상세보기 모달 -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-5xl w-full my-8 max-h-screen overflow-hidden flex flex-col">
            <div class="p-6 border-b no-print flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-bold">계약서 원본</h2>
                    <p class="text-xs text-gray-500 mt-1">
                        💡 저장 위치 선택: Chrome/Edge는 자동으로 대화상자 표시 | 
                        <a href="#" onclick="showDownloadGuide(); return false;" class="text-blue-600 hover:underline">다른 브라우저 설정 방법</a>
                    </p>
                </div>
                <button onclick="hideDetailModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>
            
            <div class="overflow-auto flex-1">
                <div id="contractDetail" class="modal-content p-6 contract-print"></div>
            </div>

            <div class="p-6 border-t no-print flex gap-3">
                <button onclick="downloadPDF()" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700">
                    <i class="fas fa-download mr-2"></i>PDF 다운로드
                </button>
                <button onclick="downloadPDFWithCustomName()" class="flex-1 bg-purple-600 text-white py-3 rounded-lg font-bold hover:bg-purple-700">
                    <i class="fas fa-edit mr-2"></i>다른 이름으로 저장
                </button>
                <button onclick="window.print()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">
                    <i class="fas fa-print mr-2"></i>인쇄
                </button>
                <button id="cancelContractBtn" onclick="cancelContract()" class="flex-1 bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700" style="display: none;">
                    <i class="fas fa-ban mr-2"></i>계약 해지
                </button>
                <button onclick="hideDetailModal()" class="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-400">
                    닫기
                </button>
            </div>
        </div>
    </div>
    
    <!-- PDF 생성 전용 숨겨진 컨테이너 -->
    <div id="pdfContainer" style="position: absolute; left: -9999px; top: 0; width: 794px; background: white; padding: 20px;">
        <div id="pdfContent" class="contract-print"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        let contracts = [];
        let filteredContracts = [];
        let currentContract = null;
        let companySettings = null;
        let sessionId = localStorage.getItem('sessionId');

        // 인증 체크
        async function checkAuth() {
            if (!sessionId) {
                window.location.href = '/static/login.html?redirect=' + encodeURIComponent(window.location.pathname);
                return false;
            }

            try {
                await axios.get('/api/auth/check', {
                    headers: { 'X-Session-ID': sessionId }
                });
                return true;
            } catch (error) {
                localStorage.removeItem('sessionId');
                localStorage.removeItem('user');
                window.location.href = '/static/login.html?redirect=' + encodeURIComponent(window.location.pathname);
                return false;
            }
        }

        // Axios 인터셉터 설정
        axios.interceptors.request.use(config => {
            if (sessionId) {
                config.headers['X-Session-ID'] = sessionId;
            }
            return config;
        });

        axios.interceptors.response.use(
            response => response,
            error => {
                if (error.response?.status === 401) {
                    localStorage.removeItem('sessionId');
                    localStorage.removeItem('user');
                    window.location.href = '/static/login.html?redirect=' + encodeURIComponent(window.location.pathname);
                }
                return Promise.reject(error);
            }
        );

        window.addEventListener('DOMContentLoaded', async () => {
            if (await checkAuth()) {
                // URL 파라미터로 전달된 계약 유형 및 상태 필터 확인
                const urlParams = new URLSearchParams(window.location.search);
                const typeParam = urlParams.get('type');
                const statusParam = urlParams.get('status');
                
                // 계약 유형 필터 설정
                if (typeParam) {
                    const typeFilterElement = document.getElementById('typeFilter');
                    if (typeParam === 'personal') {
                        typeFilterElement.value = 'personal';
                    } else if (typeParam === 'business') {
                        typeFilterElement.value = 'business';
                    } else if (typeParam === 'temp') {
                        typeFilterElement.value = 'temp_rent';
                    }
                }
                
                // 상태 필터 설정
                if (statusParam) {
                    const statusFilterElement = document.getElementById('statusFilter');
                    statusFilterElement.value = statusParam;
                }
                
                loadCompanySettings();
                loadContracts();
            }
        });

        async function loadCompanySettings() {
            try {
                const response = await axios.get('/api/company-settings', {
                    headers: { 'X-Session-ID': sessionId }
                });
                companySettings = response.data;
                console.log('✅ 회사 설정 로드 완료:', companySettings);
            } catch (error) {
                console.error('❌ 회사 설정 로드 실패:', error);
                companySettings = {
                    company_name: '대성',
                    business_number: '487-39-01128',
                    representative_name: '김상춘',
                    manager_phone: '-'
                };
            }
        }

        async function loadContracts() {
            try {
                // 개인 계약서와 업체 계약서를 모두 불러오기
                const [personalResponse, businessResponse] = await Promise.all([
                    axios.get('/api/contracts'),
                    axios.get('/api/business-contracts')
                ]);
                
                // 개인 계약서 데이터 (원본 contract_type 유지)
                const personalContracts = personalResponse.data.map(c => ({
                    ...c,
                    // contract_type은 원본 유지 (temp_rent, lease, rent 등)
                }));
                
                // 업체 계약서 데이터
                const businessContracts = businessResponse.data.map(c => ({
                    ...c,
                    contract_type: 'business',
                    customer_name: c.company_name,  // 업체명을 customer_name으로 매핑
                    plate_number: c.plate_number || ''  // 번호판 정보
                }));
                
                // 두 목록을 합치고 생성일 기준 정렬
                contracts = [...personalContracts, ...businessContracts].sort((a, b) => {
                    return new Date(b.created_at) - new Date(a.created_at);
                });
                
                filteredContracts = contracts;
                console.log(`✅ 계약서 목록 로드 완료: 개인 ${personalContracts.length}건, 업체 ${businessContracts.length}건`);
                filterContracts(); // URL 파라미터 필터를 적용하기 위해 filterContracts 호출
            } catch (error) {
                console.error('Error loading contracts:', error);
                document.getElementById('contractList').innerHTML = `
                    <div class="text-center py-12 text-red-500">
                        <i class="fas fa-exclamation-circle text-4xl mb-3"></i>
                        <p>계약서 목록을 불러오는데 실패했습니다</p>
                    </div>
                `;
            }
        }

        function filterContracts() {
            const typeFilter = document.getElementById('typeFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const searchInput = document.getElementById('searchInput').value.toLowerCase();

            filteredContracts = contracts.filter(c => {
                // 타입 매칭 로직 개선
                let matchType = !typeFilter;
                if (typeFilter) {
                    if (typeFilter === 'temp_rent') {
                        // 임시렌트
                        matchType = c.contract_type === 'temp_rent';
                    } else if (typeFilter === 'business') {
                        // 업체 계약서
                        matchType = c.contract_type === 'business';
                    } else if (typeFilter === 'lease') {
                        // 개인 리스
                        matchType = c.contract_type === 'lease' || c.contract_type === 'individual';
                    } else if (typeFilter === 'rent') {
                        // 개인 렌트
                        matchType = c.contract_type === 'rent';
                    }
                }
                
                const matchStatus = !statusFilter || c.status === statusFilter;
                const matchSearch = !searchInput || 
                    c.contract_number.toLowerCase().includes(searchInput) ||
                    (c.customer_name && c.customer_name.toLowerCase().includes(searchInput)) ||
                    (c.plate_number && c.plate_number.toLowerCase().includes(searchInput));
                
                return matchType && matchStatus && matchSearch;
            });

            renderContracts();
        }

        function renderContracts() {
            const listEl = document.getElementById('contractList');
            
            if (filteredContracts.length === 0) {
                listEl.innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <i class="fas fa-inbox text-5xl mb-3 opacity-50"></i>
                        <p class="text-lg mb-4">계약서가 없습니다</p>
                        <a href="/contract/new" class="inline-block bg-purple-600 text-white px-6 py-3 rounded-lg hover:bg-purple-700">
                            <i class="fas fa-plus mr-2"></i>첫 계약서 작성하기
                        </a>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = filteredContracts.map(c => {
                const typeColors = {
                    'lease': 'bg-blue-100 text-blue-800',
                    'individual': 'bg-blue-100 text-blue-800',
                    'rent': 'bg-green-100 text-green-800',
                    'business': 'bg-purple-100 text-purple-800',
                    'temp_rent': 'bg-orange-100 text-orange-800'
                };
                
                // 계약서 타입별 표시 설정
                let displayType = c.contract_type;
                let displayTypeText = '';
                
                if (c.contract_type === 'temp_rent') {
                    // 임시렌트 (최우선 처리)
                    displayType = 'temp_rent';
                    displayTypeText = '임시렌트';
                } else if (c.contract_type === 'business') {
                    // 업체 계약서: business_type에 따라 리스/렌트 구분
                    displayType = c.business_type || 'rent';
                    displayTypeText = displayType === 'lease' ? '업체 리스' : '업체 렌트';
                } else {
                    // 개인 계약서
                    displayTypeText = c.contract_type === 'lease' || c.contract_type === 'individual' ? '리스' : '렌트';
                }
                
                const statusColors = {
                    'active': 'bg-green-100 text-green-800',
                    'completed': 'bg-red-600 text-white',
                    'cancelled': 'bg-gray-100 text-gray-800'
                };
                const statusTexts = {
                    'active': '계약중',
                    'completed': '완료',
                    'cancelled': '계약종료'
                };

                // 완료 버튼 표시 여부 (진행중 계약서만)
                const showCompleteButton = c.status === 'active';

                return `
                    <div class="bg-white rounded-lg shadow-md p-3 hover:shadow-lg transition-all">
                        <div class="flex flex-wrap justify-between items-start gap-2 mb-2">
                            <div>
                                <h3 class="text-lg font-bold text-gray-800 mb-1">
                                    ${c.contract_number}
                                </h3>
                                <div class="flex gap-1">
                                    <span class="px-2 py-0.5 rounded-full text-xs font-bold ${c.status === 'completed' ? 'bg-gray-100 text-gray-800' : typeColors[displayType]}">
                                        ${displayTypeText}
                                    </span>
                                    <span class="px-2 py-0.5 rounded-full text-xs font-bold ${statusColors[c.status]}">
                                        ${statusTexts[c.status]}
                                    </span>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="showDetail('${c.contract_type}', ${c.id})" class="bg-purple-600 text-white px-3 py-1.5 text-sm rounded hover:bg-purple-700">
                                    <i class="fas fa-eye mr-1"></i>상세
                                </button>
                                ${showCompleteButton ? `
                                <button onclick="completeContract('${c.contract_type}', ${c.id})" class="bg-blue-600 text-white px-3 py-1.5 text-sm rounded hover:bg-blue-700" title="계약 완료">
                                    <i class="fas fa-check mr-1"></i>완료
                                </button>
                                ` : ''}
                                <button onclick="quickDownloadPDF('${c.contract_type}', ${c.id})" class="bg-green-600 text-white px-3 py-1.5 text-sm rounded hover:bg-green-700" title="PDF 다운로드">
                                    <i class="fas fa-download"></i>
                                </button>
                                <button onclick="deleteContract('${c.contract_type}', ${c.id})" class="bg-red-600 text-white px-3 py-1.5 text-sm rounded hover:bg-red-700">

        async function showDetail(contractType, id) {
            try {
                let response;
                if (contractType === 'business') {
                    // 업체 계약서
                    response = await axios.get(`/api/business-contracts/${id}`);
                } else {
                    // 개인 계약서
                    response = await axios.get(`/api/contracts/${id}`);
                }
                
                currentContract = response.data;
                renderDetail();
                document.getElementById('detailModal').classList.remove('hidden');
                
                // 진행중인 계약일 때만 해지 버튼 표시
                const cancelBtn = document.getElementById('cancelContractBtn');
                if (currentContract.status === 'active') {
                    cancelBtn.style.display = 'block';
                } else {
                    cancelBtn.style.display = 'none';
                }
                
                // active 상태인 계약서만 실시간 보험 정보 업데이트 시작
                if (currentContract.status === 'active' && currentContract.motorcycle_id) {
                    console.log('✅ [진행중 계약서] 실시간 보험 정보 업데이트 시작:', currentContract.contract_number);
                    startInsuranceAutoUpdate();
                }
            } catch (error) {
                console.error('Error loading contract detail:', error);
                alert('계약서 상세 정보를 불러오는데 실패했습니다');
            }
        }

        // ==========================================
        // 진행 중인 계약서 보험 정보 실시간 업데이트
        // ==========================================
        // 주의: active 상태의 계약서만 실시간 업데이트됩니다.
        // completed 또는 cancelled 상태는 업데이트되지 않습니다.
        // ==========================================
        
        let insuranceUpdateInterval = null;
        
        // 보험 정보 실시간 업데이트 시작
        function startInsuranceAutoUpdate() {
            // 기존 인터벌 정리
            if (insuranceUpdateInterval) {
                clearInterval(insuranceUpdateInterval);
            }
            
            // 30초마다 오토바이 보험 정보 확인
            insuranceUpdateInterval = setInterval(async () => {
                if (currentContract && currentContract.status === 'active' && currentContract.motorcycle_id) {
                    await refreshInsuranceInfo();
                } else {
                    // active 상태가 아니면 업데이트 중지
                    stopInsuranceAutoUpdate();
                }
            }, 30000); // 30초
            
            console.log('🔄 [진행중 계약서] 보험 정보 자동 업데이트 활성화 (30초마다)');
        }
        
        // 보험 정보 실시간 업데이트 중지
        function stopInsuranceAutoUpdate() {
            if (insuranceUpdateInterval) {
                clearInterval(insuranceUpdateInterval);
                insuranceUpdateInterval = null;
                console.log('⏹️  [진행중 계약서] 보험 정보 자동 업데이트 중지');
            }
        }
        
        // 오토바이 보험 정보 새로고침
        async function refreshInsuranceInfo() {
            if (!currentContract || !currentContract.motorcycle_id) return;
            if (currentContract.status !== 'active') {
                console.log('⚠️  계약 상태가 active가 아니므로 업데이트하지 않습니다:', currentContract.status);
                return;
            }
            
            try {
                const response = await axios.get(`/api/motorcycles/${currentContract.motorcycle_id}`);
                const motorcycle = response.data;
                
                // 보험 정보가 변경되었는지 확인
                const insuranceChanged = 
                    currentContract.insurance_company !== motorcycle.insurance_company ||
                    currentContract.driving_range !== motorcycle.driving_range ||
                    currentContract.insurance_start_date !== motorcycle.insurance_start_date ||
                    currentContract.insurance_end_date !== motorcycle.insurance_end_date;
                
                if (insuranceChanged) {
                    console.log('🔄 [진행중 계약서] 보험 정보가 변경되었습니다. 계약서 정보 업데이트 중...');
                    console.log('  계약번호:', currentContract.contract_number);
                    console.log('  상태:', currentContract.status);
                    
                    // 현재 계약 객체 업데이트
                    currentContract.insurance_company = motorcycle.insurance_company;
                    currentContract.driving_range = motorcycle.driving_range;
                    currentContract.insurance_start_date = motorcycle.insurance_start_date;
                    currentContract.insurance_end_date = motorcycle.insurance_end_date;
                    currentContract.insurance_age_limit = motorcycle.driving_range; // 보험운전범위
                    
                    // 화면 다시 렌더링
                    renderDetail();
                    
                    // DB에도 업데이트 (진행중인 계약만)
                    await updateContractInsurance();
                    
                    console.log('✅ [진행중 계약서] 보험 정보 업데이트 완료:', {
                        company: motorcycle.insurance_company,
                        range: motorcycle.driving_range,
                        start: motorcycle.insurance_start_date,
                        end: motorcycle.insurance_end_date
                    });
                }
            } catch (error) {
                console.error('[진행중 계약서] 보험 정보 업데이트 실패:', error);
            }
        }
        
        // 계약서 DB의 보험 정보 업데이트 (진행중인 계약만)
        async function updateContractInsurance() {
            if (!currentContract || currentContract.status !== 'active') return;
            
            try {
                await axios.put(`/api/contracts/${currentContract.id}/insurance`, {
                    insurance_company: currentContract.insurance_company,
                    driving_range: currentContract.driving_range,
                    insurance_start_date: currentContract.insurance_start_date,
                    insurance_end_date: currentContract.insurance_end_date,
                    insurance_age_limit: currentContract.driving_range
                });
                console.log('💾 [진행중 계약서] DB 보험 정보 업데이트 완료');
            } catch (error) {
                console.error('[진행중 계약서] DB 보험 정보 업데이트 실패:', error);
            }
        }
        
        // 페이지 포커스 시 보험 정보 새로고침 (진행중인 계약만)
        window.addEventListener('focus', () => {

                console.log('📍 [진행중 계약서] 페이지 포커스 - 보험 정보 새로고침');
                refreshInsuranceInfo();
            }
        });

                `👤 계약자: ${currentContract.customer_name} (${currentContract.customer_phone})\n` +
                `🏍️ 오토바이: ${currentContract.vehicle_name} (${currentContract.plate_number})\n\n` +

                `- 계약 상태: 계약중 → 계약종료\n` +
                `- 오토바이 상태: 휴차중으로 변경\n` +
                `- 계약 정보 초기화 (월차감, 보증금, 계약기간, 소유자명)\n` +

                // 계약 상태를 cancelled로 변경

        // PDF 다운로드 함수 (기본 파일명)
        async function downloadPDF(customFileName = null) {
            if (!currentContract) {
                alert('계약서 정보를 불러오는 중입니다. 잠시 후 다시 시도해주세요.');
                return;
            }

            try {
                console.log('📄 PDF 생성 시작:', currentContract.contract_number);
                
                // PDF 전용 컨테이너 사용
                const element = document.getElementById('pdfContent');
                
                if (!element) {
                    throw new Error('PDF 컨테이너를 찾을 수 없습니다.');
                }
                
                // 내용이 없으면 렌더링
                if (!element.innerHTML || element.innerHTML.trim() === '') {
                    console.log('📝 PDF 컨테이너 렌더링...');
                    renderDetail();
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
                
                // 최종 확인
                if (!element.innerHTML || element.innerHTML.trim() === '') {
                    throw new Error('렌더링된 내용이 없습니다.');
                }
                
                console.log('✅ 렌더링 확인 완료');
                
                // html2pdf 라이브러리 로드
                if (typeof html2pdf === 'undefined') {
                    console.log('📦 html2pdf 라이브러리 로딩...');
                    await loadHtml2Pdf();
                }

                // 파일명 결정
                let fileName;
                if (customFileName) {
                    // 사용자 지정 파일명
                    fileName = customFileName.endsWith('.pdf') ? customFileName : `${customFileName}.pdf`;
                } else {
                    // 기본 파일명
                    const contractNumber = currentContract.contract_number || 'contract';
                    fileName = `계약서_${contractNumber}.pdf`;
                }

                // A4 최적화 옵션
                const opt = {
                    margin: [8, 10, 8, 10],
                    filename: fileName,
                    image: { 
                        type: 'jpeg', 
                        quality: 0.95 
                    },
                    html2canvas: { 
                        scale: 2,
                        useCORS: true,
                        letterRendering: true,
                        logging: false,
                        scrollY: 0,
                        scrollX: 0
                    },
                    jsPDF: { 
                        unit: 'mm', 
                        format: 'a4', 
                        orientation: 'portrait',
                        compress: true
                    },
                    pagebreak: { 
                        mode: ['avoid-all', 'css', 'legacy'],
                        before: '.page-break-before',
                        after: '.page-break-after',
                        avoid: ['.signature-section', '.terms-agreement', '.contract-terms', '.border-2', 'img', '.bg-indigo-50', '.bg-yellow-50']
                    }
                };

                console.log('🎨 html2canvas 시작...');
                
                // PDF 생성 및 다운로드 (Blob 방식)
                const pdfBlob = await html2pdf().set(opt).from(element).output('blob');
                
                // File System Access API 지원 확인 (Chrome/Edge)
                if (window.showSaveFilePicker) {
                    try {
                        // 저장 위치 선택 대화상자 표시
                        const fileHandle = await window.showSaveFilePicker({
                            suggestedName: fileName,
                            types: [{
                                description: 'PDF 파일',
                                accept: {'application/pdf': ['.pdf']}
                            }]
                        });
                        
                        // 선택한 위치에 파일 쓰기
                        const writable = await fileHandle.createWritable();
                        await writable.write(pdfBlob);
                        await writable.close();
                        
                        console.log('✅ PDF 저장 완료:', fileName);
                        return;
                    } catch (err) {
                        if (err.name === 'AbortError') {
                            console.log('ℹ️ 사용자가 저장을 취소했습니다.');
                            return;
                        }
                        console.warn('⚠️ File System Access API 실패, 기본 다운로드 방식 사용:', err);
                    }
                }
                
                // 기본 다운로드 방식 (파일 시스템 API 미지원 시)
                const blobUrl = URL.createObjectURL(pdfBlob);
                const downloadLink = document.createElement('a');
                downloadLink.href = blobUrl;
                downloadLink.download = fileName;
                
                // 링크 클릭하여 다운로드
                document.body.appendChild(downloadLink);
                downloadLink.click();
                
                // 정리
                document.body.removeChild(downloadLink);
                URL.revokeObjectURL(blobUrl);
                
                console.log('✅ PDF 생성 완료:', fileName);
                
                // 브라우저 설정 안내 (첫 다운로드 시)
                if (!localStorage.getItem('downloadLocationGuideShown')) {
                    localStorage.setItem('downloadLocationGuideShown', 'true');
                    setTimeout(() => {
                        alert('💡 저장 위치 변경 안내:\n\n' +
                              '현재 브라우저는 기본 다운로드 폴더에 자동 저장됩니다.\n\n' +
                              '매번 저장 위치를 선택하려면:\n' +
                              '1. Chrome/Edge: 설정 → 다운로드 → "다운로드 전에 각 파일의 저장 위치 확인" 체크\n' +
                              '2. Firefox: 설정 → 일반 → 다운로드 → "항상 저장 위치 묻기" 선택\n\n' +
                              '또는 다운로드 후 파일을 원하는 폴더로 이동하세요.');
                    }, 1000);
                }
                
            } catch (error) {
                console.error('❌ PDF 생성 오류:', error);
                alert(`PDF 다운로드에 실패했습니다.\n\n오류: ${error.message}\n\n대안: 브라우저 인쇄 기능(Ctrl+P)을 이용해주세요.`);
            }
        }
        
        // 다른 이름으로 저장
        async function downloadPDFWithCustomName() {
            if (!currentContract) {
                alert('계약서 정보를 불러오는 중입니다. 잠시 후 다시 시도해주세요.');
                return;
            }
            
            // 기본 파일명 제안
            const contractNumber = currentContract.contract_number || 'contract';
            const defaultName = `계약서_${contractNumber}`;
            const customerName = currentContract.customer_name || '고객';
            
            // 파일명 입력받기
            const customName = prompt(
                `PDF 파일명을 입력하세요:\n\n예시:\n- ${defaultName}\n- ${customerName}_계약서_${contractNumber}\n- 오토바이계약_${new Date().toLocaleDateString('ko-KR').replace(/\. /g, '-').replace('.', '')}\n\n※ .pdf 확장자는 자동으로 추가됩니다.`,
                defaultName
            );
            
            if (customName === null) {
                // 취소 버튼 클릭
                return;
            }
            
            if (customName.trim() === '') {
                alert('파일명을 입력해주세요.');
                return;
            }
            
            // 파일명에서 특수문자 제거 (Windows 파일명 규칙)
            const sanitizedName = customName
                .replace(/[<>:"/\\|?*]/g, '_')  // 금지된 문자를 언더스코어로 대체

            } catch (error) {
                console.error('❌ PDF 다운로드 오류:', error);
                alert(`PDF 다운로드에 실패했습니다.\n\n오류: ${error.message}\n\n대안: 상세보기 후 PDF 다운로드 버튼을 이용해주세요.`);

        }

        // html2pdf 라이브러리 로드
        function loadHtml2Pdf() {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function completeContract(contractType, id) {
            if (!confirm('이 계약을 완료 처리하시겠습니까?\n\n완료된 계약은 "완료" 상태로 표시되며,\n해당 오토바이는 다시 휴차중 상태가 됩니다.')) {
                return;
            }

            try {
                if (contractType === 'business') {
                    // 업체 계약서 완료
                    await axios.put(`/api/business-contracts/${id}/complete`);
                } else {
                    // 개인 계약서 완료
                    await axios.put(`/api/contracts/${id}/complete`);
                }
                
                alert('✅ 계약이 완료 처리되었습니다.\n\n해당 오토바이는 다시 계약할 수 있습니다.');
                loadContracts(); // 목록 새로고침
            } catch (error) {
                console.error('Error completing contract:', error);
                alert('계약 완료 처리에 실패했습니다: ' + (error.response?.data?.error || error.message));
            }
        }

        async function deleteContract(contractType, id) {
            if (!confirm('정말로 이 계약서를 삭제하시겠습니까?\n\n삭제된 계약서는 목록에서 사라지지만,\n오토바이 사용 이력에서는 계속 조회할 수 있습니다.')) {
                return;
            }

            try {
                console.log('🗑️ 계약서 삭제 시작:', { contractType, id });
                
                let response;
                if (contractType === 'business') {
                    // 업체 계약서 삭제
                    console.log('📋 업체 계약서 삭제 API 호출: /api/business-contracts/' + id);
                    response = await axios.delete(`/api/business-contracts/${id}`);
                } else {
                    // 개인 계약서 삭제
                    console.log('📋 개인 계약서 삭제 API 호출: /api/contracts/' + id);
                    response = await axios.delete(`/api/contracts/${id}`);
                }
                
                console.log('✅ 삭제 API 응답:', response.data);
                
                alert('계약서가 삭제되었습니다.\n\n※ 오토바이 번호판이나 차대번호로\n사용 이력은 계속 조회할 수 있습니다.');
                
                // 상세 모달이 열려있으면 닫기
                const detailModal = document.getElementById('contractDetailModal');
                if (detailModal && !detailModal.classList.contains('hidden')) {
                    detailModal.classList.add('hidden');
                }
                
                // 목록 새로고침
                console.log('🔄 계약서 목록 새로고침 시작');
                await loadContracts();
                console.log('✅ 계약서 목록 새로고침 완료');
                
            } catch (error) {
                console.error('❌ 계약서 삭제 실패:', error);
                console.error('❌ 에러 상세:', error.response?.data);
                alert('계약서 삭제에 실패했습니다: ' + (error.response?.data?.error || error.message));
            }
        }
