<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=0.25, user-scalable=yes">
    <title>계약서 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* A4 출력 스타일 */
        @media print {
            body {
                margin: 0;
                padding: 0;
                background: white;
            }
            
            /* 모달 배경 숨김 */
            #detailModal {
                position: static !important;
                background: white !important;
                padding: 0 !important;
            }
            
            /* 모달 내용만 표시 */
            .modal-content {
                max-width: 100% !important;
                margin: 0 !important;
                box-shadow: none !important;
            }
            
            /* 버튼과 헤더 숨김 */
            header, .no-print, button, nav {
                display: none !important;
            }
            
            /* 약관 영역 페이지 분할 */
            .contract-terms {
                page-break-inside: auto;
                max-height: none !important;
                overflow: visible !important;
            }
            
            .contract-terms > * {
                page-break-inside: avoid;
            }
            
            .contract-terms p.font-bold {
                page-break-after: avoid;
            }
            
            /* A4 페이지 크기 설정 */
            @page {
                size: A4;
                margin: 15mm;
            }
            
            /* 글자 크기 유지 */
            * {
                font-size: inherit !important;
            }
            
            /* 계약서 컨테이너 */
            .contract-print {
                page-break-inside: auto;
                max-height: none !important;
                overflow: visible !important;
            }
            
            .contract-print > * {
                page-break-inside: avoid;
            }
            
            /* A4 페이지 크기 */
            @page {
                size: A4;
                margin: 15mm;
            }
            
            /* 약관 섹션 */
            .contract-terms {
                font-size: 1.1rem;
                color: #1a1a1a;
                font-weight: 500;
            }
        }
        
        /* 모달 스크롤 */
        .modal-content {
            max-height: 85vh;
            overflow-y: auto;
        }
    </style>
    
    
    
    
    <noscript>
        <meta http-equiv="refresh" content="0; url=/login">
    </noscript>
    <style>
        body { 
            display: none;
            opacity: 0;
            visibility: hidden;
        }
        body.auth-checked {
            display: block;
            opacity: 1;
            visibility: visible;
        }
    </style>
    <script>
        // 즉시 실행: 로그인 체크
        (function() {
            var sessionId = localStorage.getItem('sessionId');
            var user = localStorage.getItem('user');
            if (!sessionId || !user) {
                window.location.replace('/login?redirect=' + encodeURIComponent(window.location.pathname));
            } else {
                document.addEventListener('DOMContentLoaded', function() {
                    document.body.classList.add('auth-checked');
                });
            }
        })();
    </script>
</head>
<body class="bg-gray-50"  class="" class="authenticated">
    
    <div class="min-h-screen">
        <!-- 헤더 -->
        <header class="bg-purple-600 text-white shadow-lg">
            <div class="container mx-auto px-4 py-4 flex items-center justify-between">
                <a href="/dashboard" class="text-xl font-bold">
                    <i class="fas fa-arrow-left mr-2"></i>
                    계약서 목록
                </a>
                <a href="/contract/new" class="bg-white text-purple-600 px-4 py-2 rounded-lg font-bold hover:bg-purple-50">
                    <i class="fas fa-plus mr-2"></i>새 계약서 작성
                </a>
            </div>
        </header>

        <!-- 메인 컨텐츠 -->
        <main class="container mx-auto px-4 py-8">
            <!-- 필터 -->
            <div class="bg-white rounded-lg shadow-md p-4 mb-6 flex flex-wrap gap-4 items-center">
                <div>
                    <label class="block text-sm font-bold mb-2">계약 타입</label>
                    <select id="typeFilter" onchange="filterContracts()" class="px-3 py-2 border rounded-lg">
                        <option value="">전체</option>
                        <option value="lease">리스</option>
                        <option value="rent">렌트</option>
                        <option value="business">업체리스/렌트</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">상태</label>
                    <select id="statusFilter" onchange="filterContracts()" class="px-3 py-2 border rounded-lg">
                        <option value="">전체</option>
                        <option value="active">진행중</option>
                        <option value="completed">완료</option>
                        <option value="cancelled">취소</option>
                    </select>
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-bold mb-2">검색</label>
                    <input type="text" id="searchInput" onkeyup="filterContracts()" placeholder="계약번호, 고객명, 번호판" class="w-full px-3 py-2 border rounded-lg">
                </div>
            </div>

            <!-- 계약서 목록 -->
            <div id="contractList" class="space-y-4">
                <!-- 로딩 중... -->
                <div class="text-center py-12 text-gray-500">
                    <i class="fas fa-spinner fa-spin text-2xl"></i>
                    <p class="mt-2">로딩 중...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- 상세보기 모달 -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-5xl w-full my-8 max-h-screen overflow-hidden flex flex-col">
            <div class="p-6 border-b no-print flex justify-between items-center">
                <h2 class="text-2xl font-bold">계약서 원본</h2>
                <button onclick="hideDetailModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>
            
            <div id="contractDetail" class="modal-content p-6 contract-print"></div>

            <div class="p-6 border-t no-print flex gap-3">
                <button onclick="window.print()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">
                    <i class="fas fa-print mr-2"></i>PDF 출력
                </button>
                <button onclick="hideDetailModal()" class="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-400">
                    닫기
                </button>
            </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        let contracts = [];
        let filteredContracts = [];
        let currentContract = null;
        let sessionId = localStorage.getItem('sessionId');

        // 인증 체크
        async function checkAuth() {
            if (!sessionId) {
                window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname);
                return false;
            }

            try {
                await axios.get('/api/auth/check', {
                    headers: { 'X-Session-ID': sessionId }
                });
                return true;
            } catch (error) {
                localStorage.removeItem('sessionId');
                localStorage.removeItem('user');
                window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname);
                return false;
            }
        }

        // Axios 인터셉터 설정
        axios.interceptors.request.use(config => {
            if (sessionId) {
                config.headers['X-Session-ID'] = sessionId;
            }
            return config;
        });

        axios.interceptors.response.use(
            response => response,
            error => {
                if (error.response?.status === 401) {
                    localStorage.removeItem('sessionId');
                    localStorage.removeItem('user');
                    window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname);
                }
                return Promise.reject(error);
            }
        );

        window.addEventListener('DOMContentLoaded', async () => {
            if (await checkAuth()) {
                loadContracts();
            }
        });

        async function loadContracts() {
            try {
                const response = await axios.get('/api/contracts');
                contracts = response.data;
                filteredContracts = contracts;
                renderContracts();
            } catch (error) {
                console.error('Error loading contracts:', error);
                document.getElementById('contractList').innerHTML = `
                    <div class="text-center py-12 text-red-500">
                        <i class="fas fa-exclamation-circle text-4xl mb-3"></i>
                        <p>계약서 목록을 불러오는데 실패했습니다</p>
                    </div>
                `;
            }
        }

        function filterContracts() {
            const typeFilter = document.getElementById('typeFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const searchInput = document.getElementById('searchInput').value.toLowerCase();

            filteredContracts = contracts.filter(c => {
                const matchType = !typeFilter || c.contract_type === typeFilter;
                const matchStatus = !statusFilter || c.status === statusFilter;
                const matchSearch = !searchInput || 
                    c.contract_number.toLowerCase().includes(searchInput) ||
                    c.customer_name.toLowerCase().includes(searchInput) ||
                    c.plate_number.toLowerCase().includes(searchInput);
                
                return matchType && matchStatus && matchSearch;
            });

            renderContracts();
        }

        function renderContracts() {
            const listEl = document.getElementById('contractList');
            
            if (filteredContracts.length === 0) {
                listEl.innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <i class="fas fa-inbox text-5xl mb-3 opacity-50"></i>
                        <p class="text-lg mb-4">계약서가 없습니다</p>
                        <a href="/contract/new" class="inline-block bg-purple-600 text-white px-6 py-3 rounded-lg hover:bg-purple-700">
                            <i class="fas fa-plus mr-2"></i>첫 계약서 작성하기
                        </a>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = filteredContracts.map(c => {
                const typeColors = {
                    'lease': 'bg-blue-100 text-blue-800',
                    'rent': 'bg-green-100 text-green-800',
                    'business': 'bg-purple-100 text-purple-800'
                };
                const typeTexts = {
                    'lease': '리스',
                    'rent': '렌트',
                    'business': '업체리스/렌트'
                };
                const statusColors = {
                    'active': 'bg-green-100 text-green-800',
                    'completed': 'bg-gray-100 text-gray-800',
                    'cancelled': 'bg-red-100 text-red-800'
                };
                const statusTexts = {
                    'active': '진행중',
                    'completed': '완료',
                    'cancelled': '취소'
                };

                return `
                    <div class="bg-white rounded-lg shadow-md p-3 hover:shadow-lg transition-all">
                        <div class="flex flex-wrap justify-between items-start gap-2 mb-2">
                            <div>
                                <h3 class="text-lg font-bold text-gray-800 mb-1">
                                    ${c.contract_number}
                                </h3>
                                <div class="flex gap-1">
                                    <span class="px-2 py-0.5 rounded-full text-xs font-bold ${typeColors[c.contract_type]}">
                                        ${typeTexts[c.contract_type]}
                                    </span>
                                    <span class="px-2 py-0.5 rounded-full text-xs font-bold ${statusColors[c.status]}">
                                        ${statusTexts[c.status]}
                                    </span>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="showDetail(${c.id})" class="bg-purple-600 text-white px-3 py-1.5 text-sm rounded hover:bg-purple-700">
                                    <i class="fas fa-eye mr-1"></i>상세
                                </button>
                                <button onclick="deleteContract(${c.id})" class="bg-red-600 text-white px-3 py-1.5 text-sm rounded hover:bg-red-700">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs text-gray-600">
                            <div>
                                <p class="mb-1"><i class="fas fa-user w-4 text-purple-600"></i> ${c.customer_name}</p>
                                <p class="mb-1"><i class="fas fa-phone w-4 text-purple-600"></i> ${c.customer_phone}</p>
                                <p><i class="fas fa-motorcycle w-4 text-purple-600"></i> ${c.vehicle_name} (${c.plate_number})</p>
                            </div>
                            <div>
                                <p class="mb-1"><i class="fas fa-calendar w-4 text-purple-600"></i> ${c.start_date} ~ ${c.end_date}</p>
                                <p class="mb-1"><i class="fas fa-won-sign w-4 text-purple-600"></i> ${Number(c.monthly_fee).toLocaleString()}원</p>
                                <p><i class="fas fa-clock w-4 text-purple-600"></i> ${new Date(c.created_at).toLocaleDateString('ko-KR')}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function showDetail(id) {
            try {
                const response = await axios.get(`/api/contracts/${id}`);
                currentContract = response.data;
                renderDetail();
                document.getElementById('detailModal').classList.remove('hidden');
            } catch (error) {
                console.error('Error loading contract detail:', error);
                alert('계약서 상세 정보를 불러오는데 실패했습니다');
            }
        }

        function renderDetail() {
            const c = currentContract;
            const typeTexts = { 'lease': '리스', 'rent': '렌트', 'business': '업체리스/렌트' };
            const statusTexts = { 'active': '진행중', 'completed': '완료', 'cancelled': '취소' };
            
            const html = `
                <div class="space-y-6" style="font-size: 1.1rem; color: #1a1a1a; font-weight: 500;">
                    <!-- 계약서 제목 -->
                    <div class="text-center border-b-2 border-gray-800 pb-4 mb-6">
                        <h1 class="text-3xl font-bold mb-2">오토바이 ${typeTexts[c.contract_type] || c.contract_type} 계약서</h1>
                        <p class="text-lg">계약번호: ${c.contract_number}</p>
                        <p class="text-base mt-2">상태: <span class="font-bold ${c.status === 'active' ? 'text-green-600' : c.status === 'completed' ? 'text-blue-600' : 'text-red-600'}">${statusTexts[c.status] || c.status}</span></p>
                    </div>

                    <!-- 사업자 정보 -->
                    <div class="bg-indigo-50 p-6 rounded-lg border-2 border-indigo-300 mb-6">
                        <h3 class="font-bold text-indigo-900 mb-3" style="font-size: 1.4rem;">임대인 (사업자) 정보</h3>
                        <div class="grid grid-cols-3 gap-3" style="font-size: 1.1rem;">
                            <p><strong>상호:</strong> 대성</p>
                            <p><strong>사업자등록번호:</strong> 487-39-01128</p>
                            <p><strong>대표자:</strong> 김상춘</p>
                        </div>
                    </div>

                    <!-- 고객(차용인) 정보 -->
                    <div class="border-2 border-gray-300 p-6 rounded-lg mb-6">
                        <h3 class="font-bold text-lg mb-4">차용인 정보</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <p><strong>성명:</strong> ${c.customer_name}</p>
                            <p><strong>주민등록번호:</strong> ${c.resident_number}</p>
                            <p><strong>연락처:</strong> ${c.customer_phone}</p>
                            <p><strong>면허종류:</strong> ${c.license_type || '-'}</p>
                            <p class="col-span-2"><strong>주소:</strong> ${c.customer_address}</p>
                        </div>
                    </div>

                    <!-- 오토바이 정보 -->
                    <div class="border-2 border-gray-300 p-6 rounded-lg mb-6">
                        <h3 class="font-bold text-lg mb-4">오토바이 정보</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <p><strong>차량명:</strong> ${c.vehicle_name}</p>
                            <p><strong>번호판:</strong> ${c.plate_number}</p>
                            <p><strong>차대번호:</strong> ${c.chassis_number}</p>
                            <p><strong>연식:</strong> ${c.model_year}년</p>
                            <p><strong>주행거리:</strong> ${Number(c.mileage || 0).toLocaleString()} km</p>
                            <p><strong>보험사:</strong> ${c.insurance_company || '-'}</p>
                            <p><strong>보험기간:</strong> ${c.insurance_start_date || '-'} ~ ${c.insurance_end_date || '-'}</p>
                            <p><strong>운전범위:</strong> ${c.driving_range || '-'}</p>
                            <p><strong>명의자:</strong> ${c.owner_name || '-'}</p>
                            <p><strong>차량금액:</strong> ${Number(c.vehicle_price || 0).toLocaleString()}원</p>
                        </div>
                    </div>

                    <!-- 계약 조건 -->
                    <div class="border-2 border-gray-300 p-6 rounded-lg mb-6">
                        <h3 class="font-bold text-lg mb-4">계약 조건</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <p><strong>계약 시작일:</strong> ${c.start_date}</p>
                            <p><strong>계약 종료일:</strong> ${c.end_date}</p>
                            <p><strong>일차감금액:</strong> ${Number(c.monthly_fee).toLocaleString()}원</p>
                            <p><strong>보증금:</strong> ${Number(c.deposit || 0).toLocaleString()}원</p>
                        </div>
                        ${c.special_terms ? `
                            <div class="mt-4">
                                <p class="font-bold mb-2">특약사항:</p>
                                <p class="whitespace-pre-wrap bg-gray-50 p-4 rounded border">${c.special_terms}</p>
                            </div>
                        ` : ''}
                    </div>

                    <!-- 약관 전체 (제1조~제12조) -->
                    <div class="border-2 border-gray-800 p-6 rounded-lg mb-6 contract-terms">
                        <h3 class="font-bold text-center text-lg mb-3">오토바이 리스/렌트 계약 약관</h3>
                        
                        <p class="mb-3 text-center leading-relaxed">
                            대여인(위 사업자)과 차용인(고객)은 배달대행 업무를 위한 오토바이 리스/렌트 계약을 아래와 같이 체결합니다.
                        </p>

                        <div class="border-t border-b border-gray-400 py-2 my-3">
                            <p class="text-center font-bold">- 다 음 -</p>
                        </div>

                        <p class="font-bold mt-4 mb-2">제1조 (계약의 목적)</p>
                        <div class="ml-4 space-y-1">
                            <p>① 본 계약은 대여인이 소유한 오토바이를 차용인에게 리스 또는 렌트하는 조건과 절차를 정함을 목적으로 합니다.</p>
                            <p>② 계약 타입: 위 기재된 계약 타입 (리스/렌트)</p>
                            <p>③ 계약 기간: 위 기재된 계약 시작일부터 종료일까지</p>
                        </div>

                        <p class="font-bold mt-3 mb-2">제2조 (오토바이의 인도 및 관리)</p>
                        <div class="ml-4 space-y-1">
                            <p>① 대여인은 계약 체결 시 오토바이를 정상 작동 상태로 차용인에게 인도합니다.</p>
                            <p>② 차용인은 오토바이를 선량한 관리자의 주의로써 관리하여야 하며, 임의로 개조하거나 제3자에게 재대여할 수 없습니다.</p>
                            <p>③ 차용인은 정기적으로 오토바이의 안전 점검을 실시하여야 합니다.</p>
                        </div>

                        <p class="font-bold mt-3 mb-2">제3조 (사용 제한)</p>
                        <div class="ml-4 space-y-1">
                            <p>① 차용인은 오토바이를 배달대행 업무 목적으로만 사용할 수 있습니다.</p>
                            <p>② 차용인은 음주운전, 무면허 운전, 난폭운전 등 도로교통법을 위반하는 행위를 하여서는 안 됩니다.</p>
                            <p>③ 오토바이는 대여인이 지정한 운전범위 조건을 충족하는 자만 운전할 수 있습니다.</p>
                        </div>

                        <p class="font-bold mt-3 mb-2">제4조 (일차감 대여료 납부 방식)</p>
                        <div class="ml-4 space-y-1">
                            <p>① 차용인은 배달대행 업무를 통해 발생한 일당에서 매일 일정 금액을 차감하는 방식으로 대여료를 납부합니다.</p>
                            <p>② 일차감 금액: 위 기재된 일차감금액</p>
                            <p>③ 보증금: 위 기재된 보증금</p>
                            <p>④ 차감 금액은 차용인의 일당 정산 시 대여인의 전산 프로그램을 통해 자동으로 공제됩니다.</p>
                            <p>⑤ 차용인은 일당 발생 시마다 자동 차감되며, 별도의 월 납부 의무는 없습니다.</p>
                        </div>

                        <p class="font-bold mt-3 mb-2">제5조 (정산 및 투명성)</p>
                        <div class="ml-4 space-y-1">
                            <p>① 대여인은 차용인의 일당, 차감 금액, 누적 차감 내역을 전산 시스템을 통해 실시간으로 공개합니다.</p>
                            <p>② 차용인은 언제든지 본인의 차감 내역과 납부 현황을 조회할 수 있습니다.</p>
                            <p>③ 차감 내역에 대한 이의가 있을 경우 차용인은 즉시 대여인에게 이의를 제기할 수 있으며, 대여인은 3영업일 이내에 이를 확인하고 답변하여야 합니다.</p>
                        </div>

                        <p class="font-bold mt-3 mb-2">제6조 (보험 및 사고 처리)</p>
                        <div class="ml-4 space-y-1">
                            <p>① 대여인은 오토바이에 대한 유상운송보험에 가입하여야 합니다.</p>
                            <p>② 사고 발생 시 차용인은 즉시 대여인에게 통보하고 보험사에 신고하여야 합니다.</p>
                            <p>③ 차용인의 고의 또는 과실로 발생한 사고의 자기부담금은 차용인이 부담합니다.</p>
                            <p>④ 음주운전, 무면허 운전 등 보험약관에서 면책하는 사고는 차용인이 전액 배상하여야 합니다.</p>
                        </div>

                        <p class="font-bold mt-3 mb-2">제7조 (정비 및 소모품)</p>
                        <div class="ml-4 space-y-1">
                            <p>① 엔진오일 교환 시기를 초과하여 이로 인한 고장 발생 시 수리비는 차용인이 전액 부담합니다.</p>
                            <p>② 무상정비 제외 항목: 엔진, 미션, 구동계</p>
                            <p>③ 무상정비 항목 제외 소모품: 차용인 부담</p>
                            <p>④ 운전자 과실에 의한 제반 수리비: 차용인 전액 부담</p>
                            <p>⑤ 차용인은 정비가 필요한 경우 사전에 대여인에게 통지하고 승인을 받아야 합니다.</p>
                        </div>

                        <p class="font-bold mt-3 mb-2">제8조 (계약의 해지)</p>
                        <div class="ml-4 space-y-1">
                            <p>① 차용인이 다음 각 호에 해당하는 경우 대여인은 계약을 즉시 해지할 수 있습니다:</p>
                            <p class="ml-4">- 정당한 사유 없이 3일 이상 연속하여 배달대행 업무를 수행하지 않은 경우</p>
                            <p class="ml-4">- 음주운전, 무면허 운전 등 중대한 법규 위반 시</p>
                            <p class="ml-4">- 오토바이를 임의로 개조하거나 제3자에게 재대여한 경우</p>
                            <p class="ml-4">- 허위 정보를 제공한 경우</p>
                            <p>② 계약 해지 시 차용인은 오토바이를 즉시 반환하여야 하며, 미차감 대여료 및 손해액을 보증금에서 공제합니다.</p>
                        </div>

                        <p class="font-bold mt-3 mb-2">제9조 (중도 해지)</p>
                        <div class="ml-4 space-y-1">
                            <p>① 차용인은 1개월 전 사전 통보로 계약을 중도 해지할 수 있습니다.</p>
                            <p>② 중도 해지 시 보증금에서 위약금(일차감금액의 30일분)을 공제 후 반환합니다.</p>
                            <p>③ 리스 계약의 경우 잔여 리스료(계약 종료일까지의 일차감금액 합계)를 일시 납부하여야 합니다.</p>
                        </div>

                        <p class="font-bold mt-3 mb-2">제10조 (계약 종료 시 반환)</p>
                        <div class="ml-4 space-y-1">
                            <p>① 계약 종료 시 차용인은 오토바이를 원상태로 반환하여야 합니다.</p>
                            <p>② 대여인은 반환 시 오토바이 상태를 확인하고, 손상이 있는 경우 수리비를 보증금에서 공제합니다. 보증금이 없을 시 일차감분에서 일괄 차감합니다.</p>
                            <p>③ 보증금 정산은 반환일로부터 7영업일 이내에 완료합니다.</p>
                        </div>

                        <p class="font-bold mt-3 mb-2">제11조 (무상정비 항목 - 특약)</p>
                        <div class="ml-4 space-y-1">
                            <p>① 대여인은 계약 기간 중 다음 항목에 대하여 무상으로 정비 서비스를 제공합니다:</p>
                            <p class="ml-4">- 엔진오일 교환 (주행거리 1,000km마다)</p>
                            <p class="ml-4">- 브레이크패드 교체 (마모 시)</p>
                            <p class="ml-4">- 타이어 교체 (마모 또는 손상 시, 단 차용인 과실 제외)</p>
                            <p class="ml-4">- 정기 점검 (계기판 점검, 등화장치, 제동장치 등)</p>
                            <p>② 무상정비 제외 항목:</p>
                            <p class="ml-4">- 엔진, 미션, 구동계 관련 수리</p>
                            <p class="ml-4">- 무상정비 항목 이외의 모든 소모품</p>
                            <p class="ml-4">- 운전자 과실에 의한 제반 수리비</p>
                            <p>③ 무상정비는 대여인이 지정한 정비소에서만 가능하며, 임의 정비 시 비용은 차용인이 부담합니다.</p>
                            <p>④ 차용인의 고의 또는 과실로 인한 부품 손상은 무상정비 대상에서 제외됩니다.</p>
                        </div>

                        <p class="font-bold mt-3 mb-2">제12조 (분쟁 해결 및 기타)</p>
                        <div class="ml-4 space-y-1">
                            <p>① 본 계약서에 명시되지 않은 사항은 일반 관례 및 민법의 규정에 따릅니다.</p>
                            <p>② 본 계약으로 인한 분쟁 발생 시 대여인의 주소지 관할 법원을 전속관할로 합니다.</p>
                            <p>③ 위 기재된 특약사항이 있는 경우 특약사항이 본 계약서에 우선합니다.</p>
                        </div>

                        <p class="mt-4 text-center font-bold">
                            본 계약을 증명하기 위하여 계약서를 작성하고 차용인이 서명합니다.
                        </p>
                    </div>
                    
                    <!-- 약관 동의 표시 -->
                    <div class="flex items-start p-4 bg-yellow-50 border border-yellow-300 rounded mb-6">
                        <div class="mt-1 w-5 h-5 bg-green-600 rounded flex items-center justify-center">
                            <i class="fas fa-check text-white text-xs"></i>
                        </div>
                        <label class="ml-3 text-base font-bold text-gray-800">
                            위 계약 약관을 모두 확인하였으며 이에 동의합니다 <span class="text-red-600">*</span>
                        </label>
                    </div>

                    <!-- 서명 섹션 -->
                    <div class="border-2 border-gray-300 p-6 rounded-lg mb-6">
                        <h3 class="font-bold text-lg mb-4 text-center">계약자 서명</h3>
                        <div class="grid ${c.id_card_photo ? 'grid-cols-2' : 'grid-cols-1'} gap-6">
                            <!-- 차용인 서명 -->
                            ${c.signature_data ? `
                                <div class="border-2 border-gray-400 p-4 rounded-lg bg-white">
                                    <h4 class="font-bold mb-3 text-center">차용인 서명</h4>
                                    <div class="border rounded bg-white" style="min-height: 150px;">
                                        <img src="${c.signature_data}" alt="차용인 서명" class="w-full h-full" style="object-fit: contain;">
                                    </div>
                                    <p class="text-center mt-3 font-bold">서명인: ${c.customer_name}</p>
                                    <p class="text-center text-sm text-gray-600">서명일: ${new Date(c.created_at).toLocaleDateString('ko-KR')}</p>
                                </div>
                            ` : `
                                <div class="border-2 border-gray-300 p-4 rounded-lg bg-gray-50">
                                    <h4 class="font-bold mb-3 text-center text-gray-500">차용인 서명</h4>
                                    <div class="flex items-center justify-center bg-white border rounded" style="min-height: 150px;">
                                        <p class="text-gray-400">서명 없음</p>
                                    </div>
                                </div>
                            `}
                            
                            <!-- 신분증 사본 -->
                            ${c.id_card_photo ? `
                                <div class="border-2 border-gray-400 p-4 rounded-lg bg-white">
                                    <h4 class="font-bold mb-3 text-center">신분증 사본</h4>
                                    <div class="border rounded bg-white" style="min-height: 150px;">
                                        <img src="${c.id_card_photo}" alt="신분증" class="w-full h-full" style="object-fit: contain;">
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>

                    <!-- 계약 체결일 -->
                    <div class="text-center border-t-2 border-gray-300 pt-6 mt-6">
                        <p class="text-lg font-bold">계약 체결일</p>
                        <p class="text-xl mt-2">${new Date(c.created_at).toLocaleDateString('ko-KR', { 
                            year: 'numeric', 
                            month: 'long', 
                            day: 'numeric' 
                        })}</p>
                    </div>
                </div>
            `;
            
            document.getElementById('contractDetail').innerHTML = html;
        }
        function hideDetailModal() {
            document.getElementById('detailModal').classList.add('hidden');
            currentContract = null;
        }

        async function deleteContract(id) {
            if (!confirm('정말로 이 계약서를 삭제하시겠습니까?\n\n삭제된 계약서는 목록에서 사라지지만,\n오토바이 사용 이력에서는 계속 조회할 수 있습니다.')) {
                return;
            }

            try {
                await axios.delete(`/api/contracts/${id}`);
                alert('계약서가 삭제되었습니다.\n\n※ 오토바이 번호판이나 차대번호로\n사용 이력은 계속 조회할 수 있습니다.');
                loadContracts(); // 목록 새로고침
            } catch (error) {
                console.error('Error deleting contract:', error);
                alert('계약서 삭제에 실패했습니다: ' + (error.response?.data?.error || error.message));
            }
        }

        function downloadPDF() {
            if (!currentContract) return;
            
            // 간단한 PDF 다운로드 (실제로는 서버에서 PDF 생성 필요)
            alert('PDF 다운로드 기능은 추가 구현이 필요합니다.\n현재는 브라우저 인쇄 기능을 사용하세요.');
            window.print();
        }
    </script>
