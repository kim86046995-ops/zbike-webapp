<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=0.25, user-scalable=yes">
    <title>계약서 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- 헤더 -->
        <header class="bg-purple-600 text-white shadow-lg">
            <div class="container mx-auto px-4 py-4 flex items-center justify-between">
                <a href="/dashboard" class="text-xl font-bold">
                    <i class="fas fa-arrow-left mr-2"></i>
                    계약서 목록
                </a>
                <a href="/contract/new" class="bg-white text-purple-600 px-4 py-2 rounded-lg font-bold hover:bg-purple-50">
                    <i class="fas fa-plus mr-2"></i>새 계약서 작성
                </a>
            </div>
        </header>

        <!-- 메인 컨텐츠 -->
        <main class="container mx-auto px-4 py-8">
            <!-- 필터 -->
            <div class="bg-white rounded-lg shadow-md p-4 mb-6 flex flex-wrap gap-4 items-center">
                <div>
                    <label class="block text-sm font-bold mb-2">계약 타입</label>
                    <select id="typeFilter" onchange="filterContracts()" class="px-3 py-2 border rounded-lg">
                        <option value="">전체</option>
                        <option value="lease">리스</option>
                        <option value="rent">렌트</option>
                        <option value="business">업체리스/렌트</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">상태</label>
                    <select id="statusFilter" onchange="filterContracts()" class="px-3 py-2 border rounded-lg">
                        <option value="">전체</option>
                        <option value="active">진행중</option>
                        <option value="completed">완료</option>
                        <option value="cancelled">취소</option>
                    </select>
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-bold mb-2">검색</label>
                    <input type="text" id="searchInput" onkeyup="filterContracts()" placeholder="계약번호, 고객명, 번호판" class="w-full px-3 py-2 border rounded-lg">
                </div>
            </div>

            <!-- 계약서 목록 -->
            <div id="contractList" class="space-y-4">
                <!-- 로딩 중... -->
                <div class="text-center py-12 text-gray-500">
                    <i class="fas fa-spinner fa-spin text-2xl"></i>
                    <p class="mt-2">로딩 중...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- 상세보기 모달 -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full my-8">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">계약서 상세</h2>
                    <button onclick="hideDetailModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
                
                <div id="contractDetail"></div>

                <div class="mt-6 flex gap-3">
                    <button onclick="downloadPDF()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">
                        <i class="fas fa-download mr-2"></i>PDF 다운로드
                    </button>
                    <button onclick="hideDetailModal()" class="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-400">
                        닫기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        let contracts = [];
        let filteredContracts = [];
        let currentContract = null;
        let sessionId = localStorage.getItem('sessionId');

        // 인증 체크
        async function checkAuth() {
            if (!sessionId) {
                window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname);
                return false;
            }

            try {
                await axios.get('/api/auth/check', {
                    headers: { 'X-Session-ID': sessionId }
                });
                return true;
            } catch (error) {
                localStorage.removeItem('sessionId');
                localStorage.removeItem('user');
                window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname);
                return false;
            }
        }

        // Axios 인터셉터 설정
        axios.interceptors.request.use(config => {
            if (sessionId) {
                config.headers['X-Session-ID'] = sessionId;
            }
            return config;
        });

        axios.interceptors.response.use(
            response => response,
            error => {
                if (error.response?.status === 401) {
                    localStorage.removeItem('sessionId');
                    localStorage.removeItem('user');
                    window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname);
                }
                return Promise.reject(error);
            }
        );

        window.addEventListener('DOMContentLoaded', async () => {
            if (await checkAuth()) {
                loadContracts();
            }
        });

        async function loadContracts() {
            try {
                const response = await axios.get('/api/contracts');
                contracts = response.data;
                filteredContracts = contracts;
                renderContracts();
            } catch (error) {
                console.error('Error loading contracts:', error);
                document.getElementById('contractList').innerHTML = `
                    <div class="text-center py-12 text-red-500">
                        <i class="fas fa-exclamation-circle text-4xl mb-3"></i>
                        <p>계약서 목록을 불러오는데 실패했습니다</p>
                    </div>
                `;
            }
        }

        function filterContracts() {
            const typeFilter = document.getElementById('typeFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const searchInput = document.getElementById('searchInput').value.toLowerCase();

            filteredContracts = contracts.filter(c => {
                const matchType = !typeFilter || c.contract_type === typeFilter;
                const matchStatus = !statusFilter || c.status === statusFilter;
                const matchSearch = !searchInput || 
                    c.contract_number.toLowerCase().includes(searchInput) ||
                    c.customer_name.toLowerCase().includes(searchInput) ||
                    c.plate_number.toLowerCase().includes(searchInput);
                
                return matchType && matchStatus && matchSearch;
            });

            renderContracts();
        }

        function renderContracts() {
            const listEl = document.getElementById('contractList');
            
            if (filteredContracts.length === 0) {
                listEl.innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <i class="fas fa-inbox text-5xl mb-3 opacity-50"></i>
                        <p class="text-lg mb-4">계약서가 없습니다</p>
                        <a href="/contract/new" class="inline-block bg-purple-600 text-white px-6 py-3 rounded-lg hover:bg-purple-700">
                            <i class="fas fa-plus mr-2"></i>첫 계약서 작성하기
                        </a>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = filteredContracts.map(c => {
                const typeColors = {
                    'lease': 'bg-blue-100 text-blue-800',
                    'rent': 'bg-green-100 text-green-800',
                    'business': 'bg-purple-100 text-purple-800'
                };
                const typeTexts = {
                    'lease': '리스',
                    'rent': '렌트',
                    'business': '업체리스/렌트'
                };
                const statusColors = {
                    'active': 'bg-green-100 text-green-800',
                    'completed': 'bg-gray-100 text-gray-800',
                    'cancelled': 'bg-red-100 text-red-800'
                };
                const statusTexts = {
                    'active': '진행중',
                    'completed': '완료',
                    'cancelled': '취소'
                };

                return `
                    <div class="bg-white rounded-lg shadow-md p-6 hover:shadow-xl transition-all">
                        <div class="flex flex-wrap justify-between items-start gap-4 mb-4">
                            <div>
                                <h3 class="text-xl font-bold text-gray-800 mb-2">
                                    ${c.contract_number}
                                </h3>
                                <div class="flex gap-2">
                                    <span class="px-3 py-1 rounded-full text-sm font-bold ${typeColors[c.contract_type]}">
                                        ${typeTexts[c.contract_type]}
                                    </span>
                                    <span class="px-3 py-1 rounded-full text-sm font-bold ${statusColors[c.status]}">
                                        ${statusTexts[c.status]}
                                    </span>
                                </div>
                            </div>
                            <button onclick="showDetail(${c.id})" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">
                                <i class="fas fa-eye mr-2"></i>상세보기
                            </button>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-gray-600">
                            <div>
                                <p class="mb-2"><i class="fas fa-user w-5 text-purple-600"></i> <strong>고객:</strong> ${c.customer_name}</p>
                                <p class="mb-2"><i class="fas fa-phone w-5 text-purple-600"></i> <strong>연락처:</strong> ${c.customer_phone}</p>
                                <p><i class="fas fa-motorcycle w-5 text-purple-600"></i> <strong>오토바이:</strong> ${c.vehicle_name} (${c.plate_number})</p>
                            </div>
                            <div>
                                <p class="mb-2"><i class="fas fa-calendar w-5 text-purple-600"></i> <strong>기간:</strong> ${c.start_date} ~ ${c.end_date}</p>
                                <p class="mb-2"><i class="fas fa-won-sign w-5 text-purple-600"></i> <strong>월납부금:</strong> ${Number(c.monthly_fee).toLocaleString()}원</p>
                                <p><i class="fas fa-clock w-5 text-purple-600"></i> <strong>작성일:</strong> ${new Date(c.created_at).toLocaleString('ko-KR')}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function showDetail(id) {
            try {
                const response = await axios.get(`/api/contracts/${id}`);
                currentContract = response.data;
                renderDetail();
                document.getElementById('detailModal').classList.remove('hidden');
            } catch (error) {
                console.error('Error loading contract detail:', error);
                alert('계약서 상세 정보를 불러오는데 실패했습니다');
            }
        }

        function renderDetail() {
            const c = currentContract;
            const typeTexts = { 'lease': '리스', 'rent': '렌트', 'business': '업체리스/렌트' };
            const statusTexts = { 'active': '진행중', 'completed': '완료', 'cancelled': '취소' };

            const html = `
                <div class="space-y-6">
                    <!-- 기본 정보 -->
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <h3 class="font-bold text-lg mb-3">계약 정보</h3>
                        <div class="grid grid-cols-2 gap-3 text-sm">
                            <p><strong>계약번호:</strong> ${c.contract_number}</p>
                            <p><strong>계약타입:</strong> ${typeTexts[c.contract_type]}</p>
                            <p><strong>상태:</strong> ${statusTexts[c.status]}</p>
                            <p><strong>작성일:</strong> ${new Date(c.created_at).toLocaleString('ko-KR')}</p>
                        </div>
                    </div>

                    <!-- 고객 정보 -->
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <h3 class="font-bold text-lg mb-3">고객 정보</h3>
                        <div class="grid grid-cols-2 gap-3 text-sm">
                            <p><strong>이름:</strong> ${c.customer_name}</p>
                            <p><strong>주민번호:</strong> ${c.resident_number}</p>
                            <p><strong>전화번호:</strong> ${c.customer_phone}</p>
                            <p><strong>면허종류:</strong> ${c.license_type}</p>
                            <p class="col-span-2"><strong>주소:</strong> ${c.customer_address}</p>
                        </div>
                    </div>

                    <!-- 오토바이 정보 -->
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <h3 class="font-bold text-lg mb-3">오토바이 정보</h3>
                        <div class="grid grid-cols-2 gap-3 text-sm">
                            <p><strong>차량명:</strong> ${c.vehicle_name}</p>
                            <p><strong>번호판:</strong> ${c.plate_number}</p>
                            <p><strong>차대번호:</strong> ${c.chassis_number}</p>
                            <p><strong>연식:</strong> ${c.model_year}년</p>
                            <p><strong>주행거리:</strong> ${Number(c.mileage).toLocaleString()} km</p>
                            <p><strong>보험사:</strong> ${c.insurance_company}</p>
                            <p><strong>보험기간:</strong> ${c.insurance_start_date} ~ ${c.insurance_end_date}</p>
                            <p><strong>운전범위:</strong> ${c.driving_range}</p>
                            <p><strong>명의자:</strong> ${c.owner_name}</p>
                            <p><strong>차량금액:</strong> ${Number(c.vehicle_price).toLocaleString()}원</p>
                        </div>
                    </div>

                    <!-- 계약 상세 -->
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <h3 class="font-bold text-lg mb-3">계약 상세</h3>
                        <div class="grid grid-cols-2 gap-3 text-sm">
                            <p><strong>계약기간:</strong> ${c.start_date} ~ ${c.end_date}</p>
                            <p><strong>월 납부금액:</strong> ${Number(c.monthly_fee).toLocaleString()}원</p>
                            <p><strong>보증금:</strong> ${Number(c.deposit || 0).toLocaleString()}원</p>
                        </div>
                        ${c.special_terms ? `
                            <div class="mt-3">
                                <p class="font-bold mb-2">특약사항:</p>
                                <p class="text-sm whitespace-pre-wrap bg-white p-3 rounded border">${c.special_terms}</p>
                            </div>
                        ` : ''}
                    </div>

                    <!-- 서명 -->
                    ${c.signature_data ? `
                        <div class="bg-gray-50 p-4 rounded-lg">
                            <h3 class="font-bold text-lg mb-3">고객 서명</h3>
                            <div class="border rounded-lg overflow-hidden bg-white">
                                <img src="${c.signature_data}" alt="서명" class="w-full">
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;

            document.getElementById('contractDetail').innerHTML = html;
        }

        function hideDetailModal() {
            document.getElementById('detailModal').classList.add('hidden');
            currentContract = null;
        }

        function downloadPDF() {
            if (!currentContract) return;
            
            // 간단한 PDF 다운로드 (실제로는 서버에서 PDF 생성 필요)
            alert('PDF 다운로드 기능은 추가 구현이 필요합니다.\n현재는 브라우저 인쇄 기능을 사용하세요.');
            window.print();
        }
    </script>
</body>
</html>
