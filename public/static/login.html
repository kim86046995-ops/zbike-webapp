<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>로그인 - Z-BIKE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
    <!-- 로그인 카드 -->
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <!-- 로고 -->
        <div class="text-center mb-6">
            <img src="/static/zbike-logo.png" alt="Z-BIKE" class="mx-auto mb-4" style="max-width: 200px; height: auto;">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Z-BIKE</h1>
            <p class="text-gray-600 text-lg">전자계약서</p>
            <p class="text-gray-500 text-sm">오토바이 리스/렌트 관리 시스템</p>
        </div>

        <!-- 에러 메시지 -->
        <div id="errorMessage" class="hidden mb-4 p-4 rounded-lg">
            <span id="errorText"></span>
        </div>

        <!-- 로그인 폼 -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">
                    <i class="fas fa-user mr-2"></i>아이디
                </label>
                <input 
                    type="text" 
                    id="username" 
                    required 
                    autocomplete="off"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="아이디 입력"
                >
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">
                    <i class="fas fa-lock mr-2"></i>비밀번호
                </label>
                <input 
                    type="password" 
                    id="password" 
                    required 
                    autocomplete="off"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="비밀번호 입력"
                >
            </div>

            <button 
                type="submit" 
                id="loginButton"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold text-lg hover:bg-blue-700 transition"
            >
                <i class="fas fa-sign-in-alt mr-2"></i>로그인
            </button>
        </form>

        <!-- 테스트 계정 안내 -->
        <div class="mt-6 p-4 bg-gray-50 rounded-lg text-sm">
            <p class="font-bold text-gray-700 mb-2">테스트 계정:</p>
            <p class="text-gray-600">아이디: admin</p>
            <p class="text-gray-600">비밀번호: admin123</p>
        </div>
    </div>

    <!-- Axios 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    
    <script>
        // 캐시 버스터
        const VERSION = Date.now();
        console.log('🔄 로그인 페이지 로드 - 버전:', VERSION);

        // 폼 제출 처리
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const loginButton = document.getElementById('loginButton');
            
            console.log('📝 로그인 시도');
            console.log('👤 아이디:', username);
            console.log('🔑 비밀번호 길이:', password.length);
            
            // 버튼 비활성화
            loginButton.disabled = true;
            loginButton.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>처리중...';
            
            try {
                // API 요청
                const response = await axios({
                    method: 'POST',
                    url: '/api/auth/login',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    data: {
                        username: username,
                        password: password
                    },
                    timeout: 10000
                });
                
                console.log('✅ 응답:', response.data);
                
                if (response.data.success) {
                    // 세션 저장
                    localStorage.setItem('sessionId', response.data.sessionId);
                    localStorage.setItem('user', JSON.stringify(response.data.user));
                    
                    // 성공 메시지
                    errorDiv.className = 'mb-4 p-4 rounded-lg bg-green-50 border border-green-200 text-green-700';
                    errorText.textContent = '✅ 로그인 성공! 이동 중...';
                    errorDiv.classList.remove('hidden');
                    
                    // 대시보드로 이동
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    throw new Error('로그인 실패');
                }
                
            } catch (error) {
                console.error('❌ 에러:', error);
                
                // 버튼 복구
                loginButton.disabled = false;
                loginButton.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>로그인';
                
                // 에러 메시지
                errorDiv.className = 'mb-4 p-4 rounded-lg bg-red-50 border border-red-200 text-red-700';
                
                if (error.response) {
                    console.error('❌ 상태:', error.response.status);
                    console.error('❌ 데이터:', error.response.data);
                    
                    if (error.response.status === 401) {
                        errorText.textContent = '❌ 아이디 또는 비밀번호가 잘못되었습니다.';
                    } else {
                        errorText.textContent = '❌ 로그인 실패: ' + (error.response.data.error || '서버 오류');
                    }
                } else if (error.request) {
                    console.error('❌ 요청 실패:', error.request);
                    errorText.textContent = '❌ 서버에 연결할 수 없습니다. 네트워크를 확인해주세요.';
                } else {
                    console.error('❌ 에러:', error.message);
                    errorText.textContent = '❌ 오류가 발생했습니다: ' + error.message;
                }
                
                errorDiv.classList.remove('hidden');
            }
        });

        // Enter 키 처리
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
</html>
