<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 오토바이 리스/렌트 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <!-- 로고 -->
        <div class="text-center mb-8">
            <div class="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-motorcycle text-blue-600 text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">관리자 로그인</h1>
            <p class="text-gray-600">오토바이 리스/렌트 관리 시스템</p>
        </div>

        <!-- 로그인 폼 -->
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">
                    <i class="fas fa-user mr-2"></i>아이디
                </label>
                <input 
                    type="text" 
                    id="username" 
                    required 
                    autocomplete="username"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    placeholder="아이디를 입력하세요"
                >
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">
                    <i class="fas fa-lock mr-2"></i>비밀번호
                </label>
                <div class="relative">
                    <input 
                        type="password" 
                        id="password" 
                        required 
                        autocomplete="current-password"
                        class="w-full px-4 py-3 pr-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                        placeholder="비밀번호를 입력하세요"
                    >
                    <button 
                        type="button" 
                        onclick="togglePassword()"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
                    >
                        <i id="passwordIcon" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorText"></span>
            </div>

            <button 
                type="submit" 
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold text-lg hover:bg-blue-700 transition transform hover:scale-105 active:scale-95"
            >
                <i class="fas fa-sign-in-alt mr-2"></i>로그인
            </button>
        </form>

        <!-- 아이디/비밀번호 찾기 -->
        <div class="mt-4 text-center">
            <a href="/find-account" class="text-sm text-blue-600 hover:text-blue-800 font-semibold">
                <i class="fas fa-question-circle mr-1"></i>아이디 또는 비밀번호를 잊으셨나요?
            </a>
        </div>

        <!-- 테스트 계정 안내 -->
        <div class="mt-6 p-4 bg-gray-50 rounded-lg text-sm text-gray-600">
            <p class="font-bold mb-2"><i class="fas fa-info-circle mr-2 text-blue-600"></i>관리자 계정</p>
            <p><strong>아이디:</strong> sangchun11</p>
            <p><strong>비밀번호:</strong> a2636991!@#</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        // 이미 로그인된 경우 리디렉션
        const sessionId = localStorage.getItem('sessionId')
        if (sessionId) {
            axios.get('/api/auth/check', {
                headers: { 'X-Session-ID': sessionId }
            }).then(response => {
                if (response.data.authenticated) {
                    // URL 파라미터에서 redirect 확인
                    const urlParams = new URLSearchParams(window.location.search)
                    const redirect = urlParams.get('redirect') || '/'
                    window.location.href = redirect
                }
            }).catch(() => {
                localStorage.removeItem('sessionId')
            })
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            
            const username = document.getElementById('username').value
            const password = document.getElementById('password').value
            const errorDiv = document.getElementById('errorMessage')
            const errorText = document.getElementById('errorText')

            try {
                const response = await axios.post('/api/auth/login', {
                    username,
                    password
                })

                if (response.data.success) {
                    // 세션 ID 저장
                    localStorage.setItem('sessionId', response.data.sessionId)
                    localStorage.setItem('user', JSON.stringify(response.data.user))

                    // 성공 메시지
                    errorDiv.classList.remove('hidden', 'bg-red-50', 'border-red-200', 'text-red-700')
                    errorDiv.classList.add('bg-green-50', 'border-green-200', 'text-green-700')
                    errorText.textContent = '로그인 성공! 이동 중...'

                    // 리디렉션
                    setTimeout(() => {
                        const urlParams = new URLSearchParams(window.location.search)
                        const redirect = urlParams.get('redirect') || '/'
                        window.location.href = redirect
                    }, 500)
                }
            } catch (error) {
                console.error('Login error:', error)
                errorDiv.classList.remove('hidden')
                errorDiv.classList.add('bg-red-50', 'border-red-200', 'text-red-700')
                errorDiv.classList.remove('bg-green-50', 'border-green-200', 'text-green-700')
                
                if (error.response?.status === 401) {
                    errorText.textContent = '아이디 또는 비밀번호가 잘못되었습니다'
                } else {
                    errorText.textContent = '로그인에 실패했습니다. 다시 시도해주세요'
                }
            }
        })

        // Enter 키로 로그인
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('password').focus()
            }
        })
        
        // 비밀번호 표시/숨김 토글
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.classList.remove('fa-eye');
                passwordIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                passwordIcon.classList.remove('fa-eye-slash');
                passwordIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
