<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - 오토바이 리스/렌트 전자계약 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- 로고 및 제목 -->
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-white rounded-full shadow-lg mb-4">
                <i class="fas fa-motorcycle text-4xl text-indigo-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">관리자 로그인</h1>
            <p class="text-gray-600">오토바이 리스/렌트 전자계약 시스템</p>
        </div>

        <!-- 로그인 폼 -->
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <form id="loginForm" class="space-y-6">
                <!-- 아이디 입력 -->
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-user mr-2 text-indigo-600"></i>아이디
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
                        placeholder="아이디를 입력하세요"
                        autocomplete="username"
                    >
                </div>

                <!-- 비밀번호 입력 -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-lock mr-2 text-indigo-600"></i>비밀번호
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition pr-12"
                            placeholder="비밀번호를 입력하세요"
                            autocomplete="current-password"
                        >
                        <button 
                            type="button" 
                            onclick="togglePassword()"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
                        >
                            <i id="passwordIcon" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- 로그인 유지 체크박스 -->
                <div class="flex items-center">
                    <input 
                        type="checkbox" 
                        id="rememberMe" 
                        name="rememberMe"
                        class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500"
                    >
                    <label for="rememberMe" class="ml-2 text-sm text-gray-600">
                        로그인 상태 유지
                    </label>
                </div>

                <!-- 로그인 버튼 -->
                <button 
                    type="submit"
                    class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition font-semibold shadow-lg hover:shadow-xl transform hover:-translate-y-0.5"
                >
                    <i class="fas fa-sign-in-alt mr-2"></i>로그인
                </button>
            </form>

            <!-- 에러 메시지 -->
            <div id="errorMessage" class="mt-4 hidden">
                <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-center">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    <span id="errorText"></span>
                </div>
            </div>

            <!-- 도움말 -->
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-500">
                    기본 계정: <span class="font-semibold">admin</span> / <span class="font-semibold">admin1234</span>
                </p>
                <p class="text-sm text-gray-600 mt-3">
                    계정이 없으신가요?
                    <a href="/register" class="text-indigo-600 hover:text-indigo-800 font-semibold transition ml-1">
                        회원가입하기
                    </a>
                </p>
            </div>
        </div>

        <!-- 하단 링크 -->
        <div class="mt-6 text-center">
            <a href="/" class="text-sm text-indigo-600 hover:text-indigo-800 transition">
                <i class="fas fa-arrow-left mr-1"></i>메인 페이지로 돌아가기
            </a>
        </div>
    </div>

    <script>
        // 비밀번호 표시/숨김 토글
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.classList.remove('fa-eye');
                passwordIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                passwordIcon.classList.remove('fa-eye-slash');
                passwordIcon.classList.add('fa-eye');
            }
        }

        // 로그인 폼 제출
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            try {
                const response = await axios.post('/api/admin/login', {
                    username,
                    password,
                    rememberMe
                });
                
                if (response.data.success) {
                    // 로그인 성공 - 메인 페이지로 리다이렉트
                    window.location.href = '/';
                }
            } catch (error) {
                // 에러 메시지 표시
                const errorMessage = document.getElementById('errorMessage');
                const errorText = document.getElementById('errorText');
                
                if (error.response && error.response.data) {
                    errorText.textContent = error.response.data.error || '로그인에 실패했습니다.';
                } else {
                    errorText.textContent = '서버 오류가 발생했습니다. 다시 시도해주세요.';
                }
                
                errorMessage.classList.remove('hidden');
                
                // 3초 후 에러 메시지 숨김
                setTimeout(() => {
                    errorMessage.classList.add('hidden');
                }, 3000);
            }
        });

        // Enter 키 처리
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
