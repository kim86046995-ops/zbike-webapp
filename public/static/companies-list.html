<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업체 목록 - Z-BIKE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen py-8 px-4">
        <div class="max-w-7xl mx-auto">
            <!-- 헤더 -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <div class="flex items-center justify-between">
                    <div class="flex-1">
                        <h1 class="text-2xl font-bold text-gray-800 flex items-center">
                            <i class="fas fa-building text-blue-600 mr-3"></i>
                            업체 목록
                        </h1>
                        <p class="text-gray-600 mt-2">등록된 업체 정보를 확인하고 관리합니다.</p>
                    </div>
                    <div class="flex gap-2">
                        <button type="button" onclick="location.href='/static/company-register.html'" 
                            class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-semibold whitespace-nowrap">
                            <i class="fas fa-plus mr-2"></i>
                            업체 추가
                        </button>
                        <button type="button" onclick="history.back()" 
                            class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition font-semibold whitespace-nowrap">
                            <i class="fas fa-arrow-left mr-2"></i>
                            뒤로가기
                        </button>
                    </div>
                </div>
            </div>

            <!-- 검색 및 필터 -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <div class="flex gap-4">
                    <div class="flex-1">
                        <input type="text" id="searchInput" placeholder="업체명, 사업자번호, 대표자명으로 검색..." 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            onkeyup="searchCompanies()">
                    </div>
                    <button onclick="loadCompanies()" 
                        class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition font-semibold">
                        <i class="fas fa-sync-alt mr-2"></i>
                        새로고침
                    </button>
                </div>
            </div>

            <!-- 업체 목록 -->
            <div id="companiesList" class="space-y-4">
                <!-- 로딩 중 -->
                <div class="text-center py-12">
                    <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
                    <p class="text-gray-600">업체 목록을 불러오는 중...</p>
                </div>
            </div>

            <!-- 빈 목록 -->
            <div id="emptyState" class="hidden bg-white rounded-lg shadow-md p-12 text-center">
                <i class="fas fa-inbox text-6xl text-gray-300 mb-4"></i>
                <h3 class="text-xl font-bold text-gray-800 mb-2">등록된 업체가 없습니다</h3>
                <p class="text-gray-600 mb-6">업체를 추가하여 계약 관리를 시작하세요.</p>
                <button onclick="location.href='/static/company-register.html'" 
                    class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-semibold">
                    <i class="fas fa-plus mr-2"></i>
                    첫 번째 업체 등록하기
                </button>
            </div>
        </div>
    </div>

    <!-- 상세보기 모달 -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white border-b border-gray-200 p-6 flex items-center justify-between">
                <h2 class="text-2xl font-bold text-gray-800">
                    <i class="fas fa-building text-blue-600 mr-2"></i>
                    업체 상세 정보
                </h2>
                <button onclick="closeDetailModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>
            <div id="detailContent" class="p-6">
                <!-- 상세 정보가 여기에 표시됩니다 -->
            </div>
        </div>
    </div>

    <script>
        let allCompanies = [];

        // 페이지 로드 시 업체 목록 불러오기
        document.addEventListener('DOMContentLoaded', function() {
            loadCompanies();
        });

        // 업체 목록 불러오기
        async function loadCompanies() {
            try {
                console.log('📋 업체 목록 로딩 중...');
                const response = await axios.get('/api/companies');
                allCompanies = response.data;
                
                console.log('✅ 업체 목록 로드 완료:', allCompanies.length, '개');
                displayCompanies(allCompanies);
            } catch (error) {
                console.error('❌ 업체 목록 로드 실패:', error);
                document.getElementById('companiesList').innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-6 text-center">
                        <i class="fas fa-exclamation-circle text-red-500 text-3xl mb-3"></i>
                        <p class="text-red-700 font-semibold">업체 목록을 불러오는데 실패했습니다.</p>
                        <p class="text-red-600 text-sm mt-2">${error.message}</p>
                        <button onclick="loadCompanies()" 
                            class="mt-4 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">
                            다시 시도
                        </button>
                    </div>
                `;
            }
        }

        // 업체 목록 표시
        function displayCompanies(companies) {
            const listContainer = document.getElementById('companiesList');
            const emptyState = document.getElementById('emptyState');

            if (companies.length === 0) {
                listContainer.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            listContainer.classList.remove('hidden');
            emptyState.classList.add('hidden');

            listContainer.innerHTML = companies.map(company => `
                <div class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition">
                    <div class="flex items-start justify-between">
                        <div class="flex-1 cursor-pointer" onclick="showDetail(${company.id})">
                            <div class="flex items-center gap-3 mb-3">
                                <h3 class="text-xl font-bold text-gray-800">${company.company_name}</h3>
                                <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-semibold">
                                    <i class="fas fa-check-circle mr-1"></i>
                                    ${company.status === 'active' ? '활성' : '비활성'}
                                </span>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
                                <div class="flex items-center text-gray-600">
                                    <i class="fas fa-id-card mr-2 text-blue-600 w-4"></i>
                                    <span class="font-semibold mr-2">사업자번호:</span>
                                    <span>${company.company_code}</span>
                                </div>
                                <div class="flex items-center text-gray-600">
                                    <i class="fas fa-user mr-2 text-blue-600 w-4"></i>
                                    <span class="font-semibold mr-2">대표자:</span>
                                    <span>${company.representative}</span>
                                </div>
                                <div class="flex items-center text-gray-600">
                                    <i class="fas fa-phone mr-2 text-blue-600 w-4"></i>
                                    <span class="font-semibold mr-2">전화:</span>
                                    <span>${company.representative_phone}</span>
                                </div>
                            </div>

                            ${company.representative_address ? `
                                <div class="mt-3 flex items-start text-gray-600 text-sm">
                                    <i class="fas fa-map-marker-alt mr-2 text-blue-600 w-4 mt-1"></i>
                                    <span>${company.representative_address}${company.representative_detail_address ? ' ' + company.representative_detail_address : ''}</span>
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="flex items-center gap-2">
                            <button onclick="event.stopPropagation(); showDetail(${company.id})" 
                                class="text-blue-600 hover:text-blue-700 hover:bg-blue-50 p-2 rounded-lg transition" 
                                title="상세보기">
                                <i class="fas fa-eye text-xl"></i>
                            </button>
                            <button onclick="event.stopPropagation(); deleteCompany(${company.id}, '${company.company_name}')" 
                                class="text-red-600 hover:text-red-700 hover:bg-red-50 p-2 rounded-lg transition" 
                                title="삭제">
                                <i class="fas fa-trash-alt text-xl"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="mt-4 pt-4 border-t border-gray-200 flex items-center justify-between text-xs text-gray-500">
                        <span>
                            <i class="far fa-calendar mr-1"></i>
                            등록일: ${new Date(company.created_at).toLocaleDateString('ko-KR')}
                        </span>
                        ${company.id_card_photo ? `
                            <span class="text-green-600">
                                <i class="fas fa-id-card mr-1"></i>
                                신분증 등록됨
                            </span>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // 검색 기능
        function searchCompanies() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (searchTerm === '') {
                displayCompanies(allCompanies);
                return;
            }

            const filtered = allCompanies.filter(company => 
                company.company_name.toLowerCase().includes(searchTerm) ||
                company.company_code.includes(searchTerm) ||
                company.representative.toLowerCase().includes(searchTerm) ||
                (company.representative_phone && company.representative_phone.includes(searchTerm))
            );

            displayCompanies(filtered);
        }

        // 상세보기
        async function showDetail(id) {
            try {
                const response = await axios.get(`/api/companies/${id}`);
                const company = response.data;

                document.getElementById('detailContent').innerHTML = `
                    <div class="space-y-6">
                        <!-- 업체 기본 정보 -->
                        <div>
                            <h3 class="text-lg font-bold text-gray-800 mb-4 pb-2 border-b border-gray-200">
                                <i class="fas fa-briefcase text-blue-600 mr-2"></i>
                                업체 기본 정보
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-semibold text-gray-600 mb-1">업체명</label>
                                    <p class="text-gray-800">${company.company_name}</p>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-gray-600 mb-1">업체 코드</label>
                                    <p class="text-gray-800">${company.company_code}</p>
                                </div>
                            </div>
                        </div>

                        <!-- 대표자 정보 -->
                        <div>
                            <h3 class="text-lg font-bold text-gray-800 mb-4 pb-2 border-b border-gray-200">
                                <i class="fas fa-user text-blue-600 mr-2"></i>
                                대표자 정보
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-semibold text-gray-600 mb-1">대표자 이름</label>
                                    <p class="text-gray-800">${company.representative}</p>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-gray-600 mb-1">전화번호</label>
                                    <p class="text-gray-800">${company.representative_phone}</p>
                                </div>
                                ${company.representative_resident_number ? `
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-600 mb-1">주민등록번호</label>
                                        <p class="text-gray-800">${company.representative_resident_number}</p>
                                    </div>
                                ` : ''}
                            </div>
                        </div>

                        <!-- 대표자 주소 -->
                        ${company.representative_address ? `
                            <div>
                                <h3 class="text-lg font-bold text-gray-800 mb-4 pb-2 border-b border-gray-200">
                                    <i class="fas fa-map-marker-alt text-blue-600 mr-2"></i>
                                    대표자 주소
                                </h3>
                                <div class="space-y-2">
                                    ${company.representative_postcode ? `
                                        <p class="text-sm text-gray-600">우편번호: ${company.representative_postcode}</p>
                                    ` : ''}
                                    <p class="text-gray-800">${company.representative_address}</p>
                                    ${company.representative_detail_address ? `
                                        <p class="text-gray-600">${company.representative_detail_address}</p>
                                    ` : ''}
                                </div>
                            </div>
                        ` : ''}

                        <!-- 신분증 -->
                        ${company.id_card_photo ? `
                            <div>
                                <h3 class="text-lg font-bold text-gray-800 mb-4 pb-2 border-b border-gray-200">
                                    <i class="fas fa-id-card text-blue-600 mr-2"></i>
                                    대표자 신분증
                                </h3>
                                <img src="${company.id_card_photo}" alt="신분증" class="max-w-full rounded-lg shadow-md">
                            </div>
                        ` : ''}

                        <!-- 등록 정보 -->
                        <div>
                            <h3 class="text-lg font-bold text-gray-800 mb-4 pb-2 border-b border-gray-200">
                                <i class="fas fa-info-circle text-blue-600 mr-2"></i>
                                등록 정보
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                <div>
                                    <label class="block text-sm font-semibold text-gray-600 mb-1">등록일</label>
                                    <p class="text-gray-800">${new Date(company.created_at).toLocaleString('ko-KR')}</p>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-gray-600 mb-1">수정일</label>
                                    <p class="text-gray-800">${new Date(company.updated_at).toLocaleString('ko-KR')}</p>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-gray-600 mb-1">상태</label>
                                    <p class="text-gray-800">
                                        <span class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs">
                                            ${company.status === 'active' ? '활성' : '비활성'}
                                        </span>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                document.getElementById('detailModal').classList.remove('hidden');
            } catch (error) {
                console.error('❌ 업체 상세 정보 로드 실패:', error);
                alert('업체 정보를 불러오는데 실패했습니다.');
            }
        }

        // 모달 닫기
        function closeDetailModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        // 모달 외부 클릭시 닫기
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDetailModal();
            }
        });

        // 업체 삭제
        async function deleteCompany(id, companyName) {
            if (!confirm(`정말 "${companyName}" 업체를 삭제하시겠습니까?\n\n삭제된 업체 정보는 복구할 수 없습니다.`)) {
                return;
            }

            try {
                console.log('🗑️ 업체 삭제 요청:', id, companyName);
                const response = await axios.delete(`/api/companies/${id}`);
                
                console.log('✅ 업체 삭제 완료:', response.data);
                alert(`"${response.data.company_name}" 업체가 성공적으로 삭제되었습니다.`);
                
                // 목록 새로고침
                await loadCompanies();
            } catch (error) {
                console.error('❌ 업체 삭제 실패:', error);
                
                let errorMessage = '업체 삭제 중 오류가 발생했습니다.';
                if (error.response) {
                    errorMessage = error.response.data.error || errorMessage;
                } else if (error.request) {
                    errorMessage = '서버와 통신할 수 없습니다. 네트워크 연결을 확인해주세요.';
                }
                
                alert(errorMessage);
            }
        }
    </script>
</body>
</html>
