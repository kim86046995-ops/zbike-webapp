<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=0.25, user-scalable=yes">
    <title>아이디 / 비밀번호 찾기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <!-- 로고 -->
        <div class="text-center mb-8">
            <div class="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-key text-blue-600 text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">계정 찾기</h1>
            <p class="text-gray-600">아이디 또는 비밀번호를 찾으실 수 있습니다</p>
        </div>

        <!-- 탭 -->
        <div class="flex border-b mb-6">
            <button 
                id="findIdTab" 
                onclick="showTab('findId')" 
                class="flex-1 py-3 text-center font-bold border-b-2 border-blue-600 text-blue-600"
            >
                아이디 찾기
            </button>
            <button 
                id="findPasswordTab" 
                onclick="showTab('findPassword')" 
                class="flex-1 py-3 text-center font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-700"
            >
                비밀번호 찾기
            </button>
        </div>

        <!-- 아이디 찾기 -->
        <div id="findIdSection">
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-4">
                <p class="text-xs text-blue-700">
                    <i class="fas fa-info-circle mr-1"></i>
                    가입 시 등록한 이름과 전화번호를 정확히 입력해주세요.
                </p>
            </div>
            <form id="findIdForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">
                        <i class="fas fa-user mr-2"></i>이름
                    </label>
                    <input 
                        type="text" 
                        id="findIdName" 
                        required 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                        placeholder="이름을 입력하세요"
                    >
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">
                        <i class="fas fa-phone mr-2"></i>전화번호
                    </label>
                    <input 
                        type="tel" 
                        id="findIdPhone" 
                        required 
                        maxlength="13"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                        placeholder="010-0000-0000"
                        oninput="autoHyphenPhone(this)"
                    >
                </div>

                <button 
                    type="submit" 
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition"
                >
                    <i class="fas fa-search mr-2"></i>아이디 찾기
                </button>
            </form>

            <div id="findIdResult" class="hidden mt-6 p-4 bg-green-50 border border-green-200 rounded-lg">
                <p class="text-sm text-gray-600 mb-2">회원님의 아이디는:</p>
                <p class="text-2xl font-bold text-green-700 cursor-pointer hover:text-green-800 hover:underline" 
                   id="foundUsername" 
                   onclick="goToLoginWithUsername()"
                   title="클릭하면 로그인 페이지로 이동합니다"></p>
                <p class="text-xs text-gray-500 mt-2">가입일: <span id="foundCreatedAt"></span></p>
                <button 
                    onclick="goToLoginWithUsername()" 
                    class="mt-4 w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition"
                >
                    <i class="fas fa-sign-in-alt mr-2"></i>이 아이디로 로그인하기
                </button>
                <p class="text-xs text-center text-gray-500 mt-2">
                    <i class="fas fa-info-circle mr-1"></i>아이디를 클릭해도 로그인 페이지로 이동합니다
                </p>
            </div>
        </div>

        <!-- 비밀번호 찾기 -->
        <div id="findPasswordSection" class="hidden">
            <!-- 1단계: 본인 확인 -->
            <div id="verifyStep">
                <form id="verifyForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            <i class="fas fa-id-card mr-2"></i>아이디
                        </label>
                        <input 
                            type="text" 
                            id="verifyUsername" 
                            required 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                            placeholder="아이디를 입력하세요"
                        >
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            <i class="fas fa-user mr-2"></i>이름
                        </label>
                        <input 
                            type="text" 
                            id="verifyName" 
                            required 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                            placeholder="이름을 입력하세요"
                        >
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            <i class="fas fa-phone mr-2"></i>전화번호
                        </label>
                        <input 
                            type="tel" 
                            id="verifyPhone" 
                            required 
                            maxlength="13"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                            placeholder="010-0000-0000"
                            oninput="autoHyphenPhone(this)"
                        >
                    </div>

                    <button 
                        type="submit" 
                        class="w-full bg-purple-600 text-white py-3 rounded-lg font-bold hover:bg-purple-700 transition"
                    >
                        <i class="fas fa-check mr-2"></i>본인 확인
                    </button>
                </form>
            </div>

            <!-- 2단계: 인증번호 입력 및 비밀번호 재설정 -->
            <div id="resetStep" class="hidden">
                <!-- 이메일 발송 성공 메시지 -->
                <div id="emailSentMessage" class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4 hidden">
                    <p class="text-sm text-blue-700 font-bold">
                        <i class="fas fa-envelope mr-2"></i>이메일 발송 완료
                    </p>
                    <p class="text-xs text-gray-600 mt-1">
                        <span id="maskedEmail" class="font-bold"></span>으로 인증번호가 발송되었습니다.
                    </p>
                    <p class="text-xs text-gray-600 mt-1">
                        📧 이메일을 확인하고 인증번호를 입력해주세요.
                    </p>
                    <p class="text-xs text-orange-600 mt-2">
                        ⏰ <strong>유효시간: 30분</strong>
                    </p>
                </div>
                
                <!-- 개발 모드: 인증번호 직접 표시 -->
                <div id="tokenDisplayMessage" class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-4 hidden">
                    <p class="text-sm text-yellow-700 font-bold">
                        <i class="fas fa-exclamation-triangle mr-2"></i>개발 모드
                    </p>
                    <p class="text-xs text-gray-600 mt-1">인증번호: <span id="displayToken" class="font-mono font-bold text-xl text-purple-600"></span></p>
                    <p class="text-xs text-red-600 mt-1">※ 이메일 설정 후에는 이 메시지가 표시되지 않습니다</p>
                </div>

                <form id="resetForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            <i class="fas fa-lock mr-2"></i>인증번호 (6자리)
                        </label>
                        <input 
                            type="text" 
                            id="resetToken" 
                            required 
                            maxlength="6"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 font-mono text-lg text-center tracking-widest"
                            placeholder="000000"
                        >
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            <i class="fas fa-key mr-2"></i>새 비밀번호
                        </label>
                        <input 
                            type="password" 
                            id="newPassword" 
                            required 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
                            placeholder="새 비밀번호"
                        >
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            <i class="fas fa-key mr-2"></i>비밀번호 확인
                        </label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            required 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
                            placeholder="비밀번호 확인"
                        >
                    </div>

                    <button 
                        type="submit" 
                        class="w-full bg-purple-600 text-white py-3 rounded-lg font-bold hover:bg-purple-700 transition"
                    >
                        <i class="fas fa-sync-alt mr-2"></i>비밀번호 재설정
                    </button>

                    <button 
                        type="button" 
                        onclick="resetPasswordProcess()"
                        class="w-full bg-gray-300 text-gray-700 py-2 rounded-lg font-bold hover:bg-gray-400 transition"
                    >
                        처음으로
                    </button>
                </form>
            </div>
        </div>

        <!-- 에러 메시지 -->
        <div id="errorMessage" class="hidden mt-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
            <i class="fas fa-exclamation-circle mr-2"></i>
            <span id="errorText"></span>
        </div>

        <!-- 로그인 페이지로 돌아가기 -->
        <div class="mt-6 text-center">
            <a href="/login" class="text-blue-600 hover:text-blue-800 text-sm font-semibold">
                <i class="fas fa-arrow-left mr-2"></i>로그인 페이지로 돌아가기
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        let currentToken = '';
        let foundUsernameValue = ''; // 찾은 아이디 저장

        // 로그인 페이지로 이동하면서 아이디 전달
        function goToLoginWithUsername() {
            if (foundUsernameValue) {
                // localStorage에 저장
                localStorage.setItem('tempUsername', foundUsernameValue);
                // 로그인 페이지로 이동
                window.location.href = '/static/login.html';
            }
        }

        // 전화번호 자동 하이픈
        function autoHyphenPhone(target) {
            // 숫자만 추출
            let value = target.value.replace(/[^0-9]/g, '');
            let result = '';
            
            // 하이픈 자동 삽입
            if (value.length < 4) {
                result = value;
            } else if (value.length < 7) {
                result = value.substr(0, 3) + '-' + value.substr(3);
            } else if (value.length < 11) {
                result = value.substr(0, 3) + '-' + value.substr(3, 3) + '-' + value.substr(6);
            } else {
                result = value.substr(0, 3) + '-' + value.substr(3, 4) + '-' + value.substr(7, 4);
            }
            
            target.value = result;
        }

        function showTab(tab) {
            const findIdTab = document.getElementById('findIdTab');
            const findPasswordTab = document.getElementById('findPasswordTab');
            const findIdSection = document.getElementById('findIdSection');
            const findPasswordSection = document.getElementById('findPasswordSection');
            const errorMessage = document.getElementById('errorMessage');

            errorMessage.classList.add('hidden');

            if (tab === 'findId') {
                findIdTab.classList.add('border-blue-600', 'text-blue-600');
                findIdTab.classList.remove('border-transparent', 'text-gray-500');
                findPasswordTab.classList.remove('border-purple-600', 'text-purple-600');
                findPasswordTab.classList.add('border-transparent', 'text-gray-500');
                findIdSection.classList.remove('hidden');
                findPasswordSection.classList.add('hidden');
            } else {
                findPasswordTab.classList.add('border-purple-600', 'text-purple-600');
                findPasswordTab.classList.remove('border-transparent', 'text-gray-500');
                findIdTab.classList.remove('border-blue-600', 'text-blue-600');
                findIdTab.classList.add('border-transparent', 'text-gray-500');
                findPasswordSection.classList.remove('hidden');
                findIdSection.classList.add('hidden');
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.innerHTML = message.replace(/\n/g, '<br>');
            errorDiv.classList.remove('hidden');
            
            // 5초 후 자동으로 숨기기
            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 10000);
        }

        function resetPasswordProcess() {
            document.getElementById('verifyStep').classList.remove('hidden');
            document.getElementById('resetStep').classList.add('hidden');
            document.getElementById('verifyForm').reset();
            currentToken = '';
        }

        // 아이디 찾기
        document.getElementById('findIdForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('findIdName').value.trim();
            const phone = document.getElementById('findIdPhone').value.trim();

            console.log('🔍 아이디 찾기 시도:', { name, phone });

            try {
                const response = await axios.post('/api/auth/find-username', {
                    name,
                    phone
                });

                console.log('✅ 응답 성공:', response.data);

                if (response.data.success) {
                    foundUsernameValue = response.data.username; // 아이디 저장
                    document.getElementById('foundUsername').textContent = response.data.username;
                    document.getElementById('foundCreatedAt').textContent = 
                        new Date(response.data.created_at).toLocaleDateString('ko-KR');
                    document.getElementById('findIdResult').classList.remove('hidden');
                    document.getElementById('errorMessage').classList.add('hidden');
                }
            } catch (error) {
                console.error('❌ Find ID error:', error);
                console.error('❌ Error response:', error.response?.data);
                console.error('❌ 입력값:', { name, phone });
                
                let errorMsg = error.response?.data?.error || '아이디를 찾을 수 없습니다';
                errorMsg += '\n\n입력하신 정보:\n이름: ' + name + '\n전화번호: ' + phone;
                
                showError(errorMsg);
                document.getElementById('findIdResult').classList.add('hidden');
            }
        });

        // 본인 확인
        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('verifyUsername').value.trim();
            const name = document.getElementById('verifyName').value.trim();
            const phone = document.getElementById('verifyPhone').value.trim();

            console.log('🔐 본인 확인 시도:', { username, name, phone });

            try {
                const response = await axios.post('/api/auth/request-reset', {
                    username,
                    name,
                    phone
                });

                console.log('✅ 본인 확인 응답:', response.data);

                if (response.data.success) {
                    // 화면 전환
                    document.getElementById('verifyStep').classList.add('hidden');
                    document.getElementById('resetStep').classList.remove('hidden');
                    document.getElementById('errorMessage').classList.add('hidden');
                    
                    // 이메일 발송 성공 여부에 따라 다른 메시지 표시
                    if (response.data.email && !response.data.token) {
                        // 이메일 발송 성공
                        document.getElementById('emailSentMessage').classList.remove('hidden');
                        document.getElementById('tokenDisplayMessage').classList.add('hidden');
                        document.getElementById('maskedEmail').textContent = response.data.email;
                        
                        console.log('📧 이메일 발송 완료:', response.data.email);
                    } else if (response.data.token) {
                        // 개발 모드: 토큰 직접 표시
                        currentToken = response.data.token;
                        document.getElementById('displayToken').textContent = currentToken;
                        document.getElementById('tokenDisplayMessage').classList.remove('hidden');
                        document.getElementById('emailSentMessage').classList.add('hidden');
                        
                        console.log('⚠️ 개발 모드: 토큰 직접 표시');
                    }
                    
                    // 인증번호 입력란에 포커스
                    document.getElementById('resetToken').focus();
                }
            } catch (error) {
                console.error('❌ Verify error:', error);
                console.error('❌ Error response:', error.response?.data);
                showError(error.response?.data?.error || '본인 확인에 실패했습니다');
            }
        });

        // 비밀번호 재설정
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const token = document.getElementById('resetToken').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showError('비밀번호가 일치하지 않습니다');
                return;
            }

            if (newPassword.length < 6) {
                showError('비밀번호는 6자 이상이어야 합니다');
                return;
            }

            try {
                const response = await axios.post('/api/auth/reset-password', {
                    token,
                    new_password: newPassword
                });

                if (response.data.success) {
                    alert('비밀번호가 재설정되었습니다!\n로그인 페이지로 이동합니다.');
                    window.location.href = '/static/login.html';
                }
            } catch (error) {
                console.error('Reset error:', error);
                showError(error.response?.data?.error || '비밀번호 재설정에 실패했습니다');
            }
        });
    </script>
</body>
</html>
