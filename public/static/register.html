<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 회원가입 - Z-BIKE 전자계약서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- 로고 및 제목 -->
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-white rounded-full shadow-lg mb-4">
                <i class="fas fa-user-plus text-4xl text-emerald-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">관리자 회원가입</h1>
            <p class="text-gray-600">Z-BIKE 전자계약서</p>
        </div>

        <!-- 허가번호 확인 모달 -->
        <div id="authCodeModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4">
                <div class="text-center mb-6">
                    <div class="inline-block p-4 bg-emerald-100 rounded-full mb-4">
                        <i class="fas fa-key text-4xl text-emerald-600"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">허가번호 입력</h2>
                    <p class="text-gray-600">관리자 회원가입을 위해 허가번호를 입력하세요</p>
                </div>

                <form id="authCodeForm" class="space-y-5">
                    <div>
                        <label for="authCode" class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-lock mr-2 text-emerald-600"></i>허가번호 *
                        </label>
                        <input 
                            type="text" 
                            id="authCode" 
                            name="authCode"
                            required
                            maxlength="4"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition text-center text-2xl font-bold tracking-widest"
                            placeholder="****"
                            autocomplete="off"
                        >
                    </div>

                    <div id="authCodeError" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
                        <i class="fas fa-exclamation-circle mr-2"></i>
                        <span id="authCodeErrorText"></span>
                    </div>

                    <button 
                        type="submit"
                        class="w-full bg-emerald-600 text-white py-3 rounded-lg hover:bg-emerald-700 transition font-semibold shadow-lg hover:shadow-xl"
                    >
                        <i class="fas fa-check mr-2"></i>확인
                    </button>

                    <button 
                        type="button"
                        onclick="window.location.href='/login'"
                        class="w-full bg-gray-200 text-gray-700 py-3 rounded-lg hover:bg-gray-300 transition font-semibold"
                    >
                        <i class="fas fa-times mr-2"></i>취소
                    </button>
                </form>
            </div>
        </div>

        <!-- 회원가입 폼 -->
        <div id="registerFormContainer" class="bg-white rounded-2xl shadow-xl p-8" style="display: none;">
            <form id="registerForm" class="space-y-5">
                <!-- 아이디 입력 -->
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-user mr-2 text-emerald-600"></i>아이디 *
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username"
                        required
                        minlength="4"
                        maxlength="20"
                        pattern="[a-zA-Z0-9]+"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition"
                        placeholder="4-20자의 영문, 숫자"
                        autocomplete="username"
                    >
                    <p class="text-xs text-gray-500 mt-1">영문, 숫자만 사용 가능 (4-20자)</p>
                </div>

                <!-- 이름 입력 -->
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-id-badge mr-2 text-emerald-600"></i>이름 *
                    </label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition"
                        placeholder="실명을 입력하세요"
                    >
                </div>

                <!-- 이메일 입력 -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-envelope mr-2 text-emerald-600"></i>이메일
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition"
                        placeholder="example@email.com"
                        autocomplete="email"
                    >
                </div>

                <!-- 전화번호 입력 -->
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-phone mr-2 text-emerald-600"></i>전화번호
                    </label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition"
                        placeholder="010-0000-0000"
                        autocomplete="tel"
                    >
                </div>

                <!-- 비밀번호 입력 -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-lock mr-2 text-emerald-600"></i>비밀번호 *
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            required
                            minlength="4"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition pr-12"
                            placeholder="4자 이상"
                            autocomplete="new-password"
                        >
                        <button 
                            type="button" 
                            onclick="togglePassword('password')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
                        >
                            <i id="passwordIcon" class="fas fa-eye"></i>
                        </button>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">최소 4자 이상</p>
                </div>

                <!-- 비밀번호 확인 -->
                <div>
                    <label for="passwordConfirm" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-lock mr-2 text-emerald-600"></i>비밀번호 확인 *
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="passwordConfirm" 
                            name="passwordConfirm"
                            required
                            minlength="4"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition pr-12"
                            placeholder="비밀번호 재입력"
                            autocomplete="new-password"
                        >
                        <button 
                            type="button" 
                            onclick="togglePassword('passwordConfirm')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
                        >
                            <i id="passwordConfirmIcon" class="fas fa-eye"></i>
                        </button>
                    </div>
                    <p id="passwordMatch" class="text-xs mt-1 hidden"></p>
                </div>

                <!-- 회원가입 버튼 -->
                <button 
                    type="submit"
                    class="w-full bg-emerald-600 text-white py-3 rounded-lg hover:bg-emerald-700 transition font-semibold shadow-lg hover:shadow-xl transform hover:-translate-y-0.5"
                >
                    <i class="fas fa-user-check mr-2"></i>회원가입
                </button>
            </form>

            <!-- 성공/에러 메시지 -->
            <div id="successMessage" class="mt-4 hidden">
                <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg flex items-center">
                    <i class="fas fa-check-circle mr-2"></i>
                    <span>회원가입이 완료되었습니다! 로그인 페이지로 이동합니다...</span>
                </div>
            </div>

            <div id="errorMessage" class="mt-4 hidden">
                <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-center">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    <span id="errorText"></span>
                </div>
            </div>

            <!-- 로그인 링크 -->
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    이미 계정이 있으신가요?
                    <a href="/login" class="text-emerald-600 hover:text-emerald-800 font-semibold transition ml-1">
                        로그인하기
                    </a>
                </p>
            </div>
        </div>

        <!-- 하단 링크 -->
        <div class="mt-6 text-center">
            <a href="/" class="text-sm text-gray-600 hover:text-gray-800 transition">
                <i class="fas fa-arrow-left mr-1"></i>메인 페이지로 돌아가기
            </a>
        </div>
    </div>

    <script>
        const CORRECT_AUTH_CODE = '6991'; // 허가번호
        
        // 이미 로그인되어 있으면 대시보드로 리다이렉트
        window.addEventListener('DOMContentLoaded', () => {
            const sessionId = localStorage.getItem('sessionId');
            if (sessionId) {
                window.location.href = '/dashboard';
            }
        });
        
        // 허가번호 확인 폼 제출
        document.getElementById('authCodeForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const authCode = document.getElementById('authCode').value.trim();
            const errorDiv = document.getElementById('authCodeError');
            const errorText = document.getElementById('authCodeErrorText');
            
            if (authCode === CORRECT_AUTH_CODE) {
                // 허가번호 일치 - 회원가입 폼 표시
                document.getElementById('authCodeModal').style.display = 'none';
                document.getElementById('registerFormContainer').style.display = 'block';
            } else {
                // 허가번호 불일치
                errorDiv.classList.remove('hidden');
                errorText.textContent = '허가번호가 올바르지 않습니다.';
                document.getElementById('authCode').value = '';
                document.getElementById('authCode').focus();
            }
        });
        
        // 비밀번호 표시/숨김 토글
        function togglePassword(fieldId) {
            const passwordInput = document.getElementById(fieldId);
            const passwordIcon = document.getElementById(fieldId + 'Icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.classList.remove('fa-eye');
                passwordIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                passwordIcon.classList.remove('fa-eye-slash');
                passwordIcon.classList.add('fa-eye');
            }
        }

        // 비밀번호 일치 확인
        document.getElementById('passwordConfirm').addEventListener('input', () => {
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            const matchText = document.getElementById('passwordMatch');
            
            if (passwordConfirm.length > 0) {
                matchText.classList.remove('hidden');
                if (password === passwordConfirm) {
                    matchText.textContent = '✓ 비밀번호가 일치합니다';
                    matchText.classList.remove('text-red-600');
                    matchText.classList.add('text-green-600');
                } else {
                    matchText.textContent = '✗ 비밀번호가 일치하지 않습니다';
                    matchText.classList.remove('text-green-600');
                    matchText.classList.add('text-red-600');
                }
            } else {
                matchText.classList.add('hidden');
            }
        });

        // 회원가입 폼 제출
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            
            // 비밀번호 확인
            if (password !== passwordConfirm) {
                showError('비밀번호가 일치하지 않습니다.');
                return;
            }
            
            // 비밀번호 길이 확인
            if (password.length < 4) {
                showError('비밀번호는 최소 4자 이상이어야 합니다.');
                return;
            }
            
            try {
                const response = await axios.post('/api/auth/register', {
                    username,
                    name,
                    email,
                    phone: document.getElementById('phone').value,
                    email,
                    password
                });
                
                if (response.data.success) {
                    showSuccess();
                    // 3초 후 로그인 페이지로 이동
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                }
            } catch (error) {
                if (error.response && error.response.data) {
                    showError(error.response.data.error || '회원가입에 실패했습니다.');
                } else {
                    showError('서버 오류가 발생했습니다. 다시 시도해주세요.');
                }
            }
        });

        // 성공 메시지 표시
        function showSuccess() {
            document.getElementById('errorMessage').classList.add('hidden');
            document.getElementById('successMessage').classList.remove('hidden');
        }

        // 에러 메시지 표시
        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
            
            // 5초 후 에러 메시지 숨김
            setTimeout(() => {
                errorMessage.classList.add('hidden');
            }, 5000);
        }
    </script>
</body>
</html>
