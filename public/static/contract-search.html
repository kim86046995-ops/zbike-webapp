<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-BIKE 전자계약서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-purple-500 to-pink-600 min-h-screen p-4">
    <div class="max-w-4xl mx-auto py-8">
        <!-- 헤더 -->
        <div class="text-center mb-8">
            <div class="bg-white w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4 shadow-xl">
                <i class="fas fa-search text-purple-600 text-5xl"></i>
            </div>
            <h1 class="text-4xl font-bold text-white mb-2">본인 계약서 확인</h1>
            <p class="text-white text-lg">주민등록번호로 계약서를 조회할 수 있습니다</p>
        </div>

        <!-- 검색 카드 -->
        <div id="searchCard" class="bg-white rounded-2xl shadow-2xl p-8 mb-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">
                <i class="fas fa-id-card text-purple-600 mr-2"></i>본인 확인
            </h2>

            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-2">
                    <i class="fas fa-id-card mr-1 text-purple-500"></i>주민등록번호 <span class="text-red-500">*</span>
                    <span class="text-xs text-gray-500 font-normal ml-2">(숫자 13자리, 하이픈 자동 입력)</span>
                </label>
                <input 
                    type="text" 
                    id="residentNumber" 
                    placeholder="예: 900101-1234567" 
                    maxlength="14"
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 text-lg"
                >
            </div>

            <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                <div class="flex">
                    <i class="fas fa-info-circle text-blue-500 text-xl mr-3 mt-1"></i>
                    <div>
                        <p class="text-sm text-gray-700">
                            <strong>개인정보 보호 안내</strong><br>
                            입력하신 주민등록번호는 본인 확인 용도로만 사용되며, 안전하게 보호됩니다.
                        </p>
                    </div>
                </div>
            </div>

            <button 
                onclick="searchContract()"
                class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-4 rounded-xl font-bold text-lg hover:from-purple-700 hover:to-pink-700 transition transform hover:scale-105 active:scale-95 shadow-lg"
            >
                <i class="fas fa-search mr-2"></i>계약서 조회하기
            </button>
        </div>

        <!-- 결과 카드 (초기 숨김) -->
        <div id="resultCard" class="hidden">
            <!-- 계약서 목록 -->
            <div id="contractList" class="space-y-4"></div>
        </div>

        <!-- 돌아가기 버튼 -->
        <div class="text-center">
            <a href="/static/customer-portal.html" class="inline-block bg-white text-purple-600 px-6 py-3 rounded-lg hover:bg-gray-100 transition font-semibold">
                <i class="fas fa-arrow-left mr-2"></i>돌아가기
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        // 주민등록번호 자동 하이픈
        const residentInput = document.getElementById('residentNumber');
        residentInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/[^0-9]/g, '');
            if (value.length > 6) {
                value = value.substring(0, 6) + '-' + value.substring(6, 13);
            }
            e.target.value = value;
        });

        // 엔터키로 검색
        residentInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchContract();
            }
        });

        async function searchContract() {
            const residentNumber = document.getElementById('residentNumber').value.trim();
            
            // 유효성 검사
            if (!residentNumber) {
                alert('주민등록번호를 입력해주세요.');
                return;
            }

            const cleaned = residentNumber.replace(/[^0-9]/g, '');
            if (cleaned.length !== 13) {
                alert('올바른 주민등록번호를 입력해주세요. (13자리)');
                return;
            }

            try {
                // 개인 계약 조회
                const personalResponse = await axios.get('/api/contracts', {
                    params: { resident_number: residentNumber }
                });
                
                // 임시렌트 계약 조회
                const tempResponse = await axios.get('/api/temp-rent-contracts', {
                    params: { resident_number: residentNumber }
                });

                // 업체 계약(차용증) 조회
                const businessResponse = await axios.get('/api/business-contracts', {
                    params: { resident_number: residentNumber }
                });

                // 차용증 조회 (추가!)
                const loanResponse = await axios.get('/api/loan-contracts', {
                    params: { resident_number: residentNumber }
                });

                const personalContracts = personalResponse.data || [];
                const tempContracts = tempResponse.data || [];
                const businessContracts = businessResponse.data || [];
                const loanContracts = loanResponse.data || [];
                const allContracts = [...personalContracts, ...tempContracts, ...businessContracts, ...loanContracts];

                if (allContracts.length === 0) {
                    alert('⚠️ 해당번호로는 계약내용 확인이 안됩니다.\n\n입력하신 주민등록번호로 등록된 계약이 없습니다.');
                    return;
                }

                // 최신순으로 정렬 (created_at 기준 내림차순)
                allContracts.sort((a, b) => {
                    const dateA = new Date(a.created_at || a.start_date);
                    const dateB = new Date(b.created_at || b.start_date);
                    return dateB - dateA; // 최신순
                });

                // 결과 표시
                displayContracts(allContracts);
                
            } catch (error) {
                console.error('Error searching contracts:', error);
                alert('❌ 계약서 조회 중 오류가 발생했습니다.\n\n' + (error.response?.data?.error || error.message));
            }
        }

        function displayContracts(contracts) {
            const resultCard = document.getElementById('resultCard');
            const contractList = document.getElementById('contractList');
            
            contractList.innerHTML = contracts.map(contract => {
                const isTemp = contract.contract_type === 'temp_rent';
                const isBusiness = contract.contract_type === 'business';
                const isLoan = !!contract.loan_number; // 차용증 여부 확인
                const statusColor = contract.status === 'active' ? 'green' : contract.status === 'completed' ? 'blue' : 'gray';
                const statusText = contract.status === 'active' ? '진행중' : contract.status === 'completed' ? '완료' : '취소';
                
                // 계약 타입 배지 색상 및 텍스트
                let typeBadgeColor = 'blue';
                let typeText = '리스';
                if (isLoan) {
                    typeBadgeColor = 'red';
                    typeText = '차용증';
                } else if (isTemp) {
                    typeBadgeColor = 'orange';
                    typeText = '임시렌트';
                } else if (isBusiness) {
                    typeBadgeColor = 'purple';
                    typeText = '업체리스/렌트';
                } else if (contract.contract_type === 'rent') {
                    typeText = '렌트';
                }
                
                // 계약번호 또는 차용증번호
                const contractNumber = isLoan ? contract.loan_number : contract.contract_number;
                
                return `
                    <div class="bg-white rounded-2xl shadow-xl p-6 border-l-4 border-${statusColor}-500">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="bg-${typeBadgeColor}-100 text-${typeBadgeColor}-800 px-3 py-1 rounded-full text-xs font-bold">
                                        ${typeText}
                                    </span>
                                    <span class="bg-${statusColor}-100 text-${statusColor}-800 px-3 py-1 rounded-full text-xs font-bold">
                                        ${statusText}
                                    </span>
                                </div>
                                <h3 class="text-xl font-bold text-gray-800">${isLoan ? '차용증번호' : '계약번호'}: ${contractNumber}</h3>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            ${isLoan ? `
                                <div>
                                    <p class="text-sm text-gray-500 mb-1"><i class="fas fa-user mr-2"></i>차용인</p>
                                    <p class="font-semibold text-gray-800">${contract.borrower_name || '-'}</p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500 mb-1"><i class="fas fa-phone mr-2"></i>연락처</p>
                                    <p class="font-semibold text-gray-800">${contract.borrower_phone || '-'}</p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500 mb-1"><i class="fas fa-won-sign mr-2"></i>차용금액</p>
                                    <p class="font-semibold text-orange-600">${Number(contract.loan_amount || 0).toLocaleString()}원</p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500 mb-1"><i class="fas fa-calendar mr-2"></i>차용일</p>
                                    <p class="font-semibold text-gray-800">${contract.loan_date || '-'}</p>
                                </div>
                            ` : isBusiness ? `
                                <div>
                                    <p class="text-sm text-gray-500 mb-1"><i class="fas fa-building mr-2"></i>업체명</p>
                                    <p class="font-semibold text-gray-800">${contract.company_name || '-'}</p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500 mb-1"><i class="fas fa-user mr-2"></i>대표자</p>
                                    <p class="font-semibold text-gray-800">${contract.representative || '-'}</p>
                                </div>
                            ` : `
                                <div>
                                    <p class="text-sm text-gray-500 mb-1"><i class="fas fa-user mr-2"></i>고객명</p>
                                    <p class="font-semibold text-gray-800">${contract.customer_name}</p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500 mb-1"><i class="fas fa-phone mr-2"></i>연락처</p>
                                    <p class="font-semibold text-gray-800">${contract.customer_phone || contract.phone || '-'}</p>
                                </div>
                            `}
                            ${!isLoan ? `
                            <div>
                                <p class="text-sm text-gray-500 mb-1"><i class="fas fa-motorcycle mr-2"></i>차량번호</p>
                                <p class="font-semibold text-gray-800">${contract.plate_number || '-'}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500 mb-1"><i class="fas fa-car mr-2"></i>차량명</p>
                                <p class="font-semibold text-gray-800">${contract.vehicle_name || '-'}</p>
                            </div>
                            ` : ''}
                        </div>

                        ${!isLoan ? `
                        <div class="bg-gray-50 p-4 rounded-lg mb-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                <div>
                                    <p class="text-sm text-gray-500 mb-1"><i class="fas fa-calendar-alt mr-2"></i>계약 기간</p>
                                    <p class="font-semibold text-gray-800">${contract.start_date || contract.contract_start_date} ~ ${contract.end_date || contract.contract_end_date}</p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500 mb-1"><i class="fas fa-won-sign mr-2"></i>${isBusiness ? '일 대여료' : isTemp ? '일 대여료' : '월 대여료'}</p>
                                    <p class="font-semibold text-gray-800">
                                        ${isBusiness 
                                            ? Number(contract.daily_amount || 0).toLocaleString() + '원 (일)'
                                            : isTemp 
                                                ? Number(contract.daily_fee || 0).toLocaleString() + '원 (일)' 
                                                : Number(contract.monthly_fee || 0).toLocaleString() + '원 (월)'}
                                    </p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500 mb-1"><i class="fas fa-piggy-bank mr-2"></i>선납금</p>
                                    <p class="font-semibold text-gray-800">${Number(contract.deposit || 0).toLocaleString()}원</p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500 mb-1"><i class="fas fa-calendar-check mr-2"></i>등록일</p>
                                    <p class="font-semibold text-gray-800">${contract.created_at ? new Date(contract.created_at).toLocaleDateString() : '-'}</p>
                                </div>
                            </div>
                        </div>
                        ` : ''}

                        ${isBusiness && contract.company_code ? `
                            <div class="bg-purple-50 border-l-4 border-purple-500 p-3 rounded mb-4">
                                <p class="text-sm text-gray-500 mb-1"><i class="fas fa-id-card mr-2"></i>사업자등록번호</p>
                                <p class="text-sm font-semibold text-gray-700">${contract.company_code}</p>
                            </div>
                        ` : ''}

                        ${contract.special_terms ? `
                            <div class="bg-yellow-50 border-l-4 border-yellow-500 p-3 rounded">
                                <p class="text-sm text-gray-500 mb-1"><i class="fas fa-clipboard-list mr-2"></i>특약사항</p>
                                <p class="text-sm text-gray-700 whitespace-pre-wrap">${contract.special_terms}</p>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');

            // 결과 카드 표시
            resultCard.classList.remove('hidden');
            
            // 결과로 스크롤
            resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
</body>
</html>
