<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계약서 작성</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen pb-20">
        <!-- 헤더 -->
        <header class="bg-green-600 text-white shadow-lg">
            <div class="container mx-auto px-4 py-4">
                <a href="/" class="text-xl font-bold">
                    <i class="fas fa-arrow-left mr-2"></i>
                    계약서 작성
                </a>
            </div>
        </header>

        <!-- 메인 컨텐츠 -->
        <main class="container mx-auto px-4 py-8 max-w-4xl">
            <form id="contractForm" class="space-y-6">
                <!-- 1. 계약 타입 선택 -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-xl font-bold mb-4">
                        <i class="fas fa-file-contract mr-2 text-green-600"></i>
                        1. 계약 타입
                    </h2>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer">
                            <input type="radio" name="contract_type" value="lease" required class="peer hidden">
                            <div class="border-2 border-gray-300 rounded-lg p-6 text-center peer-checked:border-green-600 peer-checked:bg-green-50 hover:border-green-400 transition">
                                <i class="fas fa-calendar-alt text-3xl text-green-600 mb-2"></i>
                                <p class="font-bold text-lg">리스</p>
                                <p class="text-sm text-gray-600 mt-2">장기 렌탈 계약</p>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="contract_type" value="rent" required class="peer hidden">
                            <div class="border-2 border-gray-300 rounded-lg p-6 text-center peer-checked:border-green-600 peer-checked:bg-green-50 hover:border-green-400 transition">
                                <i class="fas fa-clock text-3xl text-green-600 mb-2"></i>
                                <p class="font-bold text-lg">렌트</p>
                                <p class="text-sm text-gray-600 mt-2">단기 대여 계약</p>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- 2. 오토바이 선택 -->
<div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-xl font-bold mb-4">
                        <i class="fas fa-motorcycle mr-2 text-green-600"></i>
                        2. 오토바이 선택
                    </h2>
                    <div>
                        <button type="button" onclick="showMotorcycleModal()" class="w-full bg-green-600 text-white px-6 py-4 rounded-lg hover:bg-green-700 font-bold text-lg transition-colors">
                            <i class="fas fa-list mr-2"></i>
                            <span id="selectedMotorcycleText">오토바이 선택하기 (클릭)</span>
                        </button>
                        <input type="hidden" id="selectedMotorcycleId">
                        <div id="selectedMotorcycleInfo" class="mt-4 hidden">
                            <div class="bg-green-50 border-2 border-green-200 rounded-lg p-4">
                                <div class="flex items-center justify-between">
                                    <div>
                                        <p class="text-sm text-gray-600 mb-1">선택된 오토바이</p>
                                        <p class="text-xl font-bold text-green-800" id="selectedMotorcycleName"></p>
                                        <p class="text-sm text-gray-600 mt-1" id="selectedMotorcycleDetails"></p>
                                    </div>
                                    <button type="button" onclick="showMotorcycleModal()" class="text-green-600 hover:text-green-700">
                                        <i class="fas fa-edit text-2xl"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 3. 고객 정보 -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-xl font-bold mb-4">
                        <i class="fas fa-user mr-2 text-green-600"></i>
                        3. 고객 정보
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold mb-2">이름 *</label>
                            <input type="text" id="customerName" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">주민번호 *</label>
                            <input type="text" id="residentNumber" required placeholder="000000-0000000" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">전화번호 *</label>
                            <input type="tel" id="phone" required placeholder="010-0000-0000" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">면허종류 *</label>
                            <select id="licenseType" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500">
                                <option value="">선택하세요</option>
                                <option value="2종 소형">2종 소형</option>
                                <option value="2종 보통">2종 보통</option>
                                <option value="1종 보통">1종 보통</option>
                                <option value="1종 대형">1종 대형</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold mb-2">우편번호 *</label>
                            <div class="flex gap-2">
                                <input type="text" id="postcode" required readonly class="w-32 px-3 py-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-green-500" placeholder="우편번호">
                                <button type="button" onclick="searchAddress()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 font-bold">
                                    <i class="fas fa-search mr-1"></i>우편번호 찾기
                                </button>
                            </div>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold mb-2">기본주소 *</label>
                            <input type="text" id="address" required readonly class="w-full px-3 py-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-green-500" placeholder="우편번호 검색 후 자동 입력됩니다">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold mb-2">상세주소</label>
                            <input type="text" id="detailAddress" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500" placeholder="상세주소를 입력하세요">
                        </div>
                    </div>
                </div>

                <!-- 4. 계약 상세 -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-xl font-bold mb-4">
                        <i class="fas fa-file-invoice mr-2 text-green-600"></i>
                        4. 계약 상세 정보
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold mb-2">계약 시작일 *</label>
                            <input type="date" id="startDate" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">계약 종료일 *</label>
                            <input type="date" id="endDate" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">일대여료 (원) *</label>
                            <input type="number" id="dailyFee" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500" placeholder="1일 대여 금액">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">보증금 (원)</label>
                            <input type="number" id="deposit" value="0" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold mb-2">특약사항</label>
                            <textarea id="specialTerms" rows="4" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500" placeholder="추가 특약사항이 있으면 입력하세요"></textarea>
                        </div>
                    </div>
                </div>

                <!-- 5. 전자서명 -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-xl font-bold mb-4">
                        <i class="fas fa-signature mr-2 text-green-600"></i>
                        5. 전자서명
                    </h2>
                    <p class="text-sm text-gray-600 mb-4">아래 서명 박스에 고객의 서명을 받아주세요</p>
                    <div class="border-2 border-gray-300 rounded-lg overflow-hidden">
                        <canvas id="signatureCanvas" width="800" height="200" class="w-full cursor-crosshair bg-white"></canvas>
                    </div>
                    <button type="button" onclick="clearSignature()" class="mt-2 text-sm text-blue-600 hover:text-blue-800">
                        <i class="fas fa-eraser mr-1"></i>서명 지우기
                    </button>
                </div>

                <!-- 6. 신분증 촬영 -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-xl font-bold mb-4">
                        <i class="fas fa-id-card mr-2 text-green-600"></i>
                        6. 신분증 촬영
                    </h2>
                    <p class="text-sm text-gray-600 mb-4">고객의 신분증을 촬영하거나 업로드하세요</p>
                    
                    <!-- 웹캠 미리보기 영역 -->
                    <div id="cameraSection" class="hidden mb-4">
                        <video id="video" width="640" height="480" autoplay class="w-full border rounded-lg"></video>
                        <button type="button" onclick="capturePhoto()" class="mt-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                            <i class="fas fa-camera mr-2"></i>촬영하기
                        </button>
                        <button type="button" onclick="stopCamera()" class="mt-2 bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">
                            <i class="fas fa-times mr-2"></i>카메라 닫기
                        </button>
                    </div>

                    <!-- 촬영된 사진 미리보기 -->
                    <div id="photoPreview" class="hidden mb-4">
                        <img id="capturedPhoto" class="w-full border rounded-lg">
                        <button type="button" onclick="clearPhoto()" class="mt-2 text-sm text-red-600 hover:text-red-800">
                            <i class="fas fa-trash mr-1"></i>사진 삭제
                        </button>
                    </div>

                    <!-- 촬영 버튼들 -->
                    <div class="flex gap-3">
                        <button type="button" onclick="startCamera()" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700">
                            <i class="fas fa-camera mr-2"></i>카메라로 촬영
                        </button>
                        <label class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 cursor-pointer text-center">
                            <i class="fas fa-upload mr-2"></i>파일 업로드
                            <input type="file" id="idCardFile" accept="image/*" onchange="handleFileUpload(event)" class="hidden">
                        </label>
                    </div>
                    
                    <canvas id="photoCanvas" class="hidden"></canvas>
                </div>

                <!-- 제출 버튼 -->
                <div class="flex gap-4">
                    <button type="submit" class="flex-1 bg-green-600 text-white py-4 rounded-lg font-bold text-lg hover:bg-green-700 transition">
                        <i class="fas fa-check-circle mr-2"></i>계약서 생성
                    </button>
                    <a href="/" class="flex-1 bg-gray-300 text-gray-700 py-4 rounded-lg font-bold text-lg hover:bg-gray-400 transition text-center">
                        취소
                    </a>
                </div>
            </form>
        </main>

        <!-- 오토바이 선택 모달 -->
        <div id="motorcycleModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full max-h-[90vh] overflow-hidden">
                <!-- 모달 헤더 -->
                <div class="bg-green-600 text-white p-4 flex items-center justify-between">
                    <h3 class="text-xl font-bold">
                        <i class="fas fa-motorcycle mr-2"></i>
                        오토바이 선택
                    </h3>
                    <button type="button" onclick="hideMotorcycleModal()" class="text-white hover:text-gray-200">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
                
                <!-- 모달 본문 -->
                <div class="p-6 overflow-y-auto max-h-[calc(90vh-120px)]">
                    <!-- 검색창 -->
                    <div class="mb-4 sticky top-0 bg-white z-10 pb-4">
                        <label class="block text-sm font-bold mb-2">
                            <i class="fas fa-search mr-1 text-green-500"></i>
                            번호판/차대번호로 검색
                        </label>
                        <input 
                            type="text" 
                            id="motorcycleSearchInput" 
                            placeholder="번호판 또는 차대번호 입력..." 
                            oninput="filterMotorcycleList()"
                            class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 text-lg"
                        >
                        <p class="text-xs text-gray-500 mt-1">
                            <i class="fas fa-info-circle mr-1"></i>
                            예: 12가1234, ABC123 등
                        </p>
                    </div>
                    
                    <!-- 오토바이 목록 -->
                    <div id="motorcycleListModal" class="space-y-3">
                        <!-- 오토바이 목록이 여기에 렌더링됩니다 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        let motorcycles = [];
        let selectedMotorcycleId = null;
        let canvas, ctx;
        let isDrawing = false;

        window.addEventListener('DOMContentLoaded', () => {
            loadMotorcycles();
            initSignaturePad();
            
            // 오늘 날짜를 계약 시작일의 기본값으로 설정
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').value = today;
        });
        
        // 우편번호 검색 함수
        function searchAddress() {
            new daum.Postcode({
                oncomplete: function(data) {
                    // 우편번호와 주소 정보를 해당 필드에 넣는다.
                    document.getElementById('postcode').value = data.zonecode;
                    
                    // 도로명 주소 또는 지번 주소를 선택
                    let addr = '';
                    if (data.userSelectedType === 'R') { // 도로명 주소 선택
                        addr = data.roadAddress;
                    } else { // 지번 주소 선택
                        addr = data.jibunAddress;
                    }
                    
                    document.getElementById('address').value = addr;
                    
                    // 상세주소 입력란으로 포커스 이동
                    document.getElementById('detailAddress').focus();
                }
            }).open();
        }

        async function loadMotorcycles() {
            try {
                const response = await axios.get('/api/motorcycles?status=available');
                motorcycles = response.data;
                
                // 번호판 순으로 정렬
                motorcycles.sort((a, b) => {
                    const aNum = a.plate_number || a.chassis_number || '';
                    const bNum = b.plate_number || b.chassis_number || '';
                    return aNum.localeCompare(bNum);
                });
            } catch (error) {
                console.error('Error loading motorcycles:', error);
                alert('오토바이 목록을 불러오는데 실패했습니다');
            }
        }

        function showMotorcycleModal() {
            const modal = document.getElementById('motorcycleModal');
            
            // 검색창 초기화
            document.getElementById('motorcycleSearchInput').value = '';
            
            // 모달 열기
            modal.classList.remove('hidden');
            
            // 목록 렌더링
            renderMotorcycleList(motorcycles);
            
            // 검색창에 포커스
            setTimeout(() => {
                document.getElementById('motorcycleSearchInput').focus();
            }, 100);
        }

        function filterMotorcycleList() {
            const searchTerm = document.getElementById('motorcycleSearchInput').value.toLowerCase().trim();
            
            if (!searchTerm) {
                renderMotorcycleList(motorcycles);
                return;
            }
            
            const filtered = motorcycles.filter(m => {
                const plateNumber = (m.plate_number || '').toLowerCase();
                const chassisNumber = (m.chassis_number || '').toLowerCase();
                
                return plateNumber.includes(searchTerm) || chassisNumber.includes(searchTerm);
            });
            
            renderMotorcycleList(filtered);
        }

        function renderMotorcycleList(motorcycleList) {
            const listContainer = document.getElementById('motorcycleListModal');
            
            if (motorcycleList.length === 0) {
                const hasSearchTerm = document.getElementById('motorcycleSearchInput').value.trim();
                
                if (hasSearchTerm) {
                    // 검색 결과 없음
                    listContainer.innerHTML = `
                        <div class="text-center py-8">
                            <i class="fas fa-search text-4xl text-gray-400 mb-3"></i>
                            <p class="text-gray-600 mb-2">검색 결과가 없습니다</p>
                            <p class="text-sm text-gray-500">다른 번호로 검색해보세요</p>
                        </div>
                    `;
                } else {
                    // 오토바이 없음
                    listContainer.innerHTML = `
                        <div class="text-center py-8">
                            <i class="fas fa-exclamation-circle text-4xl text-yellow-500 mb-3"></i>
                            <p class="text-gray-600 mb-4">사용 가능한 오토바이가 없습니다</p>
                            <a href="/motorcycles" class="inline-block bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
                                <i class="fas fa-plus mr-2"></i>오토바이 등록하기
                            </a>
                        </div>
                    `;
                }
                return;
            }

            listContainer.innerHTML = motorcycleList.map(m => {
                const displayNumber = m.plate_number || m.chassis_number;
                const displayLabel = m.plate_number ? '번호판' : '차대번호';
                const isSelected = selectedMotorcycleId === m.id;
                
                return `
                    <div onclick="selectMotorcycleFromModal(${m.id})" 
                         class="border-2 ${isSelected ? 'border-green-600 bg-green-50' : 'border-gray-300 hover:border-green-400'} rounded-lg p-4 cursor-pointer transition-all active:scale-95">
                        <div class="flex items-center justify-between">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <h3 class="font-bold text-xl text-gray-800">${m.vehicle_name}</h3>
                                    ${isSelected ? '<span class="bg-green-600 text-white text-xs px-2 py-1 rounded-full">선택됨</span>' : ''}
                                </div>
                                <div class="grid grid-cols-2 gap-2 text-sm">
                                    <p class="text-gray-600">
                                        <i class="fas fa-id-card w-5 text-blue-500"></i>
                                        <span class="font-semibold">${displayLabel}:</span> ${displayNumber}
                                    </p>
                                    <p class="text-gray-600">
                                        <i class="fas fa-calendar w-5 text-purple-500"></i>
                                        <span class="font-semibold">연식:</span> ${m.model_year}년
                                    </p>
                                    <p class="text-gray-600">
                                        <i class="fas fa-tachometer-alt w-5 text-orange-500"></i>
                                        <span class="font-semibold">주행:</span> ${Number(m.mileage).toLocaleString()} km
                                    </p>
                                    <p class="text-gray-600">
                                        <i class="fas fa-shield-alt w-5 text-green-500"></i>
                                        <span class="font-semibold">보험:</span> ${m.insurance_company}
                                    </p>
                                    <p class="text-gray-600">
                                        <i class="fas fa-user w-5 text-indigo-500"></i>
                                        <span class="font-semibold">명의자:</span> ${m.owner_name}
                                    </p>
                                    <p class="text-gray-600">
                                        <i class="fas fa-birthday-cake w-5 text-red-500"></i>
                                        <span class="font-semibold">운전연령:</span> ${m.driving_range}
                                    </p>
                                </div>
                            </div>
                            <div class="ml-4">
                                <i class="fas fa-chevron-right text-2xl text-gray-400"></i>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function hideMotorcycleModal() {
            document.getElementById('motorcycleModal').classList.add('hidden');
            // 검색창 초기화
            document.getElementById('motorcycleSearchInput').value = '';
        }

        function selectMotorcycleFromModal(id) {
            const motorcycle = motorcycles.find(m => m.id === id);
            if (!motorcycle) return;
            
            selectedMotorcycleId = id;
            document.getElementById('selectedMotorcycleId').value = id;
            
            const displayNumber = motorcycle.plate_number || motorcycle.chassis_number;
            const displayLabel = motorcycle.plate_number ? '번호판' : '차대번호';
            
            // 선택 버튼 텍스트 업데이트
            document.getElementById('selectedMotorcycleText').textContent = '다른 오토바이 선택하기';
            
            // 선택된 오토바이 정보 표시
            document.getElementById('selectedMotorcycleName').textContent = motorcycle.vehicle_name;
            document.getElementById('selectedMotorcycleDetails').innerHTML = `
                <span class="mr-3"><i class="fas fa-id-card mr-1"></i>${displayLabel}: ${displayNumber}</span>
                <span class="mr-3"><i class="fas fa-calendar mr-1"></i>${motorcycle.model_year}년</span>
                <span><i class="fas fa-tachometer-alt mr-1"></i>${Number(motorcycle.mileage).toLocaleString()} km</span>
            `;
            document.getElementById('selectedMotorcycleInfo').classList.remove('hidden');
            
            // 모달 닫기
            hideMotorcycleModal();
        }

        function initSignaturePad() {
            canvas = document.getElementById('signatureCanvas');
            ctx = canvas.getContext('2d');
            
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            // 터치 이벤트 지원
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousedown', {
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                canvas.dispatchEvent(mouseEvent);
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousemove', {
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                canvas.dispatchEvent(mouseEvent);
            });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                const mouseEvent = new MouseEvent('mouseup', {});
                canvas.dispatchEvent(mouseEvent);
            });
        }

        function startDrawing(e) {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            ctx.beginPath();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        }

        function draw(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function clearSignature() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 신분증 촬영 관련 변수
        let stream = null;
        let idCardPhotoData = null;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                document.getElementById('cameraSection').classList.remove('hidden');
                document.getElementById('photoPreview').classList.add('hidden');
            } catch (error) {
                console.error('카메라 접근 오류:', error);
                alert('카메라에 접근할 수 없습니다. 권한을 확인해주세요.');
            }
        }

        function capturePhoto() {
            const video = document.getElementById('video');
            const photoCanvas = document.getElementById('photoCanvas');
            const capturedPhoto = document.getElementById('capturedPhoto');
            
            photoCanvas.width = video.videoWidth;
            photoCanvas.height = video.videoHeight;
            
            const photoCtx = photoCanvas.getContext('2d');
            photoCtx.drawImage(video, 0, 0);
            
            idCardPhotoData = photoCanvas.toDataURL('image/jpeg', 0.8);
            capturedPhoto.src = idCardPhotoData;
            
            stopCamera();
            document.getElementById('photoPreview').classList.remove('hidden');
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            document.getElementById('cameraSection').classList.add('hidden');
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                idCardPhotoData = e.target.result;
                document.getElementById('capturedPhoto').src = idCardPhotoData;
                document.getElementById('photoPreview').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function clearPhoto() {
            idCardPhotoData = null;
            document.getElementById('photoPreview').classList.add('hidden');
            document.getElementById('idCardFile').value = '';
        }

        function clearSignature() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        document.getElementById('contractForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // 필수 항목 확인
            const contractType = document.querySelector('input[name="contract_type"]:checked')?.value;
            if (!contractType) {
                alert('계약 타입을 선택해주세요');
                return;
            }

            if (!selectedMotorcycleId) {
                alert('오토바이를 선택해주세요');
                return;
            }

            // 서명 데이터 확인
            const signatureData = canvas.toDataURL('image/png');
            const isSignatureEmpty = ctx.getImageData(0, 0, canvas.width, canvas.height).data.every((val, i) => i % 4 === 3 ? val === 0 : val === 255);
            
            if (isSignatureEmpty) {
                alert('서명을 해주세요');
                return;
            }

            // 고객 정보 생성
            const postcode = document.getElementById('postcode').value;
            const baseAddress = document.getElementById('address').value;
            const detailAddress = document.getElementById('detailAddress').value;
            const fullAddress = `[${postcode}] ${baseAddress}${detailAddress ? ' ' + detailAddress : ''}`;
            
            const customerData = {
                name: document.getElementById('customerName').value,
                resident_number: document.getElementById('residentNumber').value,
                phone: document.getElementById('phone').value,
                address: fullAddress,
                license_type: document.getElementById('licenseType').value
            };

            try {
                // 1. 고객 정보 저장
                const customerResponse = await axios.post('/api/customers', customerData);
                const customerId = customerResponse.data.id;

                // 2. 계약서 생성
                const contractData = {
                    contract_type: contractType,
                    motorcycle_id: selectedMotorcycleId,
                    customer_id: customerId,
                    start_date: document.getElementById('startDate').value,
                    end_date: document.getElementById('endDate').value,
                    monthly_fee: parseInt(document.getElementById('dailyFee').value),
                    deposit: parseInt(document.getElementById('deposit').value) || 0,
                    special_terms: document.getElementById('specialTerms').value || '',
                    signature_data: signatureData,
                    id_card_photo: idCardPhotoData || ''
                };

                const contractResponse = await axios.post('/api/contracts', contractData);
                
                alert(`계약서가 생성되었습니다!\n계약번호: ${contractResponse.data.contract_number}`);
                window.location.href = '/contracts';
            } catch (error) {
                console.error('Error creating contract:', error);
                alert('계약서 생성에 실패했습니다: ' + (error.response?.data?.error || error.message));
            }
        });
    </script>
</body>
</html>
